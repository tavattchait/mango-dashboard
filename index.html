<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WRC ERP</title>
<link rel="icon" href="assets/wrc-logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4338CA">
<link rel="apple-touch-icon" href="assets/wrc-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ground:#EEF1FA; --panel:#ffffff; --soft:#eef1f8;
  --ink:#101A33; --ink2:#334156; --muted:#6B7690; --muted2:#8592A8;
  --line:#E3E8F3; --line2:#D7DEEC;
  --teal:#0D9488; --teal2:#0B7A6C; --teal-soft:#E4F7F3;
  --blue:#2F6FED; --blue2:#1E4FC4; --blue-soft:#EAF1FE;
  --amber:#D97706; --amber2:#B45309; --amber-soft:#FDF1E0;
  --red:#DC2626; --red-soft:#FDECEC;
  --indigo:#4338CA; --indigo2:#3730A3; --indigo-soft:#EBEFF8;
  --sans:"IBM Plex Sans Thai","Segoe UI",system-ui,sans-serif;
  --disp:"Space Grotesk","IBM Plex Sans Thai",sans-serif;
  --mono:"IBM Plex Mono","SFMono-Regular",Consolas,monospace;
  --r:16px; --rail:84px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);color:var(--ink);font-size:14px;line-height:1.5;background:var(--ground);-webkit-font-smoothing:antialiased;overflow:hidden}
a{color:var(--blue);text-decoration:none} a:hover{color:var(--blue2)}
button,input,select,textarea{font-family:inherit;font-size:14px}
button{cursor:pointer}
.hidden{display:none!important}
.mono{font-family:var(--mono)}
.tnum{font-variant-numeric:tabular-nums}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#C9D2E3;border-radius:16px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes floatIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes growW{from{width:0!important}}
@keyframes auroraA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(5%,4%) scale(1.12)}}
@keyframes auroraB{0%,100%{transform:translate(0,0) scale(1.08)}50%{transform:translate(-4%,5%) scale(1)}}
@keyframes auroraC{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(3%,-4%) scale(1.15)}}
.glass{backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%)}

/* ---------- Login ---------- */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(1100px 480px at 50% -10%, var(--teal-soft), var(--ground) 60%)}
.login-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:40px 42px;
  width:100%;max-width:388px;box-shadow:0 20px 50px rgba(16,26,51,.12)}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:13px;margin-bottom:28px}
.login-logo img{width:66px;height:66px;object-fit:contain}
.login-logo .t{font-family:var(--disp);font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.login-logo .s{font-size:12px;color:var(--muted);font-family:var(--mono);letter-spacing:.04em}
.field{margin-bottom:15px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.02em}
.field input,.field select,.field textarea{width:100%;background:#F7F9FD;border:1px solid var(--line2);
  border-radius:var(--r);padding:11px 13px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.field input::placeholder{color:var(--muted2)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft);background:#fff}
.field input.warn{border-color:var(--red);background:var(--red-soft)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:var(--r);
  padding:11px 18px;font-weight:600;font-size:13.5px;transition:transform .08s,box-shadow .15s,opacity .15s}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--acc,var(--teal)),var(--acc2,#14b8a6));color:#fff;box-shadow:0 6px 16px -8px var(--acc,var(--teal))}
.btn-block{width:100%}
.btn-ghost{background:#fff;color:var(--ink2);border:1px solid var(--line2)}
.btn-ghost:hover{border-color:#C7CDD6}
.btn-danger{background:var(--red-soft);color:var(--red);border:1px solid #f7c9c9}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:12px}
.login-err{background:var(--red-soft);color:#991b1b;border:1px solid #f7c9c9;border-radius:9px;
  padding:10px 12px;font-size:12.5px;margin-bottom:14px}

/* ---------- Shell ---------- */
#appView{display:flex;height:100vh;width:100%;overflow:hidden;position:relative}
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.aurora span{position:absolute;border-radius:50%;filter:blur(46px)}
.a1{top:-14%;left:2%;width:38vw;height:38vw;background:radial-gradient(circle,rgba(67,56,202,.16) 0%,transparent 68%);animation:auroraA 26s ease-in-out infinite}
.a2{top:2%;right:-10%;width:36vw;height:36vw;background:radial-gradient(circle,rgba(217,119,6,.13) 0%,transparent 68%);animation:auroraB 30s ease-in-out infinite}
.a3{bottom:-16%;left:30%;width:34vw;height:34vw;background:radial-gradient(circle,rgba(13,148,136,.14) 0%,transparent 70%);animation:auroraC 34s ease-in-out infinite}

.sidebar{width:var(--rail);flex-shrink:0;background:rgba(255,255,255,.62);border-right:1px solid rgba(255,255,255,.7);
  backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
  display:flex;flex-direction:column;align-items:center;padding:16px 0 14px;z-index:30;position:relative;box-shadow:1px 0 0 rgba(15,23,42,.03)}
.sb-brand{display:flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:20px}
.sb-brand .box{width:42px;height:42px;border-radius:var(--r);background:linear-gradient(135deg,var(--indigo),var(--blue));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px -6px rgba(67,56,202,.55)}
.sb-brand .box span{font-family:var(--disp);font-weight:700;font-size:13px;color:#fff;letter-spacing:.3px}
.sb-brand .s{font-size:8.5px;font-weight:600;letter-spacing:.6px;color:var(--muted2)}
.sb-tiles{display:flex;flex-direction:column;gap:10px;flex:1;width:100%;align-items:center;overflow-y:auto}
.ws-tile{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer;padding:0;width:100%}
.ws-tile .icon{width:46px;height:46px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid #E4E7EC;font-size:19px;margin:0 auto}
.ws-tile.active .icon{border:2px solid var(--tc,var(--teal))}
.ws-tile .lbl{font-size:9px;font-weight:600;letter-spacing:.15em;color:#9AA4B2;font-family:var(--mono);text-transform:uppercase}
.ws-tile.active .lbl{color:var(--tc,var(--teal))}
.sb-bottom{display:flex;flex-direction:column;align-items:center;gap:12px}

/* Mango-style module launcher (หน้า "เมนู") — จัดกึ่งกลางเป็นบล็อกกะทัดรัด ไม่ยืดเต็มจอกว้าง */
.launcher-wrap{max-width:1020px;margin:0 auto;padding-top:4px}
.launcher-head{text-align:center;margin-bottom:6px}
.launcher-head .t{font-family:var(--disp);font-size:27px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.launcher-head .s{font-size:13px;color:var(--muted);margin-top:5px}
.launch-sect{display:flex;align-items:center;justify-content:center;gap:9px;margin:34px 0 16px;font-size:13px;font-weight:700;color:var(--ink2)}
.launch-sect .ic{width:26px;height:26px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.launch-sect .cnt{font-size:10.5px;font-weight:600;color:var(--muted);background:var(--soft);padding:2px 10px;border-radius:999px;font-family:var(--mono)}
.launch-grid{display:grid;grid-template-columns:repeat(auto-fit,148px);gap:16px;justify-content:center}
.launch-tile{background:#fff;border:1px solid var(--line);border-radius:20px;padding:24px 14px 20px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(16,24,40,.05);
  transition:transform .16s cubic-bezier(.2,.8,.3,1),border-color .16s,box-shadow .16s;font-family:inherit}
.launch-tile:hover{border-color:var(--tc,var(--indigo));box-shadow:0 14px 28px -14px rgba(16,24,40,.4);transform:translateY(-4px)}
.launch-tile:active{transform:translateY(-1px)}
.launch-tile .lt-icon{width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:27px}
.launch-tile .lt-name{font-size:13px;font-weight:600;color:var(--ink);text-align:center;line-height:1.3}
.sb-gear{width:46px;height:46px;border-radius:var(--r);border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px}
.sb-gear:hover{border-color:#C7CDD6}
.sb-avatar{width:38px;height:38px;border-radius:var(--r);background:var(--indigo);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12.5px;color:#fff;cursor:pointer}
.rail-pop{position:absolute;left:56px;bottom:0;width:240px;background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:0 12px 28px -10px rgba(16,24,40,.22);z-index:99;padding:14px}
.rail-pop.user{width:190px;left:48px;padding:8px}
.rail-pop-bg{position:fixed;inset:0;z-index:98}

.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;z-index:10}
.topbar{min-height:68px;flex-shrink:0;background:rgba(255,255,255,.68);border-bottom:1px solid rgba(255,255,255,.7);
  backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
  display:flex;flex-wrap:wrap;align-items:center;gap:16px;padding:0 26px;z-index:20;box-shadow:0 1px 0 rgba(15,23,42,.03)}
.tb-ws{display:flex;align-items:center;gap:11px}
.tb-ws .icon{width:36px;height:36px;border-radius:var(--r);background:var(--soft2,var(--soft));display:flex;align-items:center;justify-content:center;font-size:17px;border:1px solid var(--line)}
.tb-ws .name{font-weight:700;font-size:16.5px;color:var(--ink);letter-spacing:-.1px;line-height:1.15}
.tb-ws .sub{font-size:11.5px;color:var(--muted)}
.subnav{display:flex;gap:2px;background:var(--soft);border:1px solid var(--line);border-radius:var(--r);padding:3px;margin-left:8px}
.subnav .pill-tab{padding:7px 14px;border:none;border-radius:12px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:#8A94A6;white-space:nowrap;flex-shrink:0}
.subnav .pill-tab.active{font-weight:600;background:var(--soft2,var(--indigo-soft));color:var(--tc,var(--indigo));box-shadow:0 1px 2px rgba(16,24,40,.08)}
.tb-search{position:relative;width:220px;max-width:22vw}
.tb-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%)}
.tb-search input{width:100%;height:38px;border:1px solid var(--line);background:#F7F9FD;border-radius:var(--r);padding:0 12px 0 34px;font-size:12.5px;color:var(--ink);outline:none}
.tb-search input:focus{border-color:var(--tc,var(--teal));background:#fff}
.icon-btn{width:38px;height:38px;border-radius:var(--r);border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.icon-btn:hover{border-color:#C7CDD6}
.notif-dot{position:absolute;top:8px;right:9px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid #fff}
.content{flex:1;overflow-y:auto;overflow-x:hidden}
.page{padding:24px 26px 40px;max-width:1480px}
.page.wide{max-width:1600px}

/* ---------- Cards / KPI / common ---------- */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:0 1px 2px rgba(16,24,40,.03)}
.card+.card{margin-top:14px}
.grid{align-items:stretch}
.grid>.card{margin-top:0}
.card-t{font-size:14px;font-weight:600;color:var(--ink)}
.card-sub{font-size:11px;color:var(--muted)}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:0 1px 2px rgba(16,24,40,.03)}
.kpi .top{display:flex;align-items:center;justify-content:space-between}
.kpi .ic{width:34px;height:34px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px}
.kpi .delta{font-size:11.5px;font-weight:600}
.kpi .lb{font-size:10.5px;color:var(--muted);margin-top:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em}
.kpi .vl{font-family:var(--disp);font-size:23px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.kpi .sub{font-size:11px;color:var(--muted2);margin-top:2px}
.mini{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:13px 15px}
.mini .lb{font-size:10.5px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em}
.mini .vl{font-family:var(--disp);font-size:19px;font-weight:700;color:var(--ink)}

.pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:1px 9px;border-radius:999px;font-family:var(--mono)}
.badge{display:inline-block;font-size:10.5px;font-weight:500;color:var(--muted2);font-family:var(--mono)}
.progress-bar{height:6px;background:#EBEFF8;border-radius:999px;overflow:hidden}
.progress-bar>div{height:100%;border-radius:999px;animation:growW 1s ease both}

.table-wrap{overflow-x:auto;border:1px solid var(--line2);border-radius:var(--r)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#F3F6FC;text-align:left;padding:9px 14px;font-weight:700;color:#5B6B84;
  font-size:11px;letter-spacing:.02em;white-space:nowrap;border-bottom:1px solid var(--line2);border-right:1px solid var(--line)}
thead th:last-child{border-right:none}
tbody td{padding:9px 14px;border-bottom:1px solid #EEF1F8;white-space:nowrap;color:var(--ink2)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#F7F9FD}
td.num,th.num{text-align:right}
.rowlink{color:var(--ink);font-weight:600;cursor:pointer}
.rowlink:hover{color:var(--teal)}
.empty{text-align:center;color:var(--muted);padding:42px 20px;font-size:13px}

/* ---------- checklist เบิกของ (อ้างอิงฟอร์มกระดาษ CMT01) ---------- */
.req-check{border:1px solid var(--line2);border-radius:12px;overflow:hidden;max-height:360px;overflow-y:auto}
.req-cat-sect{background:#F3F6FC;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:7px 12px;position:sticky;top:0}
.req-row{display:grid;grid-template-columns:18px 1fr 64px 90px;gap:8px;align-items:center;padding:7px 12px;border-top:1px solid #F1F3F9;cursor:pointer}
.req-row.on{background:var(--teal-soft)}
.req-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--teal);cursor:pointer}
.req-name{font-size:12.5px;color:var(--ink2)}
.req-unit{color:var(--muted2);font-size:11px}
.req-qty,.req-asset{border:1px solid var(--line2);border-radius:8px;padding:4px 6px;font-size:11.5px;background:#fff;font-family:inherit}
.req-qty:disabled,.req-asset:disabled{background:var(--soft);color:var(--muted2)}
.req-qty{text-align:right}
@media(max-width:520px){
  .req-row{display:flex;flex-wrap:wrap;align-items:center;gap:6px 8px}
  .req-name{flex:1 1 100%;order:1}
  .req-row input[type=checkbox]{order:0}
  .req-qty{order:2;width:56px}
  .req-asset{order:3;flex:1;min-width:80px}
}

/* ---------- ตารางแก้ไข WBS แบบ Excel (input/select ในแต่ละ cell) ---------- */
.wbs-table td{padding:2px 4px;white-space:nowrap}
.wbs-in{width:100%;border:1px solid transparent;background:transparent;padding:7px 8px;border-radius:8px;
  font-family:inherit;font-size:12.5px;color:var(--ink2);transition:border-color .1s,background .1s}
.wbs-in:hover{border-color:var(--line2)}
.wbs-in:focus{outline:none;border-color:var(--teal);background:#fff;box-shadow:0 0 0 2px var(--teal-soft)}
select.wbs-in{cursor:pointer}
input[type=date].wbs-in,input[type=number].wbs-in{text-align:right}

.form-section{border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;background:#F7F9FD}
.form-section-t{font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--teal);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
.row{display:grid;gap:14px}
.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}.r4{grid-template-columns:repeat(4,1fr)}
@media(max-width:760px){.r2,.r3,.r4{grid-template-columns:1fr}}
.inline-warn{font-size:11.5px;color:var(--red);margin-top:5px;font-weight:600;display:none}

.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:120;padding:20px}
.modal{background:#fff;border-radius:20px;box-shadow:0 24px 50px -20px rgba(15,23,42,.4);width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-head .t{font-family:var(--disp);font-size:16.5px;font-weight:700}
.modal-x{background:var(--soft);border:none;border-radius:8px;width:32px;height:32px;font-size:17px;color:var(--muted)}
.modal-body{padding:22px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.warn-list{list-style:none}
.warn-list li{padding:11px 14px;border-radius:var(--r);margin-bottom:8px;font-size:13px;font-weight:600;display:flex;gap:9px;align-items:flex-start}
.warn-list li.block{background:var(--red-soft);color:#991b1b;border:1px solid #f7c9c9}
.warn-list li.warn{background:var(--amber-soft);color:#92400e;border:1px solid #fbe0ae}

#toast{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:13.5px;font-weight:600;
  box-shadow:0 10px 30px rgba(0,0,0,.3);display:flex;align-items:center;gap:9px;animation:slidein .25s}
.toast.ok{background:#065f46}.toast.err{background:#991b1b}
@keyframes slidein{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

.mobile-toggle{display:none}

/* master-detail (Projects page) — stacks on tablet/portrait so the list doesn't crush the detail panel */
.projects-split{display:flex;height:100%}
.projects-list{width:340px;flex-shrink:0;border-right:1px solid var(--line);display:flex;flex-direction:column}
.projects-detail{flex:1;overflow-y:auto;padding:24px 28px 44px}

@media(max-width:1024px){
  .projects-split{flex-direction:column;height:auto}
  .projects-list{width:100%;max-height:260px;border-right:none;border-bottom:1px solid var(--line)}
  .projects-detail{padding:18px 16px 32px}
  .page,.page.wide{padding:18px 16px 32px}
}
@media(max-width:860px){
  .sidebar{position:fixed;top:0;bottom:0;left:0;transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .mobile-toggle{display:flex;background:var(--soft);border:1px solid var(--line);border-radius:9px;width:38px;height:38px;font-size:17px;align-items:center;justify-content:center}
  .topbar{padding:10px 14px;height:auto;row-gap:8px}
  .subnav{width:100%;order:3;overflow-x:auto}
  .tb-search{display:none}
}

  const matches = row => st.filters.every(f=>{
    if(f.t==='eq') return String(row[f.c])===String(f.v);
    if(f.t==='in') return (f.v||[]).map(String).includes(String(row[f.c]));
    if(f.t==='gte') return row[f.c]!=null && row[f.c] >= f.v;
    if(f.t==='lte') return row[f.c]!=null && row[f.c] <= f.v;
    return true;
  });
  function materialize(){
    let r = rows.filter(matches);
    for(let i=st.orders.length-1;i>=0;i--){ const [col,asc] = st.orders[i];
      r = r.slice().sort((a,b)=>{ if(a[col]<b[col]) return asc?-1:1; if(a[col]>b[col]) return asc?1:-1; return 0; }); }
    if(st.limitN) r = r.slice(0, st.limitN);
    return r;
  }
  const b = {
    select(){ return b; }, eq(c,v){ st.filters.push({t:'eq',c,v}); return b; }, in(c,v){ st.filters.push({t:'in',c,v}); return b; },
    gte(c,v){ st.filters.push({t:'gte',c,v}); return b; }, lte(c,v){ st.filters.push({t:'lte',c,v}); return b; },
    order(c,opts){ st.orders.push([c, !(opts && opts.ascending===false)]); return b; },
    limit(n){ st.limitN = n; return b; },
    insert(rec){ st.op='insert'; st.rec = Array.isArray(rec) ? rec : [rec]; return b; },
    update(rec){ st.op='update'; st.rec = rec; return b; },
    delete(){ st.op='delete'; return b; },
    single(){ st.single='req'; return b; }, maybeSingle(){ st.single='opt'; return b; },
    then(resolve, reject){
      let result;
      try{
        if(st.op==='insert'){
          const withIds = st.rec.map(r=>({ id:genId(), created_at:new Date().toISOString(), ...r }));
          rows.push(...withIds);
          result = { data: st.single ? withIds[0] : withIds, error:null };
        } else if(st.op==='update'){
          const m = materialize(); m.forEach(row=>Object.assign(row, st.rec));
          result = { data: st.single ? (m[0]||null) : m, error:null };
        } else if(st.op==='delete'){
          const m = materialize(); m.forEach(row=>{ const i=rows.indexOf(row); if(i>=0) rows.splice(i,1); });
          result = { data: m, error:null };
        } else {
          const r = materialize();
          if(st.single==='req') result = { data: r[0]||null, error: r[0]?null:{message:'ไม่พบข้อมูล (โหมดพรีวิว)'} };
          else if(st.single==='opt') result = { data: r[0]||null, error:null };
          else result = { data: r, error:null };
        }
      }catch(e){ return reject ? reject(e) : Promise.reject(e); }
      return Promise.resolve(result).then(resolve, reject);
    }
  };
  return b;
}

function svgSpark(data,color){
  if(!data.length) data=[0,0];
  const w=118,h=28,max=Math.max(...data),min=Math.min(...data);
  const pts=data.map((v,i)=>[i/((data.length-1)||1)*w, h-2-((v-min)/((max-min)||1))*(h-6)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const id='sp'+Math.random().toString(36).slice(2,7);
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="28" preserveAspectRatio="none">'+
    '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity=".25"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'+
    '<path d="'+line+' L'+w+' '+h+' L0 '+h+' Z" fill="url(#'+id+')"/>'+
    '<path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function svgDonut(segs){
  const r=50,sw=16,c=2*Math.PI*r,cx=66,cy=66; let off=0; const total=segs.reduce((a,s)=>a+s.v,0)||1;
  let arcs=''; segs.forEach(s=>{ const len=s.v/total*c; arcs+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.color+'" stroke-width="'+sw+'" stroke-dasharray="'+len+' '+(c-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+cx+' '+cy+')"/>'; off+=len; });
  return '<svg width="132" height="132" viewBox="0 0 132 132"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#EBEFF8" stroke-width="'+sw+'"/>'+arcs+'</svg>';
}

function svgStackedArea(series, months){
  const w=680,h=236,padL=34,padR=10,padT=12,padB=24,n=months.length;
  const totals = months.map((_,i)=>series.reduce((a,s)=>a+(s.data[i]||0),0));
  const max = (Math.ceil(Math.max(1,...totals)/3)*3) || 3;
  const x=i=>padL+i*(w-padL-padR)/((n-1)||1);
  const y=v=>padT+(1-v/max)*(h-padT-padB);
  let grid='';
  for(let g=0; g<=3; g++){ const gv=max*g/3, gy=y(gv);
    grid += '<line x1="'+padL+'" x2="'+(w-padR)+'" y1="'+gy+'" y2="'+gy+'" stroke="#EBEFF8" stroke-width="1"/>'+
      '<text x="'+(padL-7)+'" y="'+(gy+3.5)+'" text-anchor="end" font-size="9.5" fill="#6B7690" font-family=\'IBM Plex Mono\'>'+fmt(gv)+'</text>'; }
  let labels=''; months.forEach((m,i)=>{ labels+='<text x="'+x(i)+'" y="'+(h-8)+'" text-anchor="middle" font-size="9" fill="#6B7690">'+esc(m)+'</text>'; });
  let cum = months.map(()=>0); let layers='';
  series.forEach(s=>{
    const lower=cum.slice(); const upper=cum.map((c,i)=>c+(s.data[i]||0)); cum=upper;
    let d='M'+x(0)+' '+y(upper[0]); for(let i=1;i<n;i++) d+=' L'+x(i)+' '+y(upper[i]);
    for(let i=n-1;i>=0;i--) d+=' L'+x(i)+' '+y(lower[i]); d+=' Z';
    layers += '<path d="'+d+'" fill="'+s.color+'" fill-opacity=".82" stroke="#fff" stroke-width="1"/>';
  });
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="display:block;margin-top:6px" preserveAspectRatio="xMidYMid meet">'+grid+layers+labels+'</svg>';
}
function svgLineChart(rev,cost,acc,months){
  const w=560,h=224,padL=30,padR=10,padT=12,padB=24,n=months.length;
  const max=(Math.ceil(Math.max(1,...rev)/2)*2) || 2;
  const x=i=>padL+i*(w-padL-padR)/((n-1)||1);
  const y=v=>padT+(1-v/max)*(h-padT-padB);
  function path(d,close){ let s=d.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' '); if(close) s+=' L'+x(n-1).toFixed(1)+' '+y(0).toFixed(1)+' L'+x(0).toFixed(1)+' '+y(0).toFixed(1)+' Z'; return s; }
  let grid=''; for(let g=0; g<=3; g++){ const gy=y(max*g/3); grid+='<line x1="'+padL+'" x2="'+(w-padR)+'" y1="'+gy+'" y2="'+gy+'" stroke="#EBEFF8" stroke-width="1"/>'; }
  let labels=''; months.forEach((m,i)=>{ labels+='<text x="'+x(i)+'" y="'+(h-8)+'" text-anchor="middle" font-size="9" fill="#6B7690">'+esc(m)+'</text>'; });
  let dots=''; rev.forEach((v,i)=>{ dots+='<circle cx="'+x(i)+'" cy="'+y(v)+'" r="2.4" fill="#fff" stroke="'+acc+'" stroke-width="2"/>'; });
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="display:block;margin-top:6px" preserveAspectRatio="xMidYMid meet">'+
    '<defs><linearGradient id="dv" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+acc+'" stop-opacity=".18"/><stop offset="100%" stop-color="'+acc+'" stop-opacity="0"/></linearGradient></defs>'+
    grid+
    '<path d="'+path(cost,false)+'" fill="none" stroke="#C9D2E3" stroke-width="2" stroke-dasharray="5 4" stroke-linecap="round"/>'+
    '<path d="'+path(rev,true)+'" fill="url(#dv)"/>'+
    '<path d="'+path(rev,false)+'" fill="none" stroke="'+acc+'" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>'+
    dots+labels+'</svg>';
}

async function doLogin(e){
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  err.classList.add('hidden');
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPw').value;
  try{
    const email = username.toLowerCase() + '@wrc.local';
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ err.textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'; err.classList.remove('hidden'); return; }
    state.session = data.session;
    await loadProfileAndEnter();
  }catch(ex){ err.textContent = 'เชื่อมต่อไม่ได้: '+ex.message; err.classList.remove('hidden'); }
  finally{ btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ →'; }
}

/* ---------- Mobile app mode ----------
   field/eng ใช้หน้ามือถือเป็น default (เพราะเข้าทำงานจากโทรศัพท์/iPad) แต่สลับไป desktop ได้
   role อื่นเข้า mobile mode เฉพาะตอนจอแคบ ≤860px (responsive ปกติ)
   state.forceDesktop ใช้ครอบเฉพาะ field/eng ที่อยากดู desktop — ไม่มีผลต่อ role อื่น */
function isMobileMode(){
  if(!state.profile) return false;
  if(state.forceDesktop) return false;
  const r = state.profile.role;
  if(['field','eng'].includes(r)) return true;          // บังคับ mobile ตลอด
  return window.matchMedia('(max-width:860px)').matches; // role อื่นตามจอ
}

      else if(sub==='finance') await renderCoFinance();

      else if(sub==='users') await renderUsers();
      else if(sub==='targets') await renderTargets();
      else if(sub==='audit') await renderAudit();

      else if(sub==='team') await renderTeamPage();

/* mobile bottom nav + FAB — โชว์เฉพาะ body.mobile-mode และเมื่ออยู่ในฝ่าย (state.ws!=='company')
   เนื้อหาสลับตาม state.sub: 'ops' → แท็บปฏิบัติงาน, อื่นๆ → กลับไปหน้า ops */
function renderMobileNav(){
  const nav = document.getElementById('bottomNav');
  const fab = document.getElementById('fab');
  if(!nav || !fab) return;
  if(!isMobileMode() || state.ws==='company'){
    nav.innerHTML=''; fab.className='fab'; nav.style.display='none'; return;
  }
  nav.style.display='flex';
  // กำหนด items ของ bottom nav ตามหน้าปัจจุบัน
  let items=[]; let fabCfg=null;
  if(state.sub==='ops'){
    items = [['today','📅','วันนี้'],['req','📋','เบิกของ'],['reports','📝','รายงาน'],['submit','➕','แผน']];
    if(canApproveReq()) items.push(['approvals','✅','อนุมัติ']);
    // FAB: ที่หน้า today/reports → รายงานผลใหม่, ที่หน้า req → เบิกของใหม่
    if(state.opsTab==='today' || state.opsTab==='reports'){ fabCfg={label:'+',fn:'openFieldReport()'}; }
    else if(state.opsTab==='req' && canSubmitField(state.ws)){ fabCfg={label:'+',fn:'openRequisition()'}; }
    else if(state.opsTab==='submit'){ fabCfg=null; }
  } else {
    // หน้าอื่น (overview/projects/plan/cost/team) → bottom nav 4 ตัวหลัก: กลับ ops / โครงการ / เมนู / ฉัน
    items = [['__ops','⚡️','งาน'],['projects','📁','โครงการ'],['__menu','▦','เมนู'],['__user','👤','ฉัน']];
  }
  nav.innerHTML = items.map(t=>{
    const isActive = state.sub==='ops' ? (state.opsTab===t[0]) : (t[0]==='__ops');
    const fn = t[0]==='__ops' ? "goWsSub('"+state.ws+"','ops')"
      : t[0]==='__menu' ? "goWsSub('company','menu')"
      : t[0]==='__user' ? "toggleMenu('user')"
      : "switchOpsTab('"+t[0]+"')";
    return '<button class="bn-btn'+(isActive?' active':'')+'" style="--acc:var(--ink2)" onclick="'+fn+'">'+
      '<span class="ic">'+t[1]+'</span><span class="lb">'+esc(t[2])+'</span></button>';
  }).join('');
  // FAB
  if(fabCfg){
    fab.className='fab show'; fab.textContent=fabCfg.label;
    fab.setAttribute('onclick', fabCfg.fn);
    fab.setAttribute('aria-label','สร้างใหม่');
  } else {
    fab.className='fab'; fab.removeAttribute('onclick');
  }
}

async function loadMonthlySeries(projectIds, months){
  if(!projectIds.length) return [];
  const { data } = await sb.from('project_monthly').select('project_id,month,con_actual,cost_actual').in('project_id', projectIds).gte('month', months[0]).lte('month', months[months.length-1]);
  return data||[];
}
function sumDivision(projRows, monthRows, divId, month){
  const ids = new Set(projRows.filter(p=>p.division_id===divId).map(p=>p.id));
  const rows = monthRows.filter(m=>ids.has(m.project_id) && m.month===month);
  const agg = {rev:0,cost:0,n:rows.length};
  rows.forEach(r=>{ agg.rev+=+r.con_actual||0; agg.cost+=+r.cost_actual||0; });
  agg.gp = agg.rev - agg.cost;
  return agg;
}

async function fetchFieldPulseToday(divisionId){
  const today = new Date().toISOString().slice(0,10);
  let rq = sb.from('field_reports').select('*').gte('submitted_at', today);
  let qq = sb.from('requisitions').select('*').gte('created_at', today);
  let pq = sb.from('daily_plan').select('*').eq('status','รออนุมัติ').gte('created_at', today);
  if(divisionId){ rq = rq.eq('division_id',divisionId); qq = qq.eq('division_id',divisionId); pq = pq.eq('division_id',divisionId); }
  const [{data:reports},{data:reqs},{data:plans}] = await Promise.all([rq, qq, pq]);
  return { reports: reports||[], reqs: reqs||[], plans: plans||[] };
}

async function renderLauncher(){
  const p = state.profile, role = p.role, isAdmin = role==='admin';
  await loadAllProjects(); // ให้ตัวเลขโครงการในหัวข้อฝ่ายถูกต้อง
  // ฝ่ายตัวเองขึ้นก่อน (ถ้ามี) — คนหน้างานเจอของตัวเองทันที
  const divs = state.divisions.slice().sort((a,b)=>(a.id===p.division_id?-1:0)-(b.id===p.division_id?-1:0));
  const canOps = isAdmin||['pm','manager','eng','field'].includes(role);
  const canCost = isAdmin||['pm','manager','accountant'].includes(role);

  let html = '<div class="page"><div class="launcher-wrap">'+
    '<div class="launcher-head"><div class="t">เมนูหลัก</div>'+
    '<div class="s">เลือกส่วนงานที่ต้องการ — กดครั้งเดียวถึงเลย</div></div>';

  divs.forEach(d=>{
    const D = divCfg(d.id);
    if(d.id==='ops'){
      // ฝ่ายปฏิบัติแยกออกมาจาก pjcm แล้ว ไม่มีโครงการ/วางแผน/ต้นทุนของตัวเอง
      if(!canOps) return; // field/eng/pm/manager/admin เท่านั้นที่เข้าฝ่ายปฏิบัติได้
      html += launchSectHtml(D.icon, d.name, D.acc, D.soft)+'<div class="launch-grid">'+
        launcherTile('ops','ops','tool','ปฏิบัติงาน',D.acc,D.soft)+
        launcherTile('ops','team','users','ทีมงาน',D.acc,D.soft)+
      '</div>';
      return;
    }
    const nProj = state.projects.filter(x=>x.division_id===d.id).length;
    html += launchSectHtml(D.icon, d.name, D.acc, D.soft, nProj)+'<div class="launch-grid">'+
      launcherTile(d.id,'overview','bar-chart','ภาพรวมฝ่าย',D.acc,D.soft)+
      launcherTile(d.id,'projects','folder','โครงการ',D.acc,D.soft)+
      (canOps ? launcherTile(d.id,'plan','calendar','วางแผน',D.acc,D.soft) : '')+
      (canCost ? launcherTile(d.id,'cost','file-text','ต้นทุน',D.acc,D.soft) : '')+
    '</div>';
  });

  html += launchSectHtml('🏢','องค์กร',CO_CFG.acc,CO_CFG.soft)+'<div class="launch-grid">'+
    launcherTile('company','overview','grid','ภาพรวมองค์กร',CO_CFG.acc,CO_CFG.soft)+
    launcherTile('company','divisions','layers','เทียบฝ่าย',CO_CFG.acc,CO_CFG.soft)+
    launcherTile('company','finance','dollar-sign','การเงินรวม',CO_CFG.acc,CO_CFG.soft)+
    launcherTile('company','activity','activity','ความเคลื่อนไหว',CO_CFG.acc,CO_CFG.soft)+
  '</div>';

  if(isAdmin){
    html += launchSectHtml('⚙️','การจัดการระบบ','#334156','var(--soft)')+'<div class="launch-grid">'+
      launcherTile('company','users','user-check','ผู้ใช้งาน','#334156','var(--soft)')+
      launcherTile('company','targets','target','เป้าหมายบริษัท','#334156','var(--soft)')+
      launcherTile('company','audit','clipboard','ประวัติการใช้งาน','#334156','var(--soft)')+
    '</div>';
  }
  html += '</div></div>';
  content(html);
}

  const monthly = await loadMonthlySeries(divProjects.map(p=>p.id), months);
  const revSeries = months.map(m=>sumDivision(projects,monthly,state.ws,m).rev);
  const costSeries = months.map(m=>sumDivision(projects,monthly,state.ws,m).cost);
  const curAgg = sumDivision(projects,monthly,state.ws,months[months.length-1]);
  const budget = divProjects.reduce((a,p)=>a+(+p.total_amt||0),0);
  const { data: teams } = await sb.from('teams').select('*').eq('division_id',state.ws).order('name');

async function renderProjectDetail(projId){
  const D = divCfg(state.ws);
  const { data: p } = await sb.from('projects').select('*').eq('id', projId).single();
  if(!document.getElementById('projDetailHost')) return; // navigated away while loading
  if(!p){ document.getElementById('projDetailHost').innerHTML = '<div class="empty">ไม่พบโครงการ</div>'; return; }
  const [{data:months},{data:fin},{data:sc},{data:loss},{data:stk},{data:mile},{data:cost},{data:att},{data:tasks}] = await Promise.all([
    sb.from('project_monthly').select('*').eq('project_id', projId).order('month', {ascending:false}),
    sb.from('financials').select('*').eq('project_id', projId).order('month', {ascending:false}),
    sb.from('scurve').select('*').eq('project_id', projId).order('month'),
    sb.from('losses').select('*').eq('project_id', projId).order('month', {ascending:false}),
    sb.from('stock').select('*').eq('project_id', projId).order('material'),
    sb.from('milestones').select('*').eq('project_id', projId).order('sort_order'),
    sb.from('cost_entries').select('*').eq('project_id', projId).order('entry_date', {ascending:false}),
    sb.from('attachments').select('*').eq('project_id', projId).order('uploaded_at', {ascending:false}),
    sb.from('project_tasks').select('*').eq('project_id', projId).order('sort_order'),
  ]);
  const rows = months||[];
  const totalSpent = rows.reduce((s,r)=>s+(+r.cost_actual||0),0);
  const totalCon = rows.reduce((s,r)=>s+(+r.con_actual||0),0);
  const remaining = (p.total_amt||0) - totalCon;
  const gp = totalCon - totalSpent;
  const editable = canWrite(p.division_id);
  state.cache.proj = { p, months:rows, fin:fin||[], sc:sc||[], loss:loss||[], stk:stk||[], mile:mile||[], cost:cost||[], att:att||[], tasks:tasks||[] };
  const spentPct = p.total_amt>0 ? Math.round(totalSpent/p.total_amt*100) : 0;
  const marginPct = totalCon>0 ? ((totalCon-totalSpent)/totalCon*100) : 0;
  const progressPct = p.total_amt>0 ? Math.min(100, Math.round(totalCon/p.total_amt*100)) : 0;

  const milestones = (mile||[]).map(m=>({ name:m.name, done:m.status==='เสร็จแล้ว', active:m.status==='กำลังทำ', due:m.due_date }));

  let html = '<div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:20px">'+
    '<div style="width:52px;height:52px;border-radius:16px;background:'+D.soft+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px">'+D.icon+'</div>'+
    '<div style="flex:1"><div style="display:flex;align-items:center;gap:9px;margin-bottom:3px"><span class="badge">'+esc(p.code)+'</span>'+statusPill(p.status)+'</div>'+
    '<div style="font-size:20px;font-weight:700;color:var(--ink);line-height:1.2;letter-spacing:-.2px">'+esc(p.name)+'</div>'+
    '<div style="display:flex;gap:16px;margin-top:7px;font-size:12px;color:var(--muted);flex-wrap:wrap"><span>📍 '+esc(p.location||'-')+'</span><span>🏢 '+esc(p.client||'-')+'</span><span>👤 '+esc(p.pm||'-')+'</span></div></div>'+
    (editable ? '<button class="btn btn-primary btn-sm" style="--acc:'+D.acc+';--acc2:'+D.acc2+'" onclick="projTab(\'overview\')">รายงานความคืบหน้า</button>'+
      '<button class="btn btn-ghost btn-sm" onclick=\'openProject('+JSON.stringify(p)+')\'>แก้ไข</button>' : '')+
    '</div>'+
    '<div class="grid g4" style="margin-bottom:14px">'+
      miniStat('มูลค่าสัญญา','฿'+fmt(p.total_amt))+
      '<div class="mini"><div class="lb">ใช้ไปแล้ว</div><div class="vl tnum" style="color:'+D.acc+'">฿'+fmt(totalSpent)+'</div><div style="font-size:10.5px;color:var(--muted2)">'+spentPct+'% ของสัญญา</div></div>'+
      miniStat('คงเหลือ','฿'+fmt(remaining),'#0D9488')+
      miniStat('กำไรขั้นต้น',marginPct.toFixed(1)+'%','#4338CA')+
    '</div>'+
    '<div class="grid" style="grid-template-columns:1fr 1.4fr;align-items:stretch">'+
      '<div class="card" style="display:flex;flex-direction:column;align-items:center">'+
        '<div class="card-t" style="align-self:flex-start;margin-bottom:6px">ความคืบหน้ารวม (บิล/สัญญา)</div>'+

      '<div class="card" style="margin-top:0"><div class="card-t" style="margin-bottom:14px">ขั้นตอนงาน (Milestones)'+(editable?' <button class="btn btn-ghost btn-sm" style="float:right" onclick="openMilestone(\''+p.id+'\')">+ เพิ่ม</button>':'')+'</div>'+
        (!milestones.length ? '<div class="empty">ยังไม่มีขั้นตอนงาน</div>' : milestones.map(m=>
          '<div style="display:flex;gap:12px;align-items:flex-start;padding-bottom:14px">'+
          '<div style="width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:'+(m.done?'#E4F7F3':(m.active?'#fff':'#EEF1F8'))+';border:2px solid '+(m.done?'#0D9488':(m.active?D.acc:'#D7DEEC'))+'">'+(m.done?'✓':'')+'</div>'+
          '<div style="flex:1;padding-top:2px"><div style="font-size:12.5px;font-weight:500;color:'+(m.done||m.active?'var(--ink)':'var(--muted2)')+'">'+esc(m.name)+'</div><div style="font-size:10.5px;color:var(--muted2)">'+(m.done?'เสร็จสมบูรณ์':(m.active?'กำลังดำเนินการ':'รอดำเนินการ'))+(m.due?' · '+thDate(m.due):'')+'</div></div></div>').join(''))+
      '</div></div>'+
    '<div class="card" style="margin-top:14px"><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;border-bottom:1px solid var(--line);padding-bottom:12px">'+
      [['wbs','🗓️ แผนโครงการ'],['overview','📅 รายเดือน'],['fin','💰 การเงิน'],['scurve','📈 S-Curve'],['loss','⚠️ ความเสียหาย'],['stock','📦 สต็อก'],['att','📎 เอกสารแนบ']].map(t=>
        '<button class="btn btn-sm '+(state.projTab===t[0]?'btn-primary':'btn-ghost')+'" style="--acc:'+D.acc+';--acc2:'+D.acc2+'" onclick="projTab(\''+t[0]+'\')">'+t[1]+'</button>').join('')+
    '</div><div id="projTabBody"></div></div>';
  if(!document.getElementById('projDetailHost')) return; // navigated away while loading
  document.getElementById('projDetailHost').innerHTML = html;

/* ============================================================
 * PROJECT-LEVEL WBS/Gantt ("แผนโครงการ" tab) — MS Project style, parent/child rollup
 * ============================================================ */
function buildTaskTree(tasks){
  const byId = {}; tasks.forEach(t=>{ byId[t.id] = {...t, children:[]}; });
  const roots = [];
  tasks.forEach(t=>{ const node=byId[t.id]; if(t.parent_id && byId[t.parent_id]) byId[t.parent_id].children.push(node); else roots.push(node); });
  const sortRec = arr=>{ arr.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)); arr.forEach(n=>sortRec(n.children)); };
  sortRec(roots);
  return roots;
}
function rollupNode(node){
  if(!node.children.length){
    const s = new Date(node.start_date+'T00:00:00'); const dur = Math.max(1,+node.duration||1);
    node._roll = { start:s, end:addDays(s,dur-1), pct:+node.pct||0, dur };
    return node._roll;
  }
  let start=null, end=null, weighted=0, totalDur=0;
  node.children.forEach(ch=>{ const r=rollupNode(ch);
    if(!start||r.start<start) start=r.start; if(!end||r.end>end) end=r.end;
    weighted += r.pct*r.dur; totalDur += r.dur; });
  node._roll = { start, end, pct: totalDur>0?weighted/totalDur:0, dur: totalDur };
  return node._roll;
}
function flattenTree(nodes, depth, collapsed, out){
  out = out||[];
  nodes.forEach(n=>{ out.push({node:n, depth});
    if(!collapsed.has(n.id) && n.children.length) flattenTree(n.children, depth+1, collapsed, out); });
  return out;
}
function toggleWbsNode(id){
  if(!state.cache.wbsCollapsed) state.cache.wbsCollapsed = new Set();
  if(state.cache.wbsCollapsed.has(id)) state.cache.wbsCollapsed.delete(id); else state.cache.wbsCollapsed.add(id);
  projTab('wbs');
}
function renderProjectWBS(c, p, D, editable){
  if(!state.cache.wbsCollapsed) state.cache.wbsCollapsed = new Set();
  const tasks = c.tasks||[];
  let out = renderWbsGridTable(tasks, p.id, D, editable);
  if(tasks.length) out += '<div style="margin-top:16px">'+renderWbsGanttChart(tasks, D, editable)+'</div>';
  return out;
}
/* ---------- ตารางแก้ไข WBS แบบ Excel: พิมพ์ตรง cell, Tab เลื่อนช่อง (DOM order เดิมของ browser),
   Enter เลื่อนลงแถวถัดไป (แถวสุดท้ายกด Enter = เพิ่มแถวใหม่อัตโนมัติ), วางข้อมูลหลายแถวจาก Excel ได้ที่ช่องชื่องาน ---------- */
function renderWbsGridTable(tasks, projId, D, editable){
  const addRow = editable ? '<div style="padding:10px 2px 0"><button class="btn btn-ghost btn-sm" onclick="addWbsRow(\''+projId+'\')">+ เพิ่มแถว</button>'+
    (tasks.length ? ' <span style="font-size:11px;color:var(--muted2);margin-left:6px">พิมพ์ตรง cell ได้เลย · Tab/Enter เลื่อนช่อง · วางข้อมูลจาก Excel ที่ช่องชื่องานได้</span>' : '')+'</div>' : '';
  if(!tasks.length) return '<div class="card"><div class="empty">ยังไม่มีแผนโครงการ (WBS)</div></div>'+addRow;
  const tree = buildTaskTree(tasks); tree.forEach(rollupNode);
  const flat = flattenTree(tree, 0, new Set()); // ตารางแก้ไขกางดูครบทุกแถวเสมอ (ย่อ/ขยายอยู่ที่ผังแกนต์ด้านล่างแทน)
  const rows = flat.map(({node,depth})=>{
    const isSummary = node.children.length>0;
    const parentOpts = '<option value="">— งานหลัก —</option>'+tasks.filter(t=>t.id!==node.id).map(t=>'<option value="'+t.id+'"'+(node.parent_id===t.id?' selected':'')+'>'+esc(t.name)+'</option>').join('');
    const nameCell = editable
      ? '<input class="wbs-in" data-tid="'+node.id+'" data-f="name" value="'+esc(node.name)+'" style="padding-left:'+(6+depth*16)+'px;font-weight:'+(isSummary?700:500)+'" onkeydown="wbsCellKey(event,this)" onblur="wbsCellSave(this)" onpaste="wbsCellPaste(event,this)">'
      : '<span style="display:block;padding-left:'+(6+depth*16)+'px;font-weight:'+(isSummary?700:500)+'">'+esc(node.name)+'</span>';
    const parentCell = editable
      ? '<select class="wbs-in" data-tid="'+node.id+'" data-f="parent_id" onkeydown="wbsCellKey(event,this)" onchange="wbsCellSave(this)">'+parentOpts+'</select>'
      : '<span style="color:var(--muted)">'+(node.parent_id?esc((tasks.find(t=>t.id===node.parent_id)||{}).name||'-'):'—')+'</span>';
    let dateCell, durCell, pctCell;
    if(isSummary){
      const r = node._roll;
      dateCell = '<span class="tnum" style="color:var(--muted)">'+thDate(ymd(r.start))+'</span>';
      durCell = '<span class="tnum" style="color:var(--muted)">'+r.dur+'</span>';
      pctCell = '<span class="tnum" style="color:'+D.acc+';font-weight:700">'+Math.round(r.pct)+'% <span style="font-size:9.5px;color:var(--muted2);font-weight:500">รวม</span></span>';
    } else if(editable){
      dateCell = '<input type="date" class="wbs-in tnum" data-tid="'+node.id+'" data-f="start_date" value="'+esc(node.start_date)+'" onkeydown="wbsCellKey(event,this)" onblur="wbsCellSave(this)">';
      durCell = '<input type="number" class="wbs-in tnum" data-tid="'+node.id+'" data-f="duration" value="'+(node.duration||1)+'" min="1" onkeydown="wbsCellKey(event,this)" onblur="wbsCellSave(this)">';
      pctCell = '<input type="number" class="wbs-in tnum" data-tid="'+node.id+'" data-f="pct" value="'+(node.pct||0)+'" min="0" max="100" onkeydown="wbsCellKey(event,this)" onblur="wbsCellSave(this)">';
    } else {
      dateCell = '<span class="tnum">'+thDate(node.start_date)+'</span>';
      durCell = '<span class="tnum">'+(node.duration||1)+'</span>';
      pctCell = '<span class="tnum">'+Math.round(node.pct||0)+'%</span>';
    }
    return '<tr>'+
      '<td>'+nameCell+'</td>'+
      '<td>'+parentCell+'</td>'+
      '<td class="num">'+dateCell+'</td>'+
      '<td class="num">'+durCell+'</td>'+
      '<td class="num">'+pctCell+'</td>'+
      (editable ? '<td class="num"><button class="btn btn-ghost btn-sm" style="padding:2px 8px" onclick="deleteProjectTask(\''+node.id+'\',\''+projId+'\')" title="ลบแถว">🗑</button></td>' : '')+
    '</tr>';
  }).join('');
  return '<div class="card wbs-table" style="padding:0;overflow:hidden"><div class="table-wrap" style="border:none"><table><thead><tr>'+
    '<th style="min-width:220px">ชื่องาน</th><th style="min-width:150px">อยู่ภายใต้</th><th class="num">เริ่มวันที่</th><th class="num">ระยะ(วัน)</th><th class="num">%</th>'+(editable?'<th></th>':'')+
    '</tr></thead><tbody id="wbsGridBody">'+rows+'</tbody></table></div></div>'+addRow;
}
function wbsCellKey(e, el){
  if(e.key==='Enter'){ e.preventDefault(); el.blur(); moveWbsFocus(el, 1); }
}
function moveWbsFocus(fromEl, rowDelta){
  const field = fromEl.dataset.f;
  const rows = Array.from(document.querySelectorAll('#wbsGridBody tr'));
  const idx = rows.indexOf(fromEl.closest('tr'));
  const targetRow = rows[idx+rowDelta];
  if(!targetRow){ if(rowDelta>0 && state.cache.proj) addWbsRow(state.cache.proj.p.id); return; }
  const targetInput = targetRow.querySelector('[data-f="'+field+'"]') || targetRow.querySelector('[data-f="name"]');
  if(targetInput) targetInput.focus();
}
async function wbsCellSave(el){
  const tid = el.dataset.tid, f = el.dataset.f;
  let v = el.value;
  if(f==='name' && !v.trim()){ toast('ชื่องานห้ามว่าง','err'); el.focus(); return; }
  if(f==='duration') v = +v||1;
  if(f==='pct') v = Math.max(0, Math.min(100, +v||0));
  if(f==='parent_id') v = v||null;
  const rec = {}; rec[f] = v;
  const { error } = await sb.from('project_tasks').update(rec).eq('id',tid);
  if(error){ toast(error.message,'err'); return; }
  await refreshWbs();
}
async function wbsCellPaste(e, el){
  const text = (e.clipboardData || window.clipboardData).getData('text');
  if(!text || !/[\t\n]/.test(text.trim())) return; // ค่าเดียว ปล่อยให้ paste ปกติทำงาน
  e.preventDefault();
  const c = state.cache.proj; if(!c) return;
  const projId = c.p.id;
  const rowsText = text.split(/\r?\n/).filter(l=>l.trim().length);
  const allRows = Array.from(document.querySelectorAll('#wbsGridBody tr'));
  const startIdx = allRows.findIndex(tr=>{ const n=tr.querySelector('[data-f="name"]'); return n && n.dataset.tid===el.dataset.tid; });
  const { data:{ user } } = await sb.auth.getUser();
  for(let i=0;i<rowsText.length;i++){
    const [name, startDate, duration, pct] = rowsText[i].split('\t');
    const targetTr = allRows[startIdx+i];
    if(targetTr){
      const tid = targetTr.querySelector('[data-f="name"]').dataset.tid;
      const rec = {};
      if(name!=null && name.trim()) rec.name = name.trim();
      if(startDate) rec.start_date = normalizeWbsDate(startDate);
      if(duration) rec.duration = +duration||1;
      if(pct) rec.pct = Math.max(0, Math.min(100, +String(pct).replace('%','')||0));
      if(Object.keys(rec).length) await sb.from('project_tasks').update(rec).eq('id',tid);
    } else {
      await sb.from('project_tasks').insert({ project_id:projId, parent_id:null, name:(name||'งานใหม่').trim(),
        start_date: startDate?normalizeWbsDate(startDate):new Date().toISOString().slice(0,10),
        duration:+duration||1, pct: pct?Math.max(0,Math.min(100,+String(pct).replace('%','')||0)):0,
        sort_order:(c.tasks||[]).length+i, created_by:user.id });
    }
  }
  toast('วางข้อมูล '+rowsText.length+' แถวเรียบร้อย','ok');
  await refreshWbs();
}
function normalizeWbsDate(s){
  s = (s||'').trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d = new Date(s);
  return isNaN(d) ? new Date().toISOString().slice(0,10) : d.toISOString().slice(0,10);
}
async function addWbsRow(projId){
  const c = state.cache.proj; if(!c) return;
  const { data:{ user } } = await sb.auth.getUser();
  const rec = { project_id:projId, parent_id:null, name:'งานใหม่', start_date:new Date().toISOString().slice(0,10), duration:1, pct:0, sort_order:(c.tasks||[]).length, created_by:user.id };
  const { data, error } = await sb.from('project_tasks').insert(rec).select().single();
  if(error){ toast(error.message,'err'); return; }
  await refreshWbs();
  const el = document.querySelector('.wbs-in[data-tid="'+data.id+'"][data-f="name"]');
  if(el){ el.focus(); el.select(); }
}
async function refreshWbs(){
  const c = state.cache.proj; if(!c) return;
  const { data: tasks } = await sb.from('project_tasks').select('*').eq('project_id', c.p.id).order('sort_order');
  c.tasks = tasks||[];
  const host = document.getElementById('projTabBody'); if(!host || state.projTab!=='wbs') return;
  host.innerHTML = renderProjectWBS(c, c.p, divCfg(state.ws), canWrite(c.p.division_id));
}
async function deleteProjectTask(taskId, projId){
  if(!confirm('ลบงานนี้? (งานย่อยภายใต้งานนี้จะถูกลบด้วย)')) return;
  const { error } = await sb.from('project_tasks').delete().eq('id',taskId);
  if(error){ toast(error.message,'err'); return; }
  toast('ลบแล้ว','ok'); refreshWbs();
}
/* ---------- ลากแท่ง Gantt เพื่อเลื่อนวันที่ (เฉพาะงานย่อย ไม่ใช่ summary bar ซึ่งเป็นค่า rollup) ----------
   ลากด้วย transform:translateX เป็น preview ระหว่างลาก แล้วค่อยคำนวณ day delta ตอนปล่อยเมาส์ค่อยบันทึกจริง */
// เลื่อนวันแบบ pure UTC (ไม่ผ่าน local Date object) กัน off-by-one เวลา toISOString() แปลง timezone แล้วข้ามวัน
function shiftDateStr(dateStr, days){
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m-1, d));
  dt.setUTCDate(dt.getUTCDate()+days);
  return dt.toISOString().slice(0,10);
}
let _wbsDrag = null;
function wbsBarDragStart(e, barEl, colW){
  e.preventDefault();
  _wbsDrag = { barEl, startX:e.clientX, colW, taskId:barEl.dataset.taskId, dayDelta:0 };
  barEl.style.cursor = 'grabbing'; barEl.style.zIndex = 10;
  document.addEventListener('mousemove', wbsBarDragMove);
  document.addEventListener('mouseup', wbsBarDragEnd);
}
function wbsBarDragMove(e){
  if(!_wbsDrag) return;
  const dayDelta = Math.round((e.clientX - _wbsDrag.startX) / _wbsDrag.colW);
  _wbsDrag.dayDelta = dayDelta;
  _wbsDrag.barEl.style.transform = 'translateX('+(dayDelta*_wbsDrag.colW)+'px)';
  _wbsDrag.barEl.style.boxShadow = '0 4px 14px -2px rgba(16,24,40,.35)';
}
async function wbsBarDragEnd(){
  if(!_wbsDrag) return;
  document.removeEventListener('mousemove', wbsBarDragMove);
  document.removeEventListener('mouseup', wbsBarDragEnd);
  const { taskId, dayDelta, barEl } = _wbsDrag; _wbsDrag = null;
  barEl.style.cursor='grab'; barEl.style.zIndex=''; barEl.style.boxShadow='';
  if(!dayDelta) return; // แค่คลิกเฉยๆ ไม่ได้ลาก
  const task = (state.cache.proj && state.cache.proj.tasks || []).find(t=>t.id===taskId);
  if(!task){ barEl.style.transform=''; return; }
  const newStart = shiftDateStr(task.start_date, dayDelta);
  const { error } = await sb.from('project_tasks').update({start_date:newStart}).eq('id',taskId);
  if(error){ toast(error.message,'err'); barEl.style.transform=''; return; }
  toast('เลื่อนวันที่ '+(dayDelta>0?'+':'')+dayDelta+' วันเรียบร้อย','ok');
  refreshWbs();
}
/* ---------- ผังแกนต์ (rollup งานสรุปอัตโนมัติจากงานย่อย, ลากแท่งงานย่อยเพื่อเลื่อนวันได้ถ้าแก้ไขได้) ---------- */
function renderWbsGanttChart(tasks, D, editable){
  if(!state.cache.wbsCollapsed) state.cache.wbsCollapsed = new Set();
  const tree = buildTaskTree(tasks); tree.forEach(rollupNode);
  const flat = flattenTree(tree, 0, state.cache.wbsCollapsed);
  let winStart=null, winEnd=null;
  tree.forEach(n=>{ if(!winStart||n._roll.start<winStart) winStart=n._roll.start; if(!winEnd||n._roll.end>winEnd) winEnd=n._roll.end; });
  if(!winStart){ winStart=new Date(); winEnd=addDays(winStart,30); }
  const N = Math.max(1, Math.round((winEnd-winStart)/86400000)+1);
  const colW = N>90?18:(N>45?26:40);
  const today = new Date(); today.setHours(0,0,0,0);
  const todayIdx = Math.round((today-winStart)/86400000);

  let labelCol = '<div style="height:40px;display:flex;align-items:flex-end;padding-bottom:8px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--line);margin-bottom:6px">ผังแกนต์'+(editable?' <span style="text-transform:none;font-weight:500;color:var(--muted2)">· ลากแท่งงานเพื่อเลื่อนวันได้</span>':'')+'</div>';
  let gridRows = '';
  flat.forEach(({node,depth})=>{
    const r = node._roll; const isSummary = node.children.length>0;
    const sIdx = Math.max(0, Math.round((r.start-winStart)/86400000));
    const eIdx = Math.min(N-1, Math.round((r.end-winStart)/86400000));
    const span = Math.max(1, eIdx-sIdx+1);
    const collapsed = state.cache.wbsCollapsed.has(node.id);
    labelCol += '<div style="height:38px;display:flex;align-items:center;gap:6px;padding:0 8px 0 '+(6+depth*16)+'px;border-bottom:1px solid #F5F7FC">'+
      (node.children.length ? '<span style="cursor:pointer;font-size:10px;color:var(--muted);width:12px;flex-shrink:0" onclick="toggleWbsNode(\''+node.id+'\')">'+(collapsed?'▶':'▼')+'</span>' : '<span style="width:12px;flex-shrink:0"></span>')+
      '<div style="flex:1;min-width:0"><div style="font-size:'+(isSummary?'12.5px':'12px')+';font-weight:'+(isSummary?700:500)+';color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(node.name)+'</div></div>'+
      '<span style="font-size:10.5px;font-weight:700;color:'+(r.pct>=100?'#0D9488':D.acc)+';font-family:var(--disp);flex-shrink:0">'+Math.round(r.pct)+'%</span>'+
      '</div>';
    let cells=''; for(let i=0;i<N;i++){ cells+='<div style="height:100%"></div>'; }
    const barColor = isSummary ? '#334156' : D.acc;
    const draggable = editable && !isSummary;
    gridRows += '<div style="height:38px;border-bottom:1px solid #F5F7FC"><div style="display:grid;grid-template-columns:repeat('+N+','+colW+'px);height:100%;position:relative">'+cells+
      (todayIdx>=0&&todayIdx<N?'<div style="position:absolute;top:0;bottom:0;left:'+((todayIdx+0.5)*colW)+'px;width:2px;background:var(--red);opacity:.5;z-index:3"></div>':'')+
      '<div'+(draggable?' data-task-id="'+node.id+'" onmousedown="wbsBarDragStart(event,this,'+colW+')" title="ลากเพื่อเลื่อนวันที่"':'')+
      ' style="grid-column:'+(sIdx+1)+' / span '+span+';align-self:center;height:'+(isSummary?'10px':'20px')+';background:'+(isSummary?barColor:barColor+'1A')+';border-radius:'+(isSummary?'3px':'999px')+';position:relative;margin:0 2px;overflow:hidden'+(draggable?';cursor:grab':'')+'">'+
      (isSummary ? '' : '<div style="height:100%;width:'+r.pct+'%;background:'+barColor+';border-radius:999px;pointer-events:none"></div>')+
      '</div></div></div>';
  });
  let dayHeader = '<div style="display:grid;grid-template-columns:repeat('+N+','+colW+'px);height:40px;border-bottom:1px solid var(--line);margin-bottom:6px">';
  for(let i=0;i<N;i++){ const d=addDays(winStart,i); const showLabel = colW>=26 || d.getDate()===1 || i===0;
    dayHeader += '<div style="display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:9px;color:#94A3B8;white-space:nowrap">'+(showLabel?(d.getDate()+((d.getDate()===1||i===0)?' '+MONTH_T[d.getMonth()]:'')):'')+'</div>'; }
  dayHeader += '</div>';

  return '<div class="card" style="border-radius:16px;overflow:hidden;padding:0">'+
    '<div style="display:flex">'+
    '<div style="width:260px;flex-shrink:0;padding:0 4px 8px 4px;border-right:1px solid #EEF1F8">'+labelCol+'</div>'+
    '<div style="flex:1;overflow-x:auto"><div style="min-width:'+(N*colW)+'px">'+dayHeader+gridRows+'</div></div>'+
    '</div></div>';
}

function projTab(tab){
  state.projTab = tab;
  document.querySelectorAll('#projTabBody').length; // noop guard
  const host = document.getElementById('projTabBody'); if(!host) return;
  document.querySelectorAll('[data-ptab]').forEach(b=>{});
  refreshProjTabButtons(tab);
  const c = state.cache.proj; const p = c.p; const editable = canWrite(p.division_id); const D = divCfg(state.ws);
  if(tab==='wbs'){
    host.innerHTML = renderProjectWBS(c, p, D, editable);
  } else if(tab==='overview'){
    host.innerHTML = (editable ? '<div style="margin-bottom:12px"><button class="btn btn-primary btn-sm" style="--acc:var(--teal);--acc2:#14b8a6" onclick="openAddMonthRow()">+ เพิ่มเดือน</button>'+
      (c.months.length ? ' <span style="font-size:11px;color:var(--muted2);margin-left:6px">พิมพ์ตรง cell ได้เลย · Tab/Enter เลื่อนช่อง · กด ⋯ ที่แถวเพื่อกรอกวันส่งงาน/วางบิล/หมายเหตุ</span>' : '')+'</div>' : '')+
      projMonthlyGridHtml(c.months, editable);
  } else if(tab==='fin'){
    host.innerHTML = (editable?'<div style="margin-bottom:12px"><button class="btn btn-primary btn-sm" style="--acc:var(--teal);--acc2:#14b8a6" onclick="openFinancialEntry(\''+p.id+'\')">+ บันทึกข้อมูลการเงิน</button></div>':'')+
      (!c.fin.length ? '<div class="empty">ยังไม่มีข้อมูลการเงิน</div>' :
      '<div class="table-wrap"><table><thead><tr><th>เดือน</th><th class="num">วางบิลแล้ว</th><th class="num">ยังไม่วางบิล</th><th class="num">WIP</th>'+
      '<th class="num">เงินเข้า</th><th class="num">เงินออก</th><th class="num">คงเหลือ</th><th class="num">AR ค้าง</th><th class="num">AP ค้าง</th></tr></thead><tbody>'+

        '<td class="num tnum">'+fmt(r.wip)+'</td><td class="num tnum">'+fmt(r.cash_in)+'</td><td class="num tnum">'+fmt(r.cash_out)+'</td>'+
        '<td class="num tnum">'+fmt(r.cash_bal)+'</td><td class="num tnum">'+fmt(r.ar_aging)+'</td><td class="num tnum">'+fmt(r.ap_aging)+'</td></tr>').join('')+
      '</tbody></table></div>');
  } else if(tab==='scurve'){
    host.innerHTML = (editable?'<div style="margin-bottom:12px"><button class="btn btn-primary btn-sm" style="--acc:var(--teal);--acc2:#14b8a6" onclick="openScurveEntry(\''+p.id+'\')">+ บันทึก S-Curve</button></div>':'')+
      (!c.sc.length ? '<div class="empty">ยังไม่มีข้อมูล S-Curve</div>' :
      svgLineChart(c.sc.map(r=>+r.actual_work||0), c.sc.map(r=>+r.plan_work||0), '#2F6FED', c.sc.map(r=>MONTH_T[+r.month.split('-')[1]-1])));
  } else if(tab==='loss'){
    host.innerHTML = (editable?'<div style="margin-bottom:12px"><button class="btn btn-primary btn-sm" style="--acc:var(--teal);--acc2:#14b8a6" onclick="openLossEntry(\''+p.id+'\')">+ บันทึกความเสียหาย</button></div>':'')+
      (!c.loss.length ? '<div class="empty">ไม่มีข้อมูลความเสียหาย</div>' :
      '<div class="table-wrap"><table><thead><tr><th>เดือน</th><th class="num">รวม</th><th class="num">ความประมาท</th><th class="num">อุปสรรคใต้ดิน</th>'+
      '<th class="num">รูปแบบก่อสร้าง</th><th class="num">เครื่องจักร</th><th class="num">ร้องเรียน</th><th class="num">อื่นๆ</th></tr></thead><tbody>'+
      c.loss.map(r=>'<tr><td>'+thMonth(r.month)+'</td><td class="num tnum" style="color:var(--red);font-weight:700">'+fmt(r.total_loss)+'</td>'+
        '<td class="num tnum">'+fmt(r.neglect)+'</td><td class="num tnum">'+fmt(r.underground)+'</td><td class="num tnum">'+fmt(r.construction)+'</td>'+
        '<td class="num tnum">'+fmt(r.machinery)+'</td><td class="num tnum">'+fmt(r.complaint)+'</td><td class="num tnum">'+fmt(r.other)+'</td></tr>').join('')+
      '</tbody></table></div>');
  } else if(tab==='stock'){
    host.innerHTML = (editable?'<div style="margin-bottom:12px"><button class="btn btn-primary btn-sm" style="--acc:var(--teal);--acc2:#14b8a6" onclick="openStockEntry(\''+p.id+'\')">+ เพิ่มวัสดุ</button></div>':'')+
      (!c.stk.length ? '<div class="empty">ไม่มีข้อมูลสต็อก</div>' :
      '<div class="table-wrap"><table><thead><tr><th>วัสดุ</th><th>หน่วย</th><th class="num">จำนวนคงเหลือ</th><th class="num">มูลค่าคงเหลือ</th></tr></thead><tbody>'+
      c.stk.map(r=>'<tr><td>'+esc(r.material)+'</td><td>'+esc(r.unit||'-')+'</td><td class="num tnum">'+fmt(r.qty_balance)+'</td><td class="num tnum">'+fmt(r.amount_balance)+'</td></tr>').join('')+
      '</tbody></table></div>');
  } else if(tab==='att'){
    host.innerHTML = (editable?'<div style="margin-bottom:12px"><input type="file" id="att_file" style="display:inline-block;max-width:280px"> '+
      '<button class="btn btn-primary btn-sm" style="--acc:var(--teal);--acc2:#14b8a6" onclick="uploadAttachment(\''+p.id+'\')">📎 อัปโหลด</button></div>':'')+
      (!c.att.length ? '<div class="empty">ยังไม่มีเอกสารแนบ</div>' :
      '<div class="table-wrap"><table><thead><tr><th>ไฟล์</th><th>อัปโหลดเมื่อ</th><th></th></tr></thead><tbody>'+
      c.att.map(r=>'<tr><td><a href="'+esc(r.file_url)+'" target="_blank" rel="noopener">'+esc(r.name)+'</a></td>'+
        '<td>'+thDate((r.uploaded_at||'').slice(0,10))+'</td>'+
        '<td>'+(editable?'<button class="btn btn-ghost btn-sm" onclick="delAttachment(\''+r.id+'\',\''+p.id+'\')">ลบ</button>':'')+'</td></tr>').join('')+
      '</tbody></table></div>');
  }
}
function refreshProjTabButtons(tab){
  const D = divCfg(state.ws);

/* ============================================================
 * DIVISION: PLAN — Day (Gantt) / Month (capacity heatmap) / Year (roadmap)
 * ============================================================ */
async function renderPlanPage(){
  const D = divCfg(state.ws);
  const { data: teams } = await sb.from('teams').select('*').eq('division_id',state.ws).order('name');
  state.cache.teams = teams||[];
  await loadAllProjects();
  const rangeLabel = state.planView==='day'?'แผนงานรายวัน':(state.planView==='month'?'แผนกำลังคนรายเดือน · ปี '+(new Date().getFullYear()+543):'แผนภาพรวมโครงการรายปี · ปี '+(new Date().getFullYear()+543));
  let html = '<div class="page wide">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">'+
      '<div style="display:flex;background:#fff;border:1px solid var(--line);border-radius:16px;padding:3px">'+
      [['day','รายวัน'],['month','รายเดือน'],['year','รายปี']].map(t=>
        '<button onclick="switchPlanView(\''+t[0]+'\')" style="padding:7px 16px;border:none;border-radius:12px;font-family:inherit;font-size:12px;font-weight:'+(state.planView===t[0]?600:500)+';cursor:pointer;background:'+(state.planView===t[0]?D.acc:'transparent')+';color:'+(state.planView===t[0]?'#fff':'#5B6B84')+'">'+t[1]+'</button>').join('')+
      '</div><div style="font-size:12.5px;color:#5B6B84">'+rangeLabel+'</div><div style="flex:1"></div>'+
      (canWrite(state.ws)?'<button class="btn btn-primary btn-sm" style="--acc:'+D.acc+';--acc2:'+D.acc2+'" onclick="openDailyTask()">+ มอบหมายงานใหม่</button>':'')+
    '</div><div id="planBody"></div></div>';
  content(html);
  if(state.planView==='day') await planDay(D);
  else if(state.planView==='month') await planMonth(D);
  else await planYear(D);
}
function switchPlanView(v){ state.planView=v; renderPlanPage(); }

function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function ymd(d){ return d.toISOString().slice(0,10); }
const WD_T = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
const TEAM_TAG_COLORS = ['#2F6FED','#0D9488','#7C3AED','#D97706','#DC2626','#0891B2'];
function planShiftWeek(n){ state.cache.planMonthOffset = (state.cache.planMonthOffset||0) + n; planDay(divCfg(state.ws)); }
function planJumpToday(){ state.cache.planMonthOffset = 0; planDay(divCfg(state.ws)); }

async function planDay(D){
  const colW=40;
  const today = new Date(); today.setHours(0,0,0,0);
  const monthOffset = state.cache.planMonthOffset||0;
  const baseYear = today.getFullYear(), baseMonth = today.getMonth()+monthOffset;
  const winStart = new Date(baseYear, baseMonth, 1);
  const N = new Date(baseYear, baseMonth+1, 0).getDate(); // days in this calendar month
  const winEnd = new Date(baseYear, baseMonth, N);
  const fetchFrom = ymd(addDays(winStart,-60));
  const { data: rows } = await sb.from('daily_plan').select('*').eq('division_id',state.ws).eq('status','อนุมัติ')
    .gte('start_date', fetchFrom).lte('start_date', ymd(winEnd)).order('created_at');
  const body = document.getElementById('planBody');
  if(!body) return; // user navigated away from Plan page before this fetch finished — don't crash writing into a gone element

  const byTeam = {};
  (state.cache.teams||[]).forEach(t=>{ byTeam[t.id] = []; }); // show every team as a row even with zero tasks
  (rows||[]).forEach(r=>{
    const s = new Date(r.start_date+'T00:00:00'); const dur = Math.max(1,+r.duration||1);
    const e = addDays(s, dur-1);
    if(e < winStart || s > winEnd) return;
    (byTeam[r.team_id||'-'] = byTeam[r.team_id||'-'] || []).push({...r, s, e});
  });
  const teamIds = Object.keys(byTeam);
  const rangeText = MONTH_T[winStart.getMonth()]+' '+(winStart.getFullYear()+543);

  const nav = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'+
    '<button class="btn btn-ghost btn-sm" onclick="planShiftWeek(-1)">‹ เดือนก่อน</button>'+
    '<button class="btn btn-ghost btn-sm" onclick="planJumpToday()">เดือนนี้</button>'+
    '<button class="btn btn-ghost btn-sm" onclick="planShiftWeek(1)">เดือนถัดไป ›</button>'+
    '<span style="font-size:12px;color:var(--muted);margin-left:6px">'+rangeText+'</span></div>';

  let days=[]; for(let i=0;i<N;i++){ const d=addDays(winStart,i); const isToday = ymd(d)===ymd(today); const dow=d.getDay();
    days.push({num:d.getDate(), wd:WD_T[dow], isToday, isSun:dow===0}); }
  function emptyRowCells(){ let c=''; for(let i=0;i<N;i++) c+='<div style="height:100%"></div>'; return c; }

  let dayHeader = '<div style="display:grid;grid-template-columns:repeat('+N+','+colW+'px);height:44px;border-bottom:1px solid var(--line);margin-bottom:6px">'+
    days.map(d=>'<div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:6px;gap:3px">'+
      '<div style="font-size:9px;color:'+(d.isSun?'#DC2626':'#94A3B8')+';font-weight:600">'+d.wd+'</div>'+
      '<div style="width:22px;height:22px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:'+(d.isToday?'var(--red)':'transparent')+';font-size:11px;font-weight:700;color:'+(d.isToday?'#fff':(d.isSun?'#DC2626':'#101A33'))+';font-family:var(--disp)">'+d.num+'</div></div>').join('')+
    '</div>';

  if(!teamIds.length){
    // no teams at all yet — still show the day-header skeleton + a couple of placeholder rows so the layout reads as "this is where your plan goes"
    let skelLabel='<div style="height:44px;display:flex;align-items:flex-end;padding-bottom:8px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--line);margin-bottom:6px">งานตามทีม</div>';
    let skelGrid='';
    for(let k=0;k<3;k++){
      skelLabel += '<div style="height:52px;display:flex;align-items:center;gap:9px;'+(k?'margin-top:10px;border-top:1px dashed var(--line2);padding-top:14px;':'')+'">'+
        '<div style="width:26px;height:26px;border-radius:9px;border:1.5px dashed var(--line2);flex-shrink:0"></div>'+
        '<span style="font-size:12.5px;color:var(--muted2);font-style:italic">ทีมงาน (ยังไม่ได้เพิ่ม)</span></div>';
      skelGrid += '<div style="height:52px;'+(k?'margin-top:10px;border-top:1px dashed var(--line2);padding-top:14px;':'')+'">'+
        '<div style="display:grid;grid-template-columns:repeat('+N+','+colW+'px);height:100%;border-radius:10px;border:1.5px dashed var(--line2)"></div></div>';
    }
    body.innerHTML = nav+'<div class="card" style="border-radius:20px;overflow:hidden;padding:0;position:relative">'+
      '<div style="display:flex">'+
      '<div style="width:280px;flex-shrink:0;padding:0 8px 8px 18px;border-right:1px solid #EEF1F8">'+skelLabel+'</div>'+
      '<div style="flex:1;overflow-x:auto"><div style="min-width:'+(N*colW)+'px">'+dayHeader+skelGrid+'</div></div>'+
      '</div><div class="empty" style="border-top:1px solid #EEF1F8">ยังไม่มีทีมงานในฝ่ายนี้ — ไปที่แท็บ "ทีม" เพื่อเพิ่มทีมงาน แล้วกด "+ มอบหมายงานใหม่" ที่นี่</div></div>';
    return;
  }

  let labelCol = '<div style="height:44px;display:flex;align-items:flex-end;padding-bottom:8px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--line);margin-bottom:6px">งานตามทีม</div>';
  let gridRows = '';
  teamIds.forEach((tid,ti)=>{
    const team = state.cache.teams.find(t=>t.id===tid);
    const tc = TEAM_TAG_COLORS[ti%TEAM_TAG_COLORS.length];
    const tasks = byTeam[tid];
    labelCol += '<div style="height:46px;display:flex;align-items:center;gap:9px;'+(ti?'margin-top:10px;border-top:1px solid #EEF1F8;padding-top:14px;height:58px;':'')+'">'+
      '<div style="width:26px;height:26px;border-radius:9px;background:'+tc+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:var(--disp);flex-shrink:0">'+esc((team?team.name:'ไม่ระบุ').charAt(0))+'</div>'+
      '<span style="font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(team?team.name:'ไม่ระบุทีม')+'</span></div>';
    gridRows += '<div style="height:'+(ti?58:46)+'px;'+(ti?'margin-top:10px;border-top:1px solid #EEF1F8;padding-top:14px;':'')+'">'+
      '<div style="display:grid;grid-template-columns:repeat('+N+','+colW+'px);height:100%;position:relative">'+emptyRowCells()+'</div></div>';

    if(!tasks.length){
      labelCol += '<div style="height:46px;display:flex;align-items:center;padding:0 10px 0 4px"><span style="font-size:11.5px;color:var(--muted2);font-style:italic">ยังไม่มีงานมอบหมายในช่วงนี้</span></div>';
      gridRows += '<div style="height:46px"><div style="display:grid;grid-template-columns:repeat('+N+','+colW+'px);height:100%;border-radius:10px;border:1.5px dashed var(--line2)"></div></div>';
    }
    tasks.forEach(t=>{
      const proj = state.projects.find(p=>p.id===t.project_id);
      const sIdx = Math.max(0, Math.round((t.s-winStart)/86400000));
      const eIdx = Math.min(N-1, Math.round((t.e-winStart)/86400000));
      const span = eIdx-sIdx+1;
      const pct = Math.max(0,Math.min(100,+t.pct||0));
      labelCol += '<div style="height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 10px 0 4px" title="'+esc(t.task)+'">'+
        '<div style="flex:1;min-width:0;padding-right:8px"><div style="font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(t.task)+'</div>'+
        '<div style="font-size:10px;color:var(--muted2);margin-top:1px">'+esc(proj?proj.code:'-')+' · '+thDate(t.start_date)+'</div></div>'+
        (canSubmitField(state.ws) ? '<button class="btn btn-ghost btn-sm" style="flex-shrink:0;margin-right:6px;padding:4px 8px;font-size:10.5px" onclick="openFieldReport(\''+t.id+'\',\''+(t.project_id||'')+'\',\''+(t.team_id||'')+'\')">📝 รายงานผล</button>' : '')+
        '<span style="font-size:11px;font-weight:700;color:'+(pct>=100?'#0D9488':(pct>0?tc:'#94A3B8'))+';font-family:var(--disp);flex-shrink:0">'+pct+'%</span></div>';
      let cells2=''; for(let i=0;i<N;i++) cells2+='<div style="height:100%"></div>';
      const todayIdx = days.findIndex(d=>d.isToday);
      gridRows += '<div style="height:46px"><div style="display:grid;grid-template-columns:repeat('+N+','+colW+'px);height:100%;position:relative">'+cells2+
        (todayIdx>=0?'<div style="position:absolute;top:2px;bottom:2px;left:'+((todayIdx+0.5)*colW)+'px;width:2px;background:var(--red);border-radius:2px;z-index:3;opacity:.55"></div>':'')+
        '<div style="grid-column:'+(sIdx+1)+' / span '+span+';align-self:center;height:26px;background:'+tc+'1A;border-radius:999px;position:relative;margin:0 3px;overflow:hidden">'+
        '<div style="height:100%;width:'+pct+'%;background:linear-gradient(135deg,'+tc+','+tc+'CC);border-radius:999px"></div>'+
        (span>=2?'<span style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10.5px;font-weight:700;color:'+(pct>45?'#fff':'#101A33')+';font-family:var(--mono);white-space:nowrap">'+pct+'%</span>':'')+
        '</div></div></div>';
    });
  });

  body.innerHTML = nav+'<div class="card" style="border-radius:20px;overflow:hidden;padding:0;position:relative">'+
    '<div style="display:flex">'+
    '<div style="width:280px;flex-shrink:0;padding:0 8px 8px 18px;border-right:1px solid #EEF1F8">'+labelCol+'</div>'+
    '<div style="flex:1;overflow-x:auto"><div style="min-width:'+(N*colW)+'px">'+dayHeader+gridRows+'</div></div>'+
    '</div></div>'+
    '<div style="display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--muted);align-items:center">'+
    '<span style="display:flex;align-items:center;gap:5px"><span style="width:20px;height:2px;background:var(--red);display:inline-block"></span>วันนี้</span>'+
    '<span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:10px;background:'+D.acc+';display:inline-block;border-radius:16px"></span>งานย่อย + % ความคืบหน้า</span></div>';
}
async function planMonth(D){
  const year = new Date().getFullYear();
  const from = year+'-01-01', to = year+'-12-31';
  const { data: rows } = await sb.from('daily_plan').select('team_id,plan_date').eq('division_id',state.ws).eq('status','อนุมัติ').gte('plan_date',from).lte('plan_date',to);
  const teams = state.cache.teams;
  const body = document.getElementById('planBody');
  if(!body) return; // user navigated away from Plan page before this fetch finished — don't crash writing into a gone element
  if(!teams.length){ body.innerHTML='<div class="card"><div class="empty">ยังไม่มีทีมงานในฝ่ายนี้</div></div>'; return; }
  const counts = {}; (rows||[]).forEach(r=>{ const m=+r.plan_date.slice(5,7); const key=r.team_id+'-'+m; counts[key]=(counts[key]||0)+1; });
  body.innerHTML = '<div class="card" style="padding:0;border-color:var(--line2);overflow:hidden">'+
    '<div style="display:grid;grid-template-columns:220px repeat(12,1fr);background:#F3F6FC;border-bottom:1px solid var(--line2)">'+
    '<div style="padding:9px 14px;font-size:11px;font-weight:700;color:#5B6B84;border-right:1px solid var(--line)">ทีมงาน</div>'+
    MONTH_T.map(m=>'<div style="padding:9px 4px;text-align:center;font-size:11px;font-weight:700;color:#5B6B84;border-right:1px solid var(--line)">'+m+'</div>').join('')+'</div>'+
    teams.map(t=>'<div style="display:grid;grid-template-columns:220px repeat(12,1fr);border-bottom:1px solid #EEF1F8">'+
      '<div style="padding:10px 14px;display:flex;align-items:center;gap:9px;border-right:1px solid #EEF1F8">'+
      '<div style="width:26px;height:26px;border-radius:16px;background:'+D.soft+';color:'+D.acc+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;font-family:var(--disp);flex-shrink:0">'+esc(t.name.charAt(0))+'</div>'+
      '<span style="font-size:11.5px;font-weight:500;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(t.name)+'</span></div>'+
      MONTH_T.map((_,i)=>{ const n=counts[t.id+'-'+(i+1)]||0; const alpha=Math.min(1,n/10*0.85+0.1);

function monthInRange(year,m,start,end){
  const s=start?new Date(start):null, e=end?new Date(end):null;
  const cellStart=new Date(year,m,1), cellEnd=new Date(year,m+1,0);
  if(s && cellEnd<s) return false; if(e && cellStart>e) return false; return true;
}
async function planYear(D){

  if(!rows.length){ body.innerHTML='<div class="card"><div class="empty">ไม่มีโครงการที่ระบุวันเริ่ม/สิ้นสุด</div></div>'; return; }

    MONTH_T.map(m=>'<div style="padding:9px 4px;text-align:center;font-size:11px;font-weight:700;color:#5B6B84;border-right:1px solid var(--line)">'+m+'</div>').join('')+'</div>'+
    rows.map(p=>{ const active = !/เสร็จ|จบ|ปิด/.test(p.status||'');
      let cells=''; for(let i=0;i<12;i++){ const on=monthInRange(year,i,p.start_date,p.end_date); cells+='<div style="padding:6px 8px;border-right:1px solid #EEF1F8"><div style="height:14px;border-radius:5px;background:'+(on?(active?D.acc:'#94A3B8'):'transparent')+'"></div></div>'; }
      return '<div style="display:grid;grid-template-columns:260px repeat(12,1fr);border-bottom:1px solid #EEF1F8;min-height:44px">'+
        '<div style="padding:9px 14px;border-right:1px solid #EEF1F8;display:flex;flex-direction:column;justify-content:center">'+

const REQ_KIND_ICON = {'รถ':'🚛','เครื่องมือ':'🛠️','วัสดุ':'📦'};
function reqStatusPill(s){

  const m=map[s]||map['รออนุมัติ'];
  return '<span class="pill" style="color:'+m.c+';background:'+m.bg+'">'+esc(s)+'</span>';
