<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WRC ERP</title>
<link rel="icon" href="assets/wrc-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --ground:#f7f9fc; --panel:#ffffff; --panel2:#fbfcfe; --soft:#eef1f8;
  --ink:#101a33; --ink2:#334156; --muted:#6b7690; --muted2:#8592a8;
  --line:#e3e8f3; --line2:#d7deec;
  --teal:#0d9488; --teal-soft:#e4f7f3;
  --blue:#2f6fed; --blue-soft:#eaf1fe;
  --amber:#d97706; --amber-soft:#fdf1e0;
  --red:#dc2626; --red-soft:#fdecec;
  --indigo:#4338ca;
  --sans:"IBM Plex Sans Thai","Segoe UI",system-ui,sans-serif;
  --disp:"Space Grotesk","IBM Plex Sans Thai",sans-serif;
  --mono:"IBM Plex Mono","SFMono-Regular",Consolas,monospace;
  --shadow:0 1px 2px rgba(16,26,51,.05),0 8px 24px rgba(16,26,51,.07);
  --sidebar:260px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--ground);color:var(--ink);font-size:14px;line-height:1.55}
button,input,select,textarea{font-family:inherit;font-size:14px}
button{cursor:pointer}
.hidden{display:none!important}
.mono{font-family:var(--mono)}
.tnum{font-variant-numeric:tabular-nums}

/* ---------- Login ---------- */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(1100px 480px at 50% -10%, var(--teal-soft), var(--ground) 60%)}
.login-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:40px 42px;
  width:100%;max-width:388px;box-shadow:0 20px 50px rgba(16,26,51,.12)}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:13px;margin-bottom:28px}
.login-logo img{width:66px;height:66px;object-fit:contain}
.login-logo .t{font-family:var(--disp);font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.login-logo .s{font-size:12px;color:var(--muted);font-family:var(--mono);letter-spacing:.04em}
.field{margin-bottom:15px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.02em}
.field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;padding:11px 13px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.field input::placeholder{color:var(--muted2)}
.field input:focus,.field select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft);background:#fff}
.field input.warn{border-color:var(--red);background:var(--red-soft)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:10px;
  padding:11px 18px;font-weight:600;font-size:13.5px;transition:transform .08s,box-shadow .15s,opacity .15s}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-primary{background:linear-gradient(90deg,var(--teal),#14b8a6);color:#fff;box-shadow:0 4px 16px rgba(13,148,136,.3)}
.btn-block{width:100%}
.btn-ghost{background:var(--soft);color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{background:#fff;border-color:var(--line2)}
.btn-danger{background:var(--red-soft);color:var(--red);border:1px solid #f7c9c9}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:8px}
.login-err{background:var(--red-soft);color:#991b1b;border:1px solid #f7c9c9;border-radius:9px;
  padding:10px 12px;font-size:12.5px;margin-bottom:14px}

/* ---------- Shell ---------- */
#appView{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--panel);color:var(--ink);border-right:1px solid var(--line);
  position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:20}
.sb-brand{display:flex;align-items:center;gap:12px;padding:22px 22px 18px;border-bottom:1px solid var(--line)}
.sb-brand img{width:36px;height:36px;object-fit:contain}
.sb-brand .t{font-family:var(--disp);font-size:16.5px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
.sb-brand .s{font-size:10px;color:var(--muted2);font-family:var(--mono);letter-spacing:.05em}
.sb-nav{flex:1;overflow-y:auto;padding:10px 14px}
.sb-group-t{font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--muted2);text-transform:uppercase;padding:16px 10px 7px}
.sb-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--ink2);
  font-weight:500;font-size:13.5px;cursor:pointer;transition:background .12s,color .12s;margin-bottom:1px}
.sb-item .ico{width:17px;text-align:center;font-size:14px;opacity:.85}
.sb-item:hover{background:var(--soft);color:var(--ink)}
.sb-item.active{background:var(--teal-soft);color:var(--teal);font-weight:700}
.sb-item.active .ico{opacity:1}
.sb-div-list{padding:2px 0}
.sb-div-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:9px;color:var(--ink2);font-size:13px;cursor:pointer;margin-bottom:1px}
.sb-div-item:hover{background:var(--soft);color:var(--ink)}
.sb-div-item.active{background:var(--soft);color:var(--ink);font-weight:700;box-shadow:inset 2px 0 0 var(--teal)}
.sb-div-dot{width:8px;height:8px;border-radius:50%;flex:none}
.sb-user{border-top:1px solid var(--line);padding:14px}
.sb-user-row{display:flex;align-items:center;gap:10px;padding:6px 8px}
.sb-avatar{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--teal),#0891b2);
  color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex:none}
.sb-user-info{flex:1;min-width:0}
.sb-user-info .n{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-info .r{font-size:10.5px;color:var(--muted)}
.sb-user-menu{display:flex;gap:6px;margin-top:9px}
.sb-user-menu .btn{flex:1;font-size:11.5px;padding:7px}
.sb-user-menu .btn-ghost{background:var(--soft);border-color:var(--line);color:var(--ink2)}
.sb-user-menu .btn-ghost:hover{background:#fff}

.main{flex:1;margin-left:var(--sidebar);min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:16px 30px;
  display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.crumb{font-family:var(--mono);font-size:11px;color:var(--muted2);letter-spacing:.02em}
.page-title{font-family:var(--disp);font-size:20px;font-weight:700;letter-spacing:-.01em;margin-top:2px}
.topbar .spacer{flex:1}
.content{padding:28px 30px 70px;flex:1}
.mobile-toggle{display:none;background:var(--soft);border:1px solid var(--line);border-radius:9px;width:38px;height:38px;font-size:17px}

/* ---------- Cards ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow)}
.card+.card{margin-top:16px}
.card-title{font-family:var(--disp);font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:9px;letter-spacing:-.005em}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:960px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* Org hero */
.org-hero{background:linear-gradient(155deg,#101a33 0%,#16233f 55%,#0d3a34 100%);border-radius:18px;
  padding:30px 32px;color:#fff;display:flex;align-items:center;gap:28px;flex-wrap:wrap;position:relative;overflow:hidden;margin-bottom:18px}
.org-hero::after{content:"";position:absolute;right:-60px;top:-70px;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(45,212,191,.18),transparent 70%)}
.org-hero>*{position:relative;z-index:1}
.org-hero .eyebrow{font-family:var(--mono);font-size:11px;color:#5eead4;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.org-hero h1{font-family:var(--disp);font-size:25px;font-weight:700;margin-top:6px;letter-spacing:-.01em}
.org-hero .stats{margin-left:auto;display:flex;gap:28px;flex-wrap:wrap}
.org-hero .stat .l{font-size:10.5px;color:#9fb0cf;font-weight:600;letter-spacing:.03em}
.org-hero .stat .v{font-family:var(--disp);font-size:23px;font-weight:700;margin-top:3px;letter-spacing:-.01em}

/* KPI */
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:17px 19px;box-shadow:var(--shadow)}
.kpi .lb{font-size:11.5px;color:var(--muted);font-weight:600}
.kpi .vl{font-family:var(--disp);font-size:24px;font-weight:700;margin-top:6px;letter-spacing:-.01em}
.kpi .sub{font-size:11px;color:var(--muted2);margin-top:3px}

/* Division cards */
.div-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);
  cursor:pointer;transition:transform .15s,box-shadow .15s;border-top:3px solid var(--teal)}
.div-card:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(16,26,51,.12)}
.div-head{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.div-head .n{font-family:var(--disp);font-weight:700;font-size:15.5px}
.div-head .tag{font-size:11px;color:var(--muted)}
.div-body{padding:0 20px 18px}
.div-mini{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.div-mini .m{background:var(--soft);border-radius:9px;padding:9px 12px}
.div-mini .m .ml{font-size:10px;color:var(--muted);font-weight:600}
.div-mini .m .mv{font-family:var(--disp);font-size:15px;font-weight:700;margin-top:2px}
.div-link{font-size:12.5px;font-weight:700;color:var(--teal);margin-top:12px;display:flex;align-items:center;gap:5px}

/* Pills / badges */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;font-family:var(--mono)}
.pill.ok{background:var(--teal-soft);color:var(--teal)}
.pill.bad{background:var(--red-soft);color:var(--red)}
.pill.warn{background:var(--amber-soft);color:var(--amber)}
.pill.info{background:var(--blue-soft);color:var(--blue)}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--soft);color:var(--ink2);font-family:var(--mono)}
.tag-role{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px}
.tag-role.admin{background:#fef3c7;color:#92400e}.tag-role.manager{background:var(--blue-soft);color:var(--blue)}
.tag-role.pm{background:var(--teal-soft);color:var(--teal)}.tag-role.accountant{background:var(--amber-soft);color:var(--amber)}
.tag-role.viewer{background:var(--soft);color:var(--muted)}

/* Table */
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--panel2);text-align:left;padding:11px 14px;font-weight:700;color:var(--muted);
  font-size:11.5px;letter-spacing:.02em;white-space:nowrap;border-bottom:1px solid var(--line)}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;color:var(--ink2)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--panel2)}
td.num,th.num{text-align:right}
.rowlink{color:var(--ink);font-weight:600;cursor:pointer}
.rowlink:hover{color:var(--teal)}
.empty{text-align:center;color:var(--muted);padding:42px 20px;font-size:13px}

/* Forms */
.form-section{border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px;background:var(--panel2)}
.form-section-t{font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--teal);margin-bottom:12px;
  text-transform:uppercase;letter-spacing:.04em}
.row{display:grid;gap:14px}
.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}.r4{grid-template-columns:repeat(4,1fr)}
@media(max-width:760px){.r2,.r3,.r4{grid-template-columns:1fr}}
.field.light label{color:var(--muted);font-weight:700}
.field.light input,.field.light select,.field.light textarea{background:var(--panel);border:1px solid var(--line);color:var(--ink)}
.field.light input:focus,.field.light select:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
.inline-warn{font-size:11.5px;color:var(--red);margin-top:5px;font-weight:600;display:none}
.field.light input.warn{border-color:var(--red);background:var(--red-soft)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(16,26,51,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--panel);border-radius:18px;box-shadow:0 30px 70px rgba(0,0,0,.32);width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-head .t{font-family:var(--disp);font-size:16.5px;font-weight:700}
.modal-x{background:var(--soft);border:none;border-radius:8px;width:32px;height:32px;font-size:17px;color:var(--muted)}
.modal-body{padding:22px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.warn-list{list-style:none}
.warn-list li{padding:11px 14px;border-radius:10px;margin-bottom:8px;font-size:13px;font-weight:600;display:flex;gap:9px;align-items:flex-start}
.warn-list li.block{background:var(--red-soft);color:#991b1b;border:1px solid #f7c9c9}
.warn-list li.warn{background:var(--amber-soft);color:#92400e;border:1px solid #fbe0ae}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:13.5px;font-weight:600;
  box-shadow:0 10px 30px rgba(0,0,0,.3);display:flex;align-items:center;gap:9px;animation:slidein .25s}
.toast.ok{background:#065f46}.toast.err{background:#991b1b}
@keyframes slidein{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

@media(max-width:860px){
  .sidebar{transform:translateX(-100%);transition:transform .2s;box-shadow:0 0 40px rgba(0,0,0,.3)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .mobile-toggle{display:block}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginView">
  <form class="login-card" id="loginForm" onsubmit="doLogin(event)">
    <div class="login-logo">
      <img src="assets/wrc-logo.png" alt="WRC">
      <div class="t">WRC ERP</div>
      <div class="s">SYSTEM ACCESS</div>
    </div>
    <div class="login-err hidden" id="loginErr"></div>
    <div class="field"><label>ชื่อผู้ใช้</label><input id="loginUser" autocomplete="username" required></div>
    <div class="field"><label>รหัสผ่าน</label><input id="loginPw" type="password" autocomplete="current-password" required></div>
    <button class="btn btn-primary btn-block" id="loginBtn" type="submit">เข้าสู่ระบบ →</button>
  </form>
</div>

<!-- ============ APP ============ -->
<div id="appView" class="hidden">
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <img src="assets/wrc-logo.png" alt="WRC">
      <div><div class="t">WRC ERP</div><div class="s">SYSTEM</div></div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-user">
      <div class="sb-user-row">
        <div class="sb-avatar" id="sbAvatar">?</div>
        <div class="sb-user-info"><div class="n" id="sbName">-</div><div class="r" id="sbRole">-</div></div>
      </div>
      <div class="sb-user-menu">
        <button class="btn btn-ghost btn-sm" onclick="openChangePw()">🔑 รหัสผ่าน</button>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">ออกจากระบบ</button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <div><div class="crumb" id="crumb">WRC · ERP</div><div class="page-title" id="pageTitle">ภาพรวมองค์กร</div></div>
      <div class="spacer"></div>
      <div id="topActions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="modalHost"></div>
<div id="toast"></div>

<script>
/* ============================================================
 * WRC ERP — frontend (static, GitHub Pages + Supabase backend)
 * ============================================================ */
const SUPA_URL = 'https://ryesfzzsolnsarkkibwa.supabase.co';
const SUPA_KEY = 'sb_publishable__LTMHdZUUj03iPHsAy3Lfw_7k_2e9ZL';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const ROLE_LABEL = {admin:'ผู้ดูแลระบบ', manager:'ผู้จัดการฝ่าย', pm:'ผู้จัดการโครงการ', accountant:'ฝ่ายบัญชี', viewer:'ผู้ดูรายงาน'};
const DIV_ICON = {pjcm:'⚡', pc:'🧱', en:'☀️'};

const state = { session:null, profile:null, divisions:[], projects:[], page:'org', selDiv:null, selProj:null, cache:{} };

/* ---------- util ---------- */
function fmt(n){ n=parseFloat(n); if(!isFinite(n)) n=0; return Math.round(n).toLocaleString('en-US'); }
function fmtM(n){ n=parseFloat(n)||0; return (n/1e6).toFixed(2)+'M'; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function thMonth(ym){ if(!ym) return '-'; const [y,m]=ym.split('-'); const T=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; return (T[+m-1]||'')+' '+(+y+543); }
function thDate(iso){ if(!iso) return '-'; const d=new Date(iso); const T=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; return d.getDate()+' '+T[d.getMonth()]+' '+(d.getFullYear()+543); }
function content(html){ document.getElementById('content').innerHTML = html; }
function toast(msg, type){
  const el = document.createElement('div');
  el.className = 'toast ' + (type||'');
  el.innerHTML = (type==='ok'?'✅ ':type==='err'?'⚠️ ':'') + esc(msg);
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3400);
}
function closeModal(){ document.getElementById('modalHost').innerHTML=''; }

/* ============================================================
 * AUTH
 * ============================================================ */
async function doLogin(e){
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  err.classList.add('hidden');
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPw').value;
  try{
    const email = username.toLowerCase() + '@wrc.local';
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ err.textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'; err.classList.remove('hidden'); return; }
    state.session = data.session;
    await loadProfileAndEnter();
  }catch(ex){ err.textContent = 'เชื่อมต่อไม่ได้: '+ex.message; err.classList.remove('hidden'); }
  finally{ btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ →'; }
}
async function loadProfileAndEnter(){
  const { data:{ user } } = await sb.auth.getUser();
  const { data: prof, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if(error || !prof){ toast('ไม่พบโปรไฟล์ผู้ใช้ ติดต่อผู้ดูแลระบบ','err'); return; }
  if(!prof.active){ toast('บัญชีนี้ถูกปิดใช้งาน','err'); await sb.auth.signOut(); return; }

async function loadAllProjects(){
  const { data, error } = await sb.from('projects').select('*').order('code');
  if(error){ toast(error.message,'err'); return []; }
  return data||[];
}
async function loadMonthlyFor(projectIds){
  if(!projectIds.length) return [];
  const { data } = await sb.from('project_monthly').select('*').in('project_id', projectIds);
  return data||[];
}
function currentMonth(){ return new Date().toISOString().slice(0,7); }
function sumDivision(projRows, monthRows, divId, month){
  const ids = new Set(projRows.filter(p=>p.division_id===divId).map(p=>p.id));
  const rows = monthRows.filter(m=>ids.has(m.project_id) && m.month===month);
  const agg = {rev:0,cost:0,bill:0,n:rows.length};
  rows.forEach(r=>{ agg.rev+=+r.con_actual||0; agg.cost+=+r.cost_actual||0; agg.bill+=+r.bill_actual||0; });
  agg.gp = agg.rev - agg.cost;
  return agg;
}

/* ============================================================

async function openMangoSync(divId){
  document.getElementById('modalHost').innerHTML =
    '<div class="modal-bg"><div class="modal"><div class="modal-head"><span class="t">⬇️ ดึงจาก Mango</span>'+
    '<button class="modal-x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body"><div class="empty">กำลังดึงข้อมูลจาก Mango…</div></div></div></div>';
  try{
    const { data:{ session } } = await sb.auth.getSession();
    const url = SUPA_URL + '/functions/v1/mango-sync?dept=' + encodeURIComponent(divId);
    const res = await fetch(url, { headers: { Authorization: 'Bearer '+session.access_token, apikey: SUPA_KEY } });
    const data = await res.json();
    if(!res.ok || data.error){ throw new Error(data.error || ('HTTP '+res.status)); }
    state.cache.mangoCandidates = data.projects || [];
    renderMangoList();
  }catch(ex){
    document.getElementById('modalHost').querySelector('.modal-body').innerHTML =
      '<div class="empty">ดึงข้อมูลไม่สำเร็จ: '+esc(ex.message)+'<br><br>อาจเป็นเพราะเชื่อมต่อ Mango ไม่ได้ หรือยังไม่ได้ deploy ฟังก์ชัน mango-sync</div>';
  }
}

  const rows = state.cache.mangoCandidates || [];

async function renderProject(projId){

  if(!p){ content('<div class="card"><div class="empty">ไม่พบโครงการ</div></div>'); return; }
  const [{data:months},{data:fin},{data:sc},{data:loss},{data:stk},{data:mile},{data:cost},{data:att}] = await Promise.all([
    sb.from('project_monthly').select('*').eq('project_id', projId).order('month', {ascending:false}),
    sb.from('financials').select('*').eq('project_id', projId).order('month', {ascending:false}),
    sb.from('scurve').select('*').eq('project_id', projId).order('month'),
    sb.from('losses').select('*').eq('project_id', projId).order('month', {ascending:false}),
    sb.from('stock').select('*').eq('project_id', projId).order('material'),
    sb.from('milestones').select('*').eq('project_id', projId).order('sort_order'),
    sb.from('cost_entries').select('*').eq('project_id', projId).order('entry_date', {ascending:false}),
    sb.from('attachments').select('*').eq('project_id', projId).order('uploaded_at', {ascending:false}),
  ]);
  const rows = months||[];
  const totalSpent = rows.reduce((s,r)=>s+(+r.cost_actual||0),0);
  const totalCon = rows.reduce((s,r)=>s+(+r.con_actual||0),0);
  const remaining = (p.total_amt||0) - totalCon;
  const gp = totalCon - totalSpent;
  const d = state.divisions.find(x=>x.id===p.division_id);
  const editable = canWrite(p.division_id);
  state.cache.proj = { p, months:rows, fin:fin||[], sc:sc||[], loss:loss||[], stk:stk||[], mile:mile||[], cost:cost||[], att:att||[] };

  document.getElementById('topActions').innerHTML =
    (editable?'<button class="btn btn-primary btn-sm" onclick="openMonthlyEntry(\''+projId+'\')">📝 รายงานความคืบหน้า</button> ':'')+

async function uploadAttachment(projId){
  const inp = document.getElementById('att_file');
  const file = inp && inp.files[0];
  if(!file){ toast('เลือกไฟล์ก่อน','err'); return; }
  const path = projId+'/'+Date.now()+'_'+file.name;
  const { error: upErr } = await sb.storage.from('attachments').upload(path, file);
  if(upErr){ toast(upErr.message,'err'); return; }
  const { data: pub } = sb.storage.from('attachments').getPublicUrl(path);
  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from('attachments').insert({ project_id:projId, file_url:pub.publicUrl, name:file.name, uploaded_by:user.id });
  if(error){ toast(error.message,'err'); return; }
  toast('อัปโหลดเรียบร้อย','ok'); go('project', projId);
}
async function delAttachment(id, projId){
  if(!confirm('ลบไฟล์นี้?')) return;
  const { error } = await sb.from('attachments').delete().eq('id', id);
  if(error){ toast(error.message,'err'); return; }
  toast('ลบแล้ว','ok'); go('project', projId);
}

async function saveProject(id){
  const g=k=>(document.getElementById(k)||{}).value;
  const rec = { code:g('p_code'), name:g('p_name'), division_id:g('p_dept'), type:g('p_type'), pm:g('p_pm'),
    client:g('p_client'), location:g('p_loc'), contract_amt:+g('p_contract')||0, vo_amt:+g('p_vo')||0,
    budget:+g('p_budget')||0, contract_no:g('p_contractno'), start_date:g('p_start')||null, end_date:g('p_end')||null,
    status:g('p_status') };
  if(!rec.code||!rec.name){ toast('กรอกรหัสและชื่อโครงการ','err'); return; }
  let error;
  if(id){ ({error} = await sb.from('projects').update(rec).eq('id', id)); }
  else { ({error} = await sb.from('projects').insert(rec)); }
  if(error){ toast(error.message,'err'); return; }
  closeModal(); toast('บันทึกโครงการเรียบร้อย','ok');
  go(state.page, state.page==='division'?state.selDiv:undefined);
}
async function delProject(id){
  if(!confirm('ลบโครงการนี้? การลบไม่สามารถย้อนกลับได้')) return;
  const { error } = await sb.from('projects').delete().eq('id', id);
  if(error){ toast(error.message,'err'); return; }
  closeModal(); toast('ลบแล้ว','ok'); go('projects');
}

  set('me_budget',e.cost_budget); set('me_costShould',e.cost_should); set('me_costActual',e.cost_actual); set('me_costStatus',e.cost_status);
  set('me_dueSubmit',e.submit_due); set('me_actualSubmit',e.submit_actual);
  set('me_billPlan',e.bill_plan); set('me_billActual',e.bill_actual);
  set('me_billDue',e.bill_due); set('me_billActualDate',e.bill_actual_date);

function liveCheck(){
  const g=id=>parseFloat((document.getElementById(id)||{}).value)||0;
  const chk=(id,cond,msg)=>{ const el=document.getElementById(id), w=document.getElementById(id+'_w'); if(!el||!w)return;
    el.classList.toggle('warn',cond); w.style.display=cond?'block':'none'; w.textContent=msg; };
  chk('me_billActual', g('me_billPlan')>0 && g('me_billActual')>g('me_billPlan'), '⚠ วางบิลจริงเกินแผน — ต้องระบุเหตุผลก่อนบันทึก');
  chk('me_costActual', g('me_budget')>0 && g('me_costActual')>g('me_budget'), '⚠ ใช้จริงเกิน Budget');
  chk('me_conActual', g('me_conPlan')>0 && g('me_conActual')>g('me_conPlan'), '⚠ ได้จริงเกินค่างานแผน');
}

    cost_budget:+g('me_budget')||0, cost_should:+g('me_costShould')||0, cost_actual:+g('me_costActual')||0, cost_status:g('me_costStatus'),
    submit_due:g('me_dueSubmit')||null, submit_actual:g('me_actualSubmit')||null,
    bill_plan:+g('me_billPlan')||0, bill_actual:+g('me_billActual')||0,
    bill_due:g('me_billDue')||null, bill_actual_date:g('me_billActualDate')||null,
    note:g('me_note') };
}
function validateEntry(en){
  const w=[];
  if(en.bill_plan>0 && en.bill_actual>en.bill_plan)
    w.push({level:'block',msg:'วางบิลจริง '+fmt(en.bill_actual)+' เกินแผนวางบิล '+fmt(en.bill_plan)+' — ต้องระบุเหตุผลก่อนบันทึก'});
  if(en.cost_budget>0 && en.cost_actual>en.cost_budget)
    w.push({level:'warn',msg:'ใช้จริง '+fmt(en.cost_actual)+' เกิน Budget '+fmt(en.cost_budget)});
  if(en.con_plan>0 && en.con_actual>en.con_plan)
    w.push({level:'warn',msg:'ได้จริง '+fmt(en.con_actual)+' เกินค่างานแผน '+fmt(en.con_plan)+' — โปรดตรวจสอบ'});
  return w;
}
async function saveMonthlyEntry(projId, override, reason){
  const entry = collectMonthly(projId);
  if(!entry.month){ toast('กรุณาเลือกเดือน','err'); return; }
  const warnings = validateEntry(entry);
  const hasBlock = warnings.some(w=>w.level==='block');
  if(warnings.length && !override){ showConfirm(projId, entry, warnings, hasBlock); return; }
  if(hasBlock && !(reason||'').trim()){ toast('กรุณาระบุเหตุผล','err'); return; }
  if(reason) entry.note = (entry.note||'') + ' [เหตุผลเกินแผน: '+reason+']';

  const { data: ex } = await sb.from('project_monthly').select('id').eq('project_id',projId).eq('month',entry.month).maybeSingle();
  let error;
  if(ex){ ({error} = await sb.from('project_monthly').update(entry).eq('id', ex.id)); }
  else { ({error} = await sb.from('project_monthly').insert(entry)); }
  if(error){ toast(error.message,'err'); return; }
  closeModal(); toast('บันทึกเรียบร้อย','ok');
  go('project', projId);
}
function showConfirm(projId, entry, warnings, reasonRequired){
  state.cache.pendingEntry = entry; state.cache.pendingProj = projId; state.cache.reasonRequired = reasonRequired;
  document.getElementById('modalHost').innerHTML =
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-head"><span class="t">⚠️ ตรวจพบข้อมูลผิดปกติ</span><button class="modal-x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body"><ul class="warn-list">'+
      warnings.map(w=>'<li class="'+w.level+'"><span>'+(w.level==='block'?'🚫':'⚠️')+'</span><span>'+esc(w.msg)+'</span></li>').join('')+
    '</ul>'+
    (reasonRequired?'<div class="field light" style="margin-top:8px"><label>เหตุผล (จำเป็น เพราะเกินแผน)</label><textarea id="confirmReason" rows="2" placeholder="เช่น ลูกค้าขอเพิ่มงาน / VO..."></textarea></div>':'')+
    '</div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="confirmSaveMonthly()">ยืนยันบันทึก</button></div></div></div>';
}
function confirmSaveMonthly(){
  const reason = (document.getElementById('confirmReason')||{}).value || '';
  if(state.cache.reasonRequired && !reason.trim()){ toast('กรุณาระบุเหตุผล','err'); return; }
  saveMonthlyEntry(state.cache.pendingProj, true, reason);
}

function costStatusPill(s){
  const map={draft:'',pending:'warn',approved:'ok',paid:'info'};

async function renderCostEntries(){
  const projects = await loadAllProjects();
  state.projects = projects;

  if(error){ content('<div class="card"><div class="empty">'+esc(error.message)+'</div></div>'); return; }

  if(canAdd) document.getElementById('topActions').innerHTML = '<button class="btn btn-primary btn-sm" onclick="openCostEntry()">+ บันทึกต้นทุน</button>';
  const total = { draft:0,pending:0,approved:0,paid:0 };
  (rows||[]).forEach(r=>{ total[r.status]=(total[r.status]||0)+(+r.amount||0); });
  let html = '<div class="grid g4" style="margin-bottom:18px">'+
    kpi('ร่าง', fmt(total.draft), 'บาท')+ kpi('รออนุมัติ', fmt(total.pending), 'บาท')+

  const { error } = await sb.from('cost_entries').insert(rec);
  if(error){ toast(error.message,'err'); return; }
  closeModal(); toast('บันทึกเรียบร้อย (สถานะ: ร่าง)','ok'); go(state.page==='project'?'project':'cost-entries', state.selProj);
}

/* ============================================================
 * DAILY PLAN + TEAMS (เฟส 4)
 * ============================================================ */
async function renderDailyPlan(){
  const myDiv = state.profile.role==='admin' ? (state.divisions[0]||{}).id : state.profile.division_id;
  const projects = await loadAllProjects(); state.projects = projects;
  const { data: teams } = await sb.from('teams').select('*').order('name');
  state.cache.teams = teams||[];
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('topActions').innerHTML = '<button class="btn btn-primary btn-sm" onclick="openDailyTask()">+ เพิ่มงาน</button>';
  content('<div class="card"><div class="row r2" style="margin-bottom:16px">'+
    '<div class="field light"><label>ฝ่าย</label><select id="dp_div" onchange="loadDailyPlanFor()">'+
      state.divisions.map(d=>'<option value="'+d.id+'"'+(d.id===myDiv?' selected':'')+'>'+esc(d.name)+'</option>').join('')+'</select></div>'+
    '<div class="field light"><label>วันที่</label><input id="dp_date" type="date" value="'+today+'" onchange="loadDailyPlanFor()"></div>'+
  '</div><div id="dp_body"></div></div>');
  loadDailyPlanFor();
}
async function loadDailyPlanFor(){
  const div = (document.getElementById('dp_div')||{}).value;
  const date = (document.getElementById('dp_date')||{}).value;
  const { data: rows } = await sb.from('daily_plan').select('*').eq('division_id',div).eq('plan_date',date).order('created_at');
  const body = document.getElementById('dp_body');
  if(!rows||!rows.length){ body.innerHTML='<div class="empty">ยังไม่มีงานมอบหมายวันนี้</div>'; return; }
  body.innerHTML = '<div class="table-wrap"><table><thead><tr><th>ทีม</th><th>โครงการ</th><th>งาน</th><th>เริ่ม</th><th class="num">ระยะ(วัน)</th><th class="num">% ความคืบหน้า</th></tr></thead><tbody>'+
    rows.map(r=>{ const team=state.cache.teams.find(t=>t.id===r.team_id); const proj=state.projects.find(p=>p.id===r.project_id);
      return '<tr><td>'+esc(team?team.name:'-')+'</td><td>'+esc(proj?proj.code:'-')+'</td><td>'+esc(r.task)+'</td>'+
        '<td>'+thDate(r.start_date)+'</td><td class="num tnum">'+(r.duration||'-')+'</td><td class="num tnum">'+(r.pct||0)+'%</td></tr>';
    }).join('')+'</tbody></table></div>';
}
function openDailyTask(){
  const div = (document.getElementById('dp_div')||{}).value || (state.divisions[0]||{}).id;
  const date = (document.getElementById('dp_date')||{}).value || new Date().toISOString().slice(0,10);
  const teamOpts = state.cache.teams.filter(t=>t.division_id===div).map(t=>'<option value="'+t.id+'">'+esc(t.name)+'</option>').join('');
  const projOpts = state.projects.filter(p=>p.division_id===div).map(p=>'<option value="'+p.id+'">'+esc(p.code)+'</option>').join('');
  document.getElementById('modalHost').innerHTML =
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-head"><span class="t">📅 มอบหมายงานใหม่</span><button class="modal-x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body">'+
      '<div class="row r2"><div class="field light"><label>ทีม</label><select id="dt_team">'+(teamOpts||'<option value="">— ยังไม่มีทีม —</option>')+'</select></div>'+
      '<div class="field light"><label>โครงการ</label><select id="dt_proj">'+projOpts+'</select></div></div>'+
      '<div class="field light"><label>ชื่องาน</label><input id="dt_task"></div>'+
      '<div class="row r3"><div class="field light"><label>เริ่มวันที่</label><input id="dt_start" type="date" value="'+date+'"></div>'+
      fld('dt_dur','ระยะ (วัน)')+fld('dt_pct','% เริ่มต้น')+'</div>'+
    '</div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="saveDailyTask(\''+div+'\',\''+date+'\')">บันทึก</button></div></div></div>';
  const dur=document.getElementById('dt_dur'); if(dur) dur.value=1;
}
async function saveDailyTask(div, date){
  const g=k=>(document.getElementById(k)||{}).value;
  const task=g('dt_task').trim();
  if(!task){ toast('กรอกชื่องาน','err'); return; }
  const { data:{ user } } = await sb.auth.getUser();
  const rec = { division_id:div, plan_date:date, team_id:g('dt_team')||null, project_id:g('dt_proj')||null,
    task, start_date:g('dt_start')||date, duration:+g('dt_dur')||1, pct:+g('dt_pct')||0, created_by:user.id };
  const { error } = await sb.from('daily_plan').insert(rec);
  if(error){ toast(error.message,'err'); return; }
  closeModal(); toast('มอบหมายงานเรียบร้อย','ok'); loadDailyPlanFor();
}

async function renderTeams(){
  const myDiv = state.profile.role==='admin' ? null : state.profile.division_id;
  let q = sb.from('teams').select('*').order('division_id').order('name');
  if(myDiv) q = q.eq('division_id', myDiv);
  const { data: rows, error } = await q;
  if(error){ content('<div class="card"><div class="empty">'+esc(error.message)+'</div></div>'); return; }
  document.getElementById('topActions').innerHTML = '<button class="btn btn-primary btn-sm" onclick="openTeam()">+ เพิ่มทีม</button>';
  if(!rows.length){ content('<div class="card"><div class="empty">ยังไม่มีทีมงาน</div></div>'); return; }
  content('<div class="card"><div class="table-wrap"><table><thead><tr><th>ฝ่าย</th><th>ชื่อทีม</th><th>จำนวนสมาชิก</th><th></th></tr></thead><tbody>'+
    rows.map(t=>{ const d=state.divisions.find(x=>x.id===t.division_id);
      return '<tr><td>'+esc(d?d.name:t.division_id)+'</td><td><b>'+esc(t.name)+'</b></td><td>'+((t.members||[]).length)+' คน</td>'+
        '<td><button class="btn btn-ghost btn-sm" onclick=\'openTeam('+JSON.stringify(t)+')\'>แก้ไข</button></td></tr>';
    }).join('')+'</tbody></table></div></div>');
}
function openTeam(t){
  t=t||{};
  const deptOpts = state.divisions.map(d=>'<option value="'+d.id+'"'+(t.division_id===d.id?' selected':'')+'>'+esc(d.name)+'</option>').join('');
  document.getElementById('modalHost').innerHTML =
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:420px">'+
    '<div class="modal-head"><span class="t">'+(t.id?'แก้ไขทีม':'เพิ่มทีม')+'</span><button class="modal-x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body"><div class="field light"><label>ฝ่าย</label><select id="tm_dept">'+deptOpts+'</select></div>'+
      '<div class="field light"><label>ชื่อทีม</label><input id="tm_name" value="'+esc(t.name||'')+'"></div>'+
      '<div class="field light"><label>สมาชิก (คั่นด้วย , )</label><input id="tm_members" value="'+esc((t.members||[]).join(', '))+'"></div>'+
    '</div><div class="modal-foot">'+(t.id?'<button class="btn btn-danger" onclick="delTeam(\''+t.id+'\')">ลบ</button>':'')+
      '<div style="flex:1"></div><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="saveTeam('+(t.id?'\''+t.id+'\'':'null')+')">บันทึก</button></div></div></div>';
}
async function saveTeam(id){
  const name=(document.getElementById('tm_name')||{}).value.trim();
  if(!name){ toast('กรอกชื่อทีม','err'); return; }
  const members = (document.getElementById('tm_members')||{}).value.split(',').map(s=>s.trim()).filter(Boolean);
  const rec = { division_id:(document.getElementById('tm_dept')||{}).value, name, members };
  const { error } = id ? await sb.from('teams').update(rec).eq('id',id) : await sb.from('teams').insert(rec);
  if(error){ toast(error.message,'err'); return; }
  closeModal(); toast('บันทึกเรียบร้อย','ok'); renderTeams();
}
async function delTeam(id){
  if(!confirm('ลบทีมนี้?')) return;
  const { error } = await sb.from('teams').delete().eq('id',id);
  if(error){ toast(error.message,'err'); return; }
  closeModal(); toast('ลบแล้ว','ok'); renderTeams();
}

/* ============================================================
 * USERS (admin)
 * ============================================================ */
async function renderUsers(){
  const { data: rows, error } = await sb.from('profiles').select('*').order('username');
  if(error){ content('<div class="card"><div class="empty">'+esc(error.message)+'</div></div>'); return; }
  document.getElementById('topActions').innerHTML = '<button class="btn btn-primary btn-sm" onclick="openUserCreate()">+ เพิ่มผู้ใช้ใหม่</button>';
  content('<div class="card"><div class="table-wrap"><table><thead><tr>'+
    '<th>ชื่อผู้ใช้</th><th>ชื่อ-นามสกุล</th><th>บทบาท</th><th>ฝ่าย</th><th>สถานะ</th><th></th></tr></thead><tbody>'+
    rows.map(u=>{ const d=state.divisions.find(x=>x.id===u.division_id);
      return '<tr><td><b>'+esc(u.username)+'</b></td><td>'+esc(u.full_name)+'</td>'+
      '<td><span class="tag-role '+esc(u.role)+'">'+(ROLE_LABEL[u.role]||u.role)+'</span></td><td>'+esc(d?d.name:'-')+'</td>'+
      '<td>'+(u.active?'<span class="pill ok">ใช้งาน</span>':'<span class="pill bad">ปิด</span>')+'</td>'+
      '<td><button class="btn btn-ghost btn-sm" onclick=\'openUserEdit('+JSON.stringify(u)+')\'>แก้ไข</button></td></tr>';
    }).join('')+'</tbody></table></div></div>');
}
function openUserCreate(){
  const roleOpts=['viewer','pm','manager','accountant','admin'].map(r=>'<option value="'+r+'">'+ROLE_LABEL[r]+'</option>').join('');
  const deptOpts='<option value="">— ไม่ระบุ —</option>'+state.divisions.map(d=>'<option value="'+d.id+'">'+esc(d.name)+'</option>').join('');
  document.getElementById('modalHost').innerHTML =
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-head"><span class="t">+ เพิ่มผู้ใช้ใหม่</span><button class="modal-x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body">'+
      '<div class="field light"><label>ชื่อผู้ใช้ (สำหรับ login) *</label><input id="nu_username" placeholder="เช่น somchai" autocomplete="off"></div>'+
      '<div class="field light"><label>รหัสผ่านเริ่มต้น * (อย่างน้อย 6 ตัว)</label><input id="nu_password" type="text" placeholder="ให้พนักงานเปลี่ยนเองภายหลัง"></div>'+
      '<div class="field light"><label>ชื่อ-นามสกุล</label><input id="nu_fullName" placeholder="ชื่อที่แสดงในระบบ"></div>'+
      '<div class="row r2"><div class="field light"><label>บทบาท</label><select id="nu_role">'+roleOpts+'</select></div>'+
      '<div class="field light"><label>ฝ่าย</label><select id="nu_dept">'+deptOpts+'</select></div></div>'+
      '<div id="nu_err" class="login-err hidden" style="margin-top:4px"></div>'+
    '</div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" id="nu_save" onclick="saveUserCreate()">สร้างผู้ใช้</button></div></div></div>';
}
async function saveUserCreate(){
  const g=k=>(document.getElementById(k)||{}).value;
  const username = g('nu_username').trim();
  const password = g('nu_password');
  const err = document.getElementById('nu_err');
  err.classList.add('hidden');
  if(!username){ err.textContent='กรอกชื่อผู้ใช้'; err.classList.remove('hidden'); return; }
  if(password.length<6){ err.textContent='รหัสผ่านต้องยาวอย่างน้อย 6 ตัว'; err.classList.remove('hidden'); return; }
  const btn = document.getElementById('nu_save'); btn.disabled=true; btn.textContent='กำลังสร้าง...';
  try{
    const { data, error } = await sb.functions.invoke('create-user', { body: {
      username, password, full_name: g('nu_fullName')||username, role: g('nu_role'), division_id: g('nu_dept')||null
    }});
    if(error || (data && data.error)){ err.textContent = (data&&data.error) || error.message; err.classList.remove('hidden'); return; }
    closeModal(); toast('สร้างผู้ใช้ '+username+' เรียบร้อย','ok'); renderUsers();
  }catch(ex){ err.textContent = 'เชื่อมต่อไม่ได้: '+ex.message; err.classList.remove('hidden'); }
  finally{ btn.disabled=false; btn.textContent='สร้างผู้ใช้'; }
}
function openUserEdit(u){
  const roleOpts=['admin','manager','pm','accountant','viewer'].map(r=>'<option value="'+r+'"'+(u.role===r?' selected':'')+'>'+ROLE_LABEL[r]+'</option>').join('');
  const deptOpts='<option value="">— ไม่ระบุ —</option>'+state.divisions.map(d=>'<option value="'+d.id+'"'+(u.division_id===d.id?' selected':'')+'>'+esc(d.name)+'</option>').join('');
  document.getElementById('modalHost').innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-head"><span class="t">แก้ไขผู้ใช้ · '+esc(u.username)+'</span><button class="modal-x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body">'+
      '<div class="field light"><label>ชื่อ-นามสกุล</label><input id="u_fullName" value="'+esc(u.full_name||'')+'"></div>'+
      '<div class="row r2"><div class="field light"><label>บทบาท</label><select id="u_role">'+roleOpts+'</select></div>'+
      '<div class="field light"><label>ฝ่าย</label><select id="u_dept">'+deptOpts+'</select></div></div>'+
      '<div class="field light"><label>สถานะ</label><select id="u_active"><option value="true"'+(u.active?' selected':'')+'>ใช้งาน</option><option value="false"'+(!u.active?' selected':'')+'>ปิดการใช้งาน</option></select></div>'+
    '</div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="saveUserEdit(\''+u.id+'\')">บันทึก</button></div></div></div>';
}
async function saveUserEdit(id){
  const g=k=>(document.getElementById(k)||{}).value;
  const rec = { full_name:g('u_fullName'), role:g('u_role'), division_id:g('u_dept')||null, active:g('u_active')==='true' };
  const { error } = await sb.from('profiles').update(rec).eq('id', id);
  if(error){ toast(error.message,'err'); return; }
  closeModal(); toast('บันทึกเรียบร้อย','ok'); renderUsers();
}

    (rows||[]).map(t=>'<tr><td>'+esc(t.label)+'</td>'+

}
async function saveTargets(){
  const map={};
  document.querySelectorAll('#content input[data-k]').forEach(inp=>{ map[inp.dataset.k]=map[inp.dataset.k]||{key:inp.dataset.k}; map[inp.dataset.k][inp.dataset.f]=parseFloat(inp.value)||0; });
  for(const t of Object.values(map)){
    const { error } = await sb.from('targets').update(t).eq('key', t.key);
    if(error){ toast(error.message,'err'); return; }
  }
  toast('บันทึกเป้าหมายเรียบร้อย','ok');
}

(async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ state.session = session; await loadProfileAndEnter(); }
})();
