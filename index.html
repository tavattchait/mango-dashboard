<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WRC ERP</title>
<link rel="icon" href="assets/wrc-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ground:#EEF1FA; --panel:#ffffff; --soft:#eef1f8;
  --ink:#101A33; --ink2:#334156; --muted:#6B7690; --muted2:#8592A8;
  --line:#E3E8F3; --line2:#D7DEEC;
  --teal:#0D9488; --teal2:#0B7A6C; --teal-soft:#E4F7F3;
  --blue:#2F6FED; --blue2:#1E4FC4; --blue-soft:#EAF1FE;
  --amber:#D97706; --amber2:#B45309; --amber-soft:#FDF1E0;
  --red:#DC2626; --red-soft:#FDECEC;
  --indigo:#4338CA; --indigo2:#3730A3; --indigo-soft:#EBEFF8;
  --sans:"IBM Plex Sans Thai","Segoe UI",system-ui,sans-serif;
  --disp:"Space Grotesk","IBM Plex Sans Thai",sans-serif;
  --mono:"IBM Plex Mono","SFMono-Regular",Consolas,monospace;
  --r:16px; --rail:84px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);color:var(--ink);font-size:14px;line-height:1.5;background:var(--ground);-webkit-font-smoothing:antialiased;overflow:hidden}
a{color:var(--blue);text-decoration:none} a:hover{color:var(--blue2)}
button,input,select,textarea{font-family:inherit;font-size:14px}
button{cursor:pointer}
.hidden{display:none!important}
.mono{font-family:var(--mono)}
.tnum{font-variant-numeric:tabular-nums}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#C9D2E3;border-radius:16px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes floatIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes growW{from{width:0!important}}
@keyframes auroraA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(5%,4%) scale(1.12)}}
@keyframes auroraB{0%,100%{transform:translate(0,0) scale(1.08)}50%{transform:translate(-4%,5%) scale(1)}}
@keyframes auroraC{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(3%,-4%) scale(1.15)}}
.glass{backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%)}

/* ---------- Login ---------- */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(1100px 480px at 50% -10%, var(--teal-soft), var(--ground) 60%)}
.login-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:40px 42px;
  width:100%;max-width:388px;box-shadow:0 20px 50px rgba(16,26,51,.12)}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:13px;margin-bottom:28px}
.login-logo img{width:66px;height:66px;object-fit:contain}
.login-logo .t{font-family:var(--disp);font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.login-logo .s{font-size:12px;color:var(--muted);font-family:var(--mono);letter-spacing:.04em}
.field{margin-bottom:15px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.02em}
.field input,.field select,.field textarea{width:100%;background:#F7F9FD;border:1px solid var(--line2);
  border-radius:var(--r);padding:11px 13px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.field input::placeholder{color:var(--muted2)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft);background:#fff}
.field input.warn{border-color:var(--red);background:var(--red-soft)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:var(--r);
  padding:11px 18px;font-weight:600;font-size:13.5px;transition:transform .08s,box-shadow .15s,opacity .15s}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--acc,var(--teal)),var(--acc2,#14b8a6));color:#fff;box-shadow:0 6px 16px -8px var(--acc,var(--teal))}
.btn-block{width:100%}
.btn-ghost{background:#fff;color:var(--ink2);border:1px solid var(--line2)}
.btn-ghost:hover{border-color:#C7CDD6}
.btn-danger{background:var(--red-soft);color:var(--red);border:1px solid #f7c9c9}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:12px}
.login-err{background:var(--red-soft);color:#991b1b;border:1px solid #f7c9c9;border-radius:9px;
  padding:10px 12px;font-size:12.5px;margin-bottom:14px}

/* ---------- Shell ---------- */
#appView{display:flex;height:100vh;width:100%;overflow:hidden;position:relative}
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.aurora span{position:absolute;border-radius:50%;filter:blur(46px)}
.a1{top:-14%;left:2%;width:38vw;height:38vw;background:radial-gradient(circle,rgba(67,56,202,.16) 0%,transparent 68%);animation:auroraA 26s ease-in-out infinite}
.a2{top:2%;right:-10%;width:36vw;height:36vw;background:radial-gradient(circle,rgba(217,119,6,.13) 0%,transparent 68%);animation:auroraB 30s ease-in-out infinite}
.a3{bottom:-16%;left:30%;width:34vw;height:34vw;background:radial-gradient(circle,rgba(13,148,136,.14) 0%,transparent 70%);animation:auroraC 34s ease-in-out infinite}

.sidebar{width:var(--rail);flex-shrink:0;background:rgba(255,255,255,.62);border-right:1px solid rgba(255,255,255,.7);
  backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
  display:flex;flex-direction:column;align-items:center;padding:16px 0 14px;z-index:30;position:relative;box-shadow:1px 0 0 rgba(15,23,42,.03)}
.sb-brand{display:flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:20px}
.sb-brand .box{width:42px;height:42px;border-radius:var(--r);background:linear-gradient(135deg,var(--indigo),var(--blue));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px -6px rgba(67,56,202,.55)}
.sb-brand .box span{font-family:var(--disp);font-weight:700;font-size:13px;color:#fff;letter-spacing:.3px}
.sb-brand .s{font-size:8.5px;font-weight:600;letter-spacing:.6px;color:var(--muted2)}
.sb-tiles{display:flex;flex-direction:column;gap:10px;flex:1;width:100%;align-items:center;overflow-y:auto}
.ws-tile{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer;padding:0;width:100%}
.ws-tile .icon{width:46px;height:46px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid #E4E7EC;font-size:19px;margin:0 auto}
.ws-tile.active .icon{border:2px solid var(--tc,var(--teal))}
.ws-tile .lbl{font-size:9px;font-weight:600;letter-spacing:.15em;color:#9AA4B2;font-family:var(--mono);text-transform:uppercase}
.ws-tile.active .lbl{color:var(--tc,var(--teal))}
.sb-bottom{display:flex;flex-direction:column;align-items:center;gap:12px}
.sb-gear{width:46px;height:46px;border-radius:var(--r);border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px}
.sb-gear:hover{border-color:#C7CDD6}
.sb-avatar{width:38px;height:38px;border-radius:var(--r);background:var(--indigo);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12.5px;color:#fff;cursor:pointer}
.rail-pop{position:absolute;left:56px;bottom:0;width:240px;background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:0 12px 28px -10px rgba(16,24,40,.22);z-index:99;padding:14px}
.rail-pop.user{width:190px;left:48px;padding:8px}
.rail-pop-bg{position:fixed;inset:0;z-index:98}

.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;z-index:10}
.topbar{height:68px;flex-shrink:0;background:rgba(255,255,255,.68);border-bottom:1px solid rgba(255,255,255,.7);
  backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
  display:flex;align-items:center;gap:16px;padding:0 26px;z-index:20;box-shadow:0 1px 0 rgba(15,23,42,.03)}
.tb-ws{display:flex;align-items:center;gap:11px}
.tb-ws .icon{width:36px;height:36px;border-radius:var(--r);background:var(--soft2,var(--soft));display:flex;align-items:center;justify-content:center;font-size:17px;border:1px solid var(--line)}
.tb-ws .name{font-weight:700;font-size:16.5px;color:var(--ink);letter-spacing:-.1px;line-height:1.15}
.tb-ws .sub{font-size:11.5px;color:var(--muted)}
.subnav{display:flex;gap:2px;background:var(--soft);border:1px solid var(--line);border-radius:var(--r);padding:3px;margin-left:8px}
.subnav .pill-tab{padding:7px 14px;border:none;border-radius:12px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:#8A94A6}
.subnav .pill-tab.active{font-weight:600;background:var(--soft2,var(--indigo-soft));color:var(--tc,var(--indigo));box-shadow:0 1px 2px rgba(16,24,40,.08)}
.tb-search{position:relative;width:220px;max-width:22vw}
.tb-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%)}
.tb-search input{width:100%;height:38px;border:1px solid var(--line);background:#F7F9FD;border-radius:var(--r);padding:0 12px 0 34px;font-size:12.5px;color:var(--ink);outline:none}
.tb-search input:focus{border-color:var(--tc,var(--teal));background:#fff}
.icon-btn{width:38px;height:38px;border-radius:var(--r);border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.icon-btn:hover{border-color:#C7CDD6}
.notif-dot{position:absolute;top:8px;right:9px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid #fff}
.content{flex:1;overflow-y:auto;overflow-x:hidden}
.page{padding:24px 26px 40px;max-width:1480px}
.page.wide{max-width:1600px}

/* ---------- Cards / KPI / common ---------- */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:0 1px 2px rgba(16,24,40,.03)}
.card+.card{margin-top:14px}
.card-t{font-size:14px;font-weight:600;color:var(--ink)}
.card-sub{font-size:11px;color:var(--muted)}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:0 1px 2px rgba(16,24,40,.03)}
.kpi .top{display:flex;align-items:center;justify-content:space-between}
.kpi .ic{width:34px;height:34px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px}
.kpi .delta{font-size:11.5px;font-weight:600}
.kpi .lb{font-size:10.5px;color:var(--muted);margin-top:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em}
.kpi .vl{font-family:var(--disp);font-size:23px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.kpi .sub{font-size:11px;color:var(--muted2);margin-top:2px}
.mini{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:13px 15px}
.mini .lb{font-size:10.5px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em}
.mini .vl{font-family:var(--disp);font-size:19px;font-weight:700;color:var(--ink)}

.pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:1px 9px;border-radius:999px;font-family:var(--mono)}
.badge{display:inline-block;font-size:10.5px;font-weight:500;color:var(--muted2);font-family:var(--mono)}
.progress-bar{height:6px;background:#EBEFF8;border-radius:999px;overflow:hidden}
.progress-bar>div{height:100%;border-radius:999px;animation:growW 1s ease both}

.table-wrap{overflow-x:auto;border:1px solid var(--line2);border-radius:var(--r)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#F3F6FC;text-align:left;padding:9px 14px;font-weight:700;color:#5B6B84;
  font-size:11px;letter-spacing:.02em;white-space:nowrap;border-bottom:1px solid var(--line2);border-right:1px solid var(--line)}
thead th:last-child{border-right:none}
tbody td{padding:9px 14px;border-bottom:1px solid #EEF1F8;white-space:nowrap;color:var(--ink2)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#F7F9FD}
td.num,th.num{text-align:right}
.rowlink{color:var(--ink);font-weight:600;cursor:pointer}
.rowlink:hover{color:var(--teal)}
.empty{text-align:center;color:var(--muted);padding:42px 20px;font-size:13px}

.form-section{border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;background:#F7F9FD}
.form-section-t{font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--teal);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
.row{display:grid;gap:14px}
.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}.r4{grid-template-columns:repeat(4,1fr)}
@media(max-width:760px){.r2,.r3,.r4{grid-template-columns:1fr}}
.inline-warn{font-size:11.5px;color:var(--red);margin-top:5px;font-weight:600;display:none}

.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:120;padding:20px}
.modal{background:#fff;border-radius:20px;box-shadow:0 24px 50px -20px rgba(15,23,42,.4);width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-head .t{font-family:var(--disp);font-size:16.5px;font-weight:700}
.modal-x{background:var(--soft);border:none;border-radius:8px;width:32px;height:32px;font-size:17px;color:var(--muted)}
.modal-body{padding:22px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.warn-list{list-style:none}
.warn-list li{padding:11px 14px;border-radius:var(--r);margin-bottom:8px;font-size:13px;font-weight:600;display:flex;gap:9px;align-items:flex-start}
.warn-list li.block{background:var(--red-soft);color:#991b1b;border:1px solid #f7c9c9}
.warn-list li.warn{background:var(--amber-soft);color:#92400e;border:1px solid #fbe0ae}

#toast{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:13.5px;font-weight:600;
  box-shadow:0 10px 30px rgba(0,0,0,.3);display:flex;align-items:center;gap:9px;animation:slidein .25s}
.toast.ok{background:#065f46}.toast.err{background:#991b1b}
@keyframes slidein{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

.mobile-toggle{display:none}
@media(max-width:860px){
  .sidebar{position:fixed;top:0;bottom:0;left:0;transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .mobile-toggle{display:flex;background:var(--soft);border:1px solid var(--line);border-radius:9px;width:38px;height:38px;font-size:17px;align-items:center;justify-content:center}
  .subnav{display:none}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginView">
  <form class="login-card" id="loginForm" onsubmit="doLogin(event)">
    <div class="login-logo">
      <img src="assets/wrc-logo.png" alt="WRC">
      <div class="t">WRC ERP</div>
      <div class="s">SYSTEM ACCESS</div>
    </div>
    <div class="login-err hidden" id="loginErr"></div>
    <div class="field"><label>ชื่อผู้ใช้</label><input id="loginUser" autocomplete="username" required></div>
    <div class="field"><label>รหัสผ่าน</label><input id="loginPw" type="password" autocomplete="current-password" required></div>
    <button class="btn btn-primary btn-block" id="loginBtn" type="submit" style="--acc:var(--teal);--acc2:#14b8a6">เข้าสู่ระบบ →</button>
  </form>
</div>

<!-- ============ APP ============ -->
<div id="appView" class="hidden">
  <div class="aurora"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div>

  <aside class="sidebar" id="sidebar">
    <div class="sb-brand"><div class="box"><span>WRC</span></div><div class="s">ERP</div></div>
    <div class="sb-tiles" id="sbTiles"></div>
    <div class="sb-bottom" id="sbBottom"></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <div class="tb-ws" id="tbWs"></div>
      <div class="subnav" id="subnav"></div>
      <div style="flex:1"></div>
      <div id="topActions" style="display:flex;gap:10px;align-items:center"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="modalHost"></div>
<div id="toast"></div>

<script>
/* ============================================================
 * WRC ERP — frontend (GitHub Pages + Supabase), design ported from Claude Design mockup
 * ============================================================ */
const SUPA_URL = 'https://ryesfzzsolnsarkkibwa.supabase.co';
const SUPA_KEY = 'sb_publishable__LTMHdZUUj03iPHsAy3Lfw_7k_2e9ZL';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const ROLE_LABEL = {admin:'ผู้ดูแลระบบ', manager:'ผู้จัดการฝ่าย', pm:'ผู้จัดการโครงการ', accountant:'ฝ่ายบัญชี', viewer:'ผู้ดูรายงาน'};
const DIV_ICON = {pjcm:'⚡', pc:'🧱', en:'☀️'};
const DIV_PALETTE = { pjcm:{acc:'#2F6FED',acc2:'#1E4FC4',soft:'#EAF1FE'}, en:{acc:'#0D9488',acc2:'#0B7A6C',soft:'#E4F7F3'}, pc:{acc:'#D97706',acc2:'#B45309',soft:'#FDF1E0'} };
const CO_CFG = {id:'company', name:'WRC — ภาพรวมองค์กร', tagline:'ศูนย์บัญชาการทุกฝ่ายงาน', icon:'🏢', acc:'#4338CA', acc2:'#3730A3', soft:'#EBEFF8'};
const MONTH_T = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

const state = { session:null, profile:null, divisions:[], projects:[],
  ws:'company', sub:'overview', selProj:null, planView:'day', projTab:'overview',
  searchQuery:'', openMenu:null, cache:{} };

/* ---------- util ---------- */
function fmt(n){ n=parseFloat(n); if(!isFinite(n)) n=0; return Math.round(n).toLocaleString('en-US'); }
function fmtM(n){ n=parseFloat(n)||0; return (n/1e6).toFixed(1)+'M'; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function thMonth(ym){ if(!ym) return '-'; const [y,m]=ym.split('-'); return (MONTH_T[+m-1]||'')+' '+(+y+543); }
function thDate(iso){ if(!iso) return '-'; const d=new Date(iso); return d.getDate()+' '+MONTH_T[d.getMonth()]+' '+(d.getFullYear()+543); }
function todayThaiStr(){ const d=new Date(); const WD=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์']; return 'วัน'+WD[d.getDay()]+'ที่ '+d.getDate()+' '+MONTH_T[d.getMonth()]+' '+(d.getFullYear()+543); }
function lastMonths(n){ const out=[]; const d=new Date(); d.setDate(1); for(let i=n-1;i>=0;i--){ const x=new Date(d.getFullYear(),d.getMonth()-i,1); out.push(x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')); } return out; }
function currentMonth(){ return new Date().toISOString().slice(0,7); }
function content(html){ document.getElementById('content').innerHTML = html; }
function toast(msg, type){
  const el = document.createElement('div');
  el.className = 'toast ' + (type||'');
  el.innerHTML = (type==='ok'?'✅ ':type==='err'?'⚠️ ':'') + esc(msg);
  document.getElementById('toast').appendChild(el);

}

/* ---------- chart helpers (SVG, ported from design) ---------- */
function svgSpark(data,color){
  if(!data.length) data=[0,0];
  const w=118,h=28,max=Math.max(...data),min=Math.min(...data);
  const pts=data.map((v,i)=>[i/((data.length-1)||1)*w, h-2-((v-min)/((max-min)||1))*(h-6)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const id='sp'+Math.random().toString(36).slice(2,7);
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="28" preserveAspectRatio="none">'+
    '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity=".25"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'+
    '<path d="'+line+' L'+w+' '+h+' L0 '+h+' Z" fill="url(#'+id+')"/>'+
    '<path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function svgDonut(segs){
  const r=50,sw=16,c=2*Math.PI*r,cx=66,cy=66; let off=0; const total=segs.reduce((a,s)=>a+s.v,0)||1;
  let arcs=''; segs.forEach(s=>{ const len=s.v/total*c; arcs+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.color+'" stroke-width="'+sw+'" stroke-dasharray="'+len+' '+(c-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+cx+' '+cy+')"/>'; off+=len; });
  return '<svg width="132" height="132" viewBox="0 0 132 132"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#EBEFF8" stroke-width="'+sw+'"/>'+arcs+'</svg>';
}
function svgRing(pct,color){
  const r=32,sw=8,c=2*Math.PI*r,len=Math.max(0,Math.min(100,pct))/100*c;
  return '<svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="40" r="'+r+'" fill="none" stroke="#EBEFF8" stroke-width="'+sw+'"/>'+
    '<circle cx="40" cy="40" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-dasharray="'+len+' '+(c-len)+'" transform="rotate(-90 40 40)"/>'+
    '<text x="40" y="45" text-anchor="middle" font-size="16" font-weight="700" fill="#101A33" font-family=\'Space Grotesk\'>'+Math.round(pct)+'</text></svg>';
}
function svgMiniProgress(pct,color){
  pct=Math.max(0,Math.min(100,Math.round(pct||0)));
  const r=42,sw=9,c=2*Math.PI*r,len=pct/100*c;
  return '<svg width="104" height="104" viewBox="0 0 104 104"><circle cx="52" cy="52" r="'+r+'" fill="none" stroke="#EBEFF8" stroke-width="'+sw+'"/>'+
    '<circle cx="52" cy="52" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-dasharray="'+len+' '+(c-len)+'" transform="rotate(-90 52 52)"/>'+
    '<text x="52" y="49" text-anchor="middle" font-size="20" font-weight="700" fill="#101A33" font-family=\'Space Grotesk\'>'+pct+'%</text>'+
    '<text x="52" y="65" text-anchor="middle" font-size="9.5" fill="#8592A8">คืบหน้า</text></svg>';
}
function svgStackedArea(series, months){
  const w=680,h=236,padL=34,padR=10,padT=12,padB=24,n=months.length;
  const totals = months.map((_,i)=>series.reduce((a,s)=>a+(s.data[i]||0),0));
  const max = (Math.ceil(Math.max(1,...totals)/3)*3) || 3;
  const x=i=>padL+i*(w-padL-padR)/((n-1)||1);
  const y=v=>padT+(1-v/max)*(h-padT-padB);
  let grid='';
  for(let g=0; g<=3; g++){ const gv=max*g/3, gy=y(gv);
    grid += '<line x1="'+padL+'" x2="'+(w-padR)+'" y1="'+gy+'" y2="'+gy+'" stroke="#EBEFF8" stroke-width="1"/>'+
      '<text x="'+(padL-7)+'" y="'+(gy+3.5)+'" text-anchor="end" font-size="9.5" fill="#6B7690" font-family=\'IBM Plex Mono\'>'+fmt(gv)+'</text>'; }
  let labels=''; months.forEach((m,i)=>{ labels+='<text x="'+x(i)+'" y="'+(h-8)+'" text-anchor="middle" font-size="9" fill="#6B7690">'+esc(m)+'</text>'; });
  let cum = months.map(()=>0); let layers='';
  series.forEach(s=>{
    const lower=cum.slice(); const upper=cum.map((c,i)=>c+(s.data[i]||0)); cum=upper;
    let d='M'+x(0)+' '+y(upper[0]); for(let i=1;i<n;i++) d+=' L'+x(i)+' '+y(upper[i]);
    for(let i=n-1;i>=0;i--) d+=' L'+x(i)+' '+y(lower[i]); d+=' Z';
    layers += '<path d="'+d+'" fill="'+s.color+'" fill-opacity=".82" stroke="#fff" stroke-width="1"/>';
  });
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="display:block;margin-top:6px" preserveAspectRatio="xMidYMid meet">'+grid+layers+labels+'</svg>';
}
function svgLineChart(rev,cost,acc,months){
  const w=560,h=224,padL=30,padR=10,padT=12,padB=24,n=months.length;
  const max=(Math.ceil(Math.max(1,...rev)/2)*2) || 2;
  const x=i=>padL+i*(w-padL-padR)/((n-1)||1);
  const y=v=>padT+(1-v/max)*(h-padT-padB);
  function path(d,close){ let s=d.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' '); if(close) s+=' L'+x(n-1).toFixed(1)+' '+y(0).toFixed(1)+' L'+x(0).toFixed(1)+' '+y(0).toFixed(1)+' Z'; return s; }
  let grid=''; for(let g=0; g<=3; g++){ const gy=y(max*g/3); grid+='<line x1="'+padL+'" x2="'+(w-padR)+'" y1="'+gy+'" y2="'+gy+'" stroke="#EBEFF8" stroke-width="1"/>'; }
  let labels=''; months.forEach((m,i)=>{ labels+='<text x="'+x(i)+'" y="'+(h-8)+'" text-anchor="middle" font-size="9" fill="#6B7690">'+esc(m)+'</text>'; });
  let dots=''; rev.forEach((v,i)=>{ dots+='<circle cx="'+x(i)+'" cy="'+y(v)+'" r="2.4" fill="#fff" stroke="'+acc+'" stroke-width="2"/>'; });
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="display:block;margin-top:6px" preserveAspectRatio="xMidYMid meet">'+
    '<defs><linearGradient id="dv" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+acc+'" stop-opacity=".18"/><stop offset="100%" stop-color="'+acc+'" stop-opacity="0"/></linearGradient></defs>'+
    grid+
    '<path d="'+path(cost,false)+'" fill="none" stroke="#C9D2E3" stroke-width="2" stroke-dasharray="5 4" stroke-linecap="round"/>'+
    '<path d="'+path(rev,true)+'" fill="url(#dv)"/>'+
    '<path d="'+path(rev,false)+'" fill="none" stroke="'+acc+'" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>'+
    dots+labels+'</svg>';
}

async function doLogin(e){
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  err.classList.add('hidden');
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPw').value;
  try{
    const email = username.toLowerCase() + '@wrc.local';
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ err.textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'; err.classList.remove('hidden'); return; }
    state.session = data.session;
    await loadProfileAndEnter();
  }catch(ex){ err.textContent = 'เชื่อมต่อไม่ได้: '+ex.message; err.classList.remove('hidden'); }
  finally{ btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ →'; }
}
async function loadProfileAndEnter(){
  const { data:{ user } } = await sb.auth.getUser();
  const { data: prof, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if(error || !prof){ toast('ไม่พบโปรไฟล์ผู้ใช้ ติดต่อผู้ดูแลระบบ','err'); return; }
  if(!prof.active){ toast('บัญชีนี้ถูกปิดใช้งาน','err'); await sb.auth.signOut(); return; }
  state.profile = prof;
  const { data: divs } = await sb.from('divisions').select('*').order('sort_order');
  state.divisions = divs || [];
  enterApp();
}

function subnavConfig(){
  const role = state.profile.role, isAdmin = role==='admin';

function sumDivision(projRows, monthRows, divId, month){
  const ids = new Set(projRows.filter(p=>p.division_id===divId).map(p=>p.id));
  const rows = monthRows.filter(m=>ids.has(m.project_id) && m.month===month);
  const agg = {rev:0,cost:0,n:rows.length};
  rows.forEach(r=>{ agg.rev+=+r.con_actual||0; agg.cost+=+r.cost_actual||0; });
  agg.gp = agg.rev - agg.cost;
  return agg;
}

    (!filtered.length ? '<div style="padding:20px 10px;text-align:center;font-size:12px;color:var(--muted)">ไม่พบโครงการที่ค้นหา</div>' :
    filtered.map(p=>{ const on = p.id===state.selProj;
      return '<div onclick="selectProject(\''+p.id+'\')" style="display:flex;gap:11px;align-items:center;padding:11px 12px;border-radius:16px;cursor:pointer;border:1px solid '+(on?D.acc:'var(--line2)')+';background:'+(on?D.soft:'#fff')+'">'+

    }).join(''))+

async function renderProjectDetail(projId){
  const D = divCfg(state.ws);
  const { data: p } = await sb.from('projects').select('*').eq('id', projId).single();
  if(!p){ document.getElementById('projDetailHost').innerHTML = '<div class="empty">ไม่พบโครงการ</div>'; return; }
  const [{data:months},{data:fin},{data:sc},{data:loss},{data:stk},{data:mile},{data:cost},{data:att}] = await Promise.all([
    sb.from('project_monthly').select('*').eq('project_id', projId).order('month', {ascending:false}),
    sb.from('financials').select('*').eq('project_id', projId).order('month', {ascending:false}),
    sb.from('scurve').select('*').eq('project_id', projId).order('month'),
    sb.from('losses').select('*').eq('project_id', projId).order('month', {ascending:false}),
    sb.from('stock').select('*').eq('project_id', projId).order('material'),
    sb.from('milestones').select('*').eq('project_id', projId).order('sort_order'),
    sb.from('cost_entries').select('*').eq('project_id', projId).order('entry_date', {ascending:false}),
    sb.from('attachments').select('*').eq('project_id', projId).order('uploaded_at', {ascending:false}),
  ]);
  const rows = months||[];
  const totalSpent = rows.reduce((s,r)=>s+(+r.cost_actual||0),0);
  const totalCon = rows.reduce((s,r)=>s+(+r.con_actual||0),0);
  const remaining = (p.total_amt||0) - totalCon;
  const gp = totalCon - totalSpent;
  const editable = canWrite(p.division_id);
  state.cache.proj = { p, months:rows, fin:fin||[], sc:sc||[], loss:loss||[], stk:stk||[], mile:mile||[], cost:cost||[], att:att||[] };
  const spentPct = p.total_amt>0 ? Math.round(totalSpent/p.total_amt*100) : 0;
  const marginPct = totalCon>0 ? ((totalCon-totalSpent)/totalCon*100) : 0;
  const progressPct = p.total_amt>0 ? Math.min(100, Math.round(totalCon/p.total_amt*100)) : 0;

  const milestones = (mile||[]).map(m=>({ name:m.name, done:m.status==='เสร็จแล้ว', active:m.status==='กำลังทำ', due:m.due_date }));

  let html = '<div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:20px">'+

    '<div style="flex:1"><div style="display:flex;align-items:center;gap:9px;margin-bottom:3px"><span class="badge">'+esc(p.code)+'</span>'+statusPill(p.status)+'</div>'+
    '<div style="font-size:20px;font-weight:700;color:var(--ink);line-height:1.2;letter-spacing:-.2px">'+esc(p.name)+'</div>'+
    '<div style="display:flex;gap:16px;margin-top:7px;font-size:12px;color:var(--muted);flex-wrap:wrap"><span>📍 '+esc(p.location||'-')+'</span><span>🏢 '+esc(p.client||'-')+'</span><span>👤 '+esc(p.pm||'-')+'</span></div></div>'+
    (editable ? '<button class="btn btn-primary btn-sm" style="--acc:'+D.acc+';--acc2:'+D.acc2+'" onclick="openMonthlyEntry(\''+p.id+'\')">รายงานความคืบหน้า</button>'+
      '<button class="btn btn-ghost btn-sm" onclick=\'openProject('+JSON.stringify(p)+')\'>แก้ไข</button>' : '')+
    '</div>'+
    '<div class="grid g4" style="margin-bottom:14px">'+
      miniStat('มูลค่าสัญญา','฿'+fmt(p.total_amt))+
      '<div class="mini"><div class="lb">ใช้ไปแล้ว</div><div class="vl tnum" style="color:'+D.acc+'">฿'+fmt(totalSpent)+'</div><div style="font-size:10.5px;color:var(--muted2)">'+spentPct+'% ของสัญญา</div></div>'+
      miniStat('คงเหลือ','฿'+fmt(remaining),'#0D9488')+
      miniStat('กำไรขั้นต้น',marginPct.toFixed(1)+'%','#4338CA')+
    '</div>'+

function monthInRange(year,m,start,end){
  const s=start?new Date(start):null, e=end?new Date(end):null;
  const cellStart=new Date(year,m,1), cellEnd=new Date(year,m+1,0);
  if(s && cellEnd<s) return false; if(e && cellStart>e) return false; return true;
}

async function openMangoSync(divId){
  document.getElementById('modalHost').innerHTML =

      '<div class="empty">ดึงข้อมูลไม่สำเร็จ: '+esc(ex.message)+'</div>';

function renderMangoList(){
  const rows = state.cache.mangoCandidates || [];

    '<div style="max-height:340px;overflow-y:auto" class="table-wrap"><table><thead><tr><th></th><th>รหัส</th><th>ชื่อโครงการ</th><th>PM</th><th class="num">มูลค่าสัญญา</th></tr></thead><tbody>'+

      '<td class="num tnum">'+fmt(p.contract_amt+p.vo_amt)+'</td></tr>').join('')+'</tbody></table></div>' :
    '<div class="empty">ไม่พบโครงการใหม่ในฝ่ายนี้</div>';

    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:640px">'+
    '<div class="modal-head"><span class="t">⬇️ พบ '+rows.length+' โครงการใหม่จาก Mango</span><button class="modal-x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body">'+body+'</div>'+
    '<div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">ปิด</button>'+

    '</div></div></div>';
}
async function importMangoSelected(){
  const rows = state.cache.mangoCandidates || [];
  const picked = [...document.querySelectorAll('.mango-chk:checked')].map(el=>rows[+el.dataset.i]);
  if(!picked.length){ toast('เลือกอย่างน้อย 1 โครงการ','err'); return; }
  const seen = new Set();
  const deduped = picked.filter(p => seen.has(p.code) ? false : (seen.add(p.code), true));
  const { error } = await sb.from('projects').insert(deduped);
  if(error){ toast(error.message,'err'); return; }
  closeModal(); toast('นำเข้า '+deduped.length+' โครงการเรียบร้อย','ok'); renderProjectsPage();
}

  set('me_dueSubmit',e.submit_due); set('me_actualSubmit',e.submit_actual);
  set('me_billPlan',e.bill_plan); set('me_billActual',e.bill_actual);

  const { data: ex } = await sb.from('project_monthly').select('*').eq('project_id', projId).eq('month', month).maybeSingle();

function liveCheck(){
  const g=id=>parseFloat((document.getElementById(id)||{}).value)||0;
  const chk=(id,cond,msg)=>{ const el=document.getElementById(id), w=document.getElementById(id+'_w'); if(!el||!w)return;
    el.classList.toggle('warn',cond); w.style.display=cond?'block':'none'; w.textContent=msg; };
  chk('me_billActual', g('me_billPlan')>0 && g('me_billActual')>g('me_billPlan'), '⚠ วางบิลจริงเกินแผน — ต้องระบุเหตุผลก่อนบันทึก');
  chk('me_costActual', g('me_budget')>0 && g('me_costActual')>g('me_budget'), '⚠ ใช้จริงเกิน Budget');
  chk('me_conActual', g('me_conPlan')>0 && g('me_conActual')>g('me_conPlan'), '⚠ ได้จริงเกินค่างานแผน');
}
function collectMonthly(projId){
  const g=id=>(document.getElementById(id)||{}).value;
  return { project_id:projId, month:g('me_month'),
    con_plan:+g('me_conPlan')||0, con_should:+g('me_conShould')||0, con_actual:+g('me_conActual')||0, con_status:g('me_conStatus'),
    cost_budget:+g('me_budget')||0, cost_should:+g('me_costShould')||0, cost_actual:+g('me_costActual')||0, cost_status:g('me_costStatus'),
    submit_due:g('me_dueSubmit')||null, submit_actual:g('me_actualSubmit')||null,
    bill_plan:+g('me_billPlan')||0, bill_actual:+g('me_billActual')||0,
    bill_due:g('me_billDue')||null, bill_actual_date:g('me_billActualDate')||null,
    note:g('me_note') };
}
function validateEntry(en){
  const w=[];
  if(en.bill_plan>0 && en.bill_actual>en.bill_plan)
    w.push({level:'block',msg:'วางบิลจริง '+fmt(en.bill_actual)+' เกินแผนวางบิล '+fmt(en.bill_plan)+' — ต้องระบุเหตุผลก่อนบันทึก'});
  if(en.cost_budget>0 && en.cost_actual>en.cost_budget)
    w.push({level:'warn',msg:'ใช้จริง '+fmt(en.cost_actual)+' เกิน Budget '+fmt(en.cost_budget)});
  if(en.con_plan>0 && en.con_actual>en.con_plan)
    w.push({level:'warn',msg:'ได้จริง '+fmt(en.con_actual)+' เกินค่างานแผน '+fmt(en.con_plan)+' — โปรดตรวจสอบ'});
  return w;
}
async function saveMonthlyEntry(projId, override, reason){
  const entry = collectMonthly(projId);
  if(!entry.month){ toast('กรุณาเลือกเดือน','err'); return; }
  const warnings = validateEntry(entry);
  const hasBlock = warnings.some(w=>w.level==='block');
  if(warnings.length && !override){ showConfirm(projId, entry, warnings, hasBlock); return; }
  if(hasBlock && !(reason||'').trim()){ toast('กรุณาระบุเหตุผล','err'); return; }
  if(reason) entry.note = (entry.note||'') + ' [เหตุผลเกินแผน: '+reason+']';

  const { data: ex } = await sb.from('project_monthly').select('id').eq('project_id',projId).eq('month',entry.month).maybeSingle();
  let error;
  if(ex){ ({error} = await sb.from('project_monthly').update(entry).eq('id', ex.id)); }
  else { ({error} = await sb.from('project_monthly').insert(entry)); }
  if(error){ toast(error.message,'err'); return; }
  closeModal(); toast('บันทึกเรียบร้อย','ok');
  renderProjectDetail(projId);
}
function showConfirm(projId, entry, warnings, reasonRequired){
  state.cache.pendingEntry = entry; state.cache.pendingProj = projId; state.cache.reasonRequired = reasonRequired;
  document.getElementById('modalHost').innerHTML =
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-head"><span class="t">⚠️ ตรวจพบข้อมูลผิดปกติ</span><button class="modal-x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body"><ul class="warn-list">'+
      warnings.map(w=>'<li class="'+w.level+'"><span>'+(w.level==='block'?'🚫':'⚠️')+'</span><span>'+esc(w.msg)+'</span></li>').join('')+
    '</ul>'+
    (reasonRequired?'<div class="field" style="margin-top:8px"><label>เหตุผล (จำเป็น เพราะเกินแผน)</label><textarea id="confirmReason" rows="2" placeholder="เช่น ลูกค้าขอเพิ่มงาน / VO..."></textarea></div>':'')+
    '</div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" style="--acc:var(--teal);--acc2:#14b8a6" onclick="confirmSaveMonthly()">ยืนยันบันทึก</button></div></div></div>';
}
function confirmSaveMonthly(){
  const reason = (document.getElementById('confirmReason')||{}).value || '';
  if(state.cache.reasonRequired && !reason.trim()){ toast('กรุณาระบุเหตุผล','err'); return; }
  saveMonthlyEntry(state.cache.pendingProj, true, reason);
}

  const map={draft:{c:'var(--muted)',bg:'var(--soft)'},pending:{c:'#D97706',bg:'var(--amber-soft)'},approved:{c:'#0D9488',bg:'var(--teal-soft)'},paid:{c:'#2F6FED',bg:'var(--blue-soft)'}};

async function saveUserCreate(){
  const g=k=>(document.getElementById(k)||{}).value;
  const username = g('nu_username').trim();
  const password = g('nu_password');
  const err = document.getElementById('nu_err');
  err.classList.add('hidden');
  if(!username){ err.textContent='กรอกชื่อผู้ใช้'; err.classList.remove('hidden'); return; }
  if(password.length<6){ err.textContent='รหัสผ่านต้องยาวอย่างน้อย 6 ตัว'; err.classList.remove('hidden'); return; }
  const btn = document.getElementById('nu_save'); btn.disabled=true; btn.textContent='กำลังสร้าง...';
  try{
    const { data, error } = await sb.functions.invoke('create-user', { body: {
      username, password, full_name: g('nu_fullName')||username, role: g('nu_role'), division_id: g('nu_dept')||null
    }});
    if(error || (data && data.error)){ err.textContent = (data&&data.error) || error.message; err.classList.remove('hidden'); return; }
    closeModal(); toast('สร้างผู้ใช้ '+username+' เรียบร้อย','ok'); renderUsers();
  }catch(ex){ err.textContent = 'เชื่อมต่อไม่ได้: '+ex.message; err.classList.remove('hidden'); }
  finally{ btn.disabled=false; btn.textContent='สร้างผู้ใช้'; }
}

      '<div class="field"><label>ฝ่าย</label><select id="u_dept">'+deptOpts+'</select></div></div>'+
      '<div class="field"><label>สถานะ</label><select id="u_active"><option value="true"'+(u.active?' selected':'')+'>ใช้งาน</option><option value="false"'+(!u.active?' selected':'')+'>ปิดการใช้งาน</option></select></div>'+
    '</div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" style="--acc:var(--indigo);--acc2:var(--indigo2)" onclick="saveUserEdit(\''+u.id+'\')">บันทึก</button></div></div></div>';
}
async function saveUserEdit(id){
  const g=k=>(document.getElementById(k)||{}).value;
  const rec = { full_name:g('u_fullName'), role:g('u_role'), division_id:g('u_dept')||null, active:g('u_active')==='true' };
  const { error } = await sb.from('profiles').update(rec).eq('id', id);
  if(error){ toast(error.message,'err'); return; }
  closeModal(); toast('บันทึกเรียบร้อย','ok'); renderUsers();
}
async function renderTargets(){
  const { data: rows } = await sb.from('targets').select('*').order('key');
  content('<div class="page"><div class="card"><div class="card-t" style="margin-bottom:16px">🎯 เป้าหมายบริษัทประจำปี</div>'+
    '<div class="table-wrap"><table><thead><tr><th>รายการ</th><th class="num">เป้า/เดือน (ลบ.)</th><th class="num">เป้า/ปี (ลบ.)</th></tr></thead><tbody>'+
    (rows||[]).map(t=>'<tr><td>'+esc(t.label)+'</td>'+
      '<td class="num"><input data-k="'+esc(t.key)+'" data-f="per_month" type="number" step="0.01" value="'+t.per_month+'" style="width:120px;text-align:right;padding:6px 10px;border:1px solid var(--line2);border-radius:8px"></td>'+
      '<td class="num"><input data-k="'+esc(t.key)+'" data-f="per_year" type="number" step="0.01" value="'+t.per_year+'" style="width:130px;text-align:right;padding:6px 10px;border:1px solid var(--line2);border-radius:8px"></td></tr>').join('')+
    '</tbody></table></div><div style="display:flex;justify-content:flex-end;margin-top:14px"><button class="btn btn-primary" style="--acc:var(--indigo);--acc2:var(--indigo2)" onclick="saveTargets()">💾 บันทึก</button></div></div></div>');
}
async function saveTargets(){
  const map={};
  document.querySelectorAll('#content input[data-k]').forEach(inp=>{ map[inp.dataset.k]=map[inp.dataset.k]||{key:inp.dataset.k}; map[inp.dataset.k][inp.dataset.f]=parseFloat(inp.value)||0; });
  for(const t of Object.values(map)){
    const { error } = await sb.from('targets').update(t).eq('key', t.key);
    if(error){ toast(error.message,'err'); return; }
  }
  toast('บันทึกเป้าหมายเรียบร้อย','ok');
}
async function renderAudit(){
  const { data: rows, error } = await sb.from('audit_log').select('*').order('ts',{ascending:false}).limit(300);
  if(error){ content('<div class="page"><div class="card"><div class="empty">'+esc(error.message)+'</div></div></div>'); return; }
  if(!rows.length){ content('<div class="page"><div class="card"><div class="empty">ยังไม่มีประวัติ</div></div></div>'); return; }
  const ACT={insert:'เพิ่มข้อมูล',update:'แก้ไขข้อมูล',delete:'ลบข้อมูล'};
  const ENT={projects:'โครงการ',project_monthly:'ความคืบหน้ารายเดือน',profiles:'ผู้ใช้',cost_entries:'ต้นทุน'};
  content('<div class="page"><div class="card" style="padding:0"><div class="table-wrap" style="border:none"><table><thead><tr>'+
    '<th>เวลา</th><th>ผู้ใช้</th><th>การกระทำ</th><th>ประเภท</th><th>รายการ</th></tr></thead><tbody>'+
    rows.map(r=>'<tr><td class="mono" style="font-size:11.5px">'+esc((r.ts||'').replace('T',' ').slice(0,19))+'</td>'+
      '<td><b>'+esc(r.actor_name||'-')+'</b></td><td>'+esc(ACT[r.action]||r.action)+'</td>'+
      '<td>'+esc(ENT[r.entity]||r.entity)+'</td><td>'+esc(r.entity_key||'-')+'</td></tr>').join('')+
    '</tbody></table></div></div></div>');
}

/* ---------- boot: restore session ---------- */
(async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ state.session = session; await loadProfileAndEnter(); }
})();
</script>
</body>
