// รายชื่อหน้าย่อยของฝ่ายปฏิบัติ (icon key ใช้ร่วมกับ LICO ของเมนูหลัก) — ใช้ทั้งใน breadcrumb และหน้ารวมเมนู
const OPS_PAGES = [
  ['dash','สรุป','bar-chart',true],
  ['wo','ใบสั่งงาน','clipboard',true],
  ['today','งานวันนี้','activity',false],
  ['submit','ตั้งงาน','folder',false],
  ['cal','ปฏิทิน','calendar',false],
  ['req','เบิกของ','file-text',false],
  ['items','คลังไอเทม','grid',false],
  ['reports','รายงานผล','image',false],
  ['approvals','รออนุมัติ','user-check',true],
];
async function renderOpsPage(){
  const D = divCfg(state.ws);
  await loadAllProjects();
  const { data: teams } = await sb.from('teams').select('*').eq('division_id',state.ws).order('name');
  state.cache.teams = teams||[];
  if(!state.opsTab) state.opsTab = 'home';
  const mob = isMobileMode();
  const canLead = canApproveReq();
  const pages = OPS_PAGES.filter(p=>!p[3]||canLead);
  const current = pages.find(p=>p[0]===state.opsTab);
  // มือถือ: bottom-nav จัดการ nav เอง ไม่ต้องมี header ซ้ำ · เดสก์ท็อป: หน้า home ไม่ต้องมี header (ตัวมันเองคือเมนูอยู่แล้ว) หน้าอื่นมี breadcrumb กลับสั้นๆ แทนแถบแท็บยาวเดิม
  const header = mob ? '' : (state.opsTab==='home' ? '' :
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">'+
      '<button class="btn btn-ghost btn-sm" onclick="switchOpsTab(\'home\')">← เมนู</button>'+
      '<span style="font-size:13.5px;font-weight:700;color:var(--ink)">'+(current?esc(current[1]):'')+'</span>'+
    '</div>');
  let html = '<div class="page'+(mob?'':' wide')+'">'+header+'<div id="opsBody"></div></div>';
  content(html);
  if(state.opsTab==='home' && !mob) renderOpsHome(D, pages);
  else if(state.opsTab==='dash' && canLead) await renderOpsDash(D);
  else if(state.opsTab==='wo' && canLead) await renderOpsWO(D);
  else if(state.opsTab==='today' || state.opsTab==='home') await renderOpsToday(D);
  else if(state.opsTab==='submit') await renderOpsSubmit(D);
  else if(state.opsTab==='cal') await renderOpsCalendar(D);
  else if(state.opsTab==='req') await renderOpsReq(D);
  else if(state.opsTab==='items') await renderOpsItems(D);
  else if(state.opsTab==='reports') await renderOpsReports(D);
  else if(state.opsTab==='approvals') await renderOpsApprovals(D);
}

  const body = document.getElementById('opsBody'); if(!body) return;

async function saveSubmitPlan(){
  const g=k=>(document.getElementById(k)||{}).value;
  const task = g('sp_task').trim();
  if(!task){ toast('กรอกงานที่จะทำ','err'); return; }
  const projId = g('sp_proj'), teamId = g('sp_team')||null, when = g('sp_date');
  const locDetail = g('sp_loc') + (g('sp_manhole') ? (g('sp_loc')?' · ':'')+'บ่อ '+g('sp_manhole') : '');
  const { data:{ user } } = await sb.auth.getUser();
  const planRec = { division_id:state.ws, plan_date:when, start_date:when, team_id:teamId, project_id:projId||null,
    task, shift:g('sp_shift'), location_detail:locDetail, duration:+g('sp_dur')||1, pct:0,
    headcount_male:+g('sp_male')||0, headcount_female:+g('sp_female')||0,
    status:'รออนุมัติ', created_by:user.id };
  const { data: plan, error } = await sb.from('daily_plan').insert(planRec).select().single();
  if(error){ toast(error.message,'err'); return; }
  const checked = Array.from(document.querySelectorAll('.req-chk:checked'));
  if(checked.length){
    const recs = checked.map(cb=>{
      const id = cb.dataset.itemId;

/* ---------- ปฏิทิน — ทีมไหนลงงานที่ไหนในแต่ละวัน แบบปฏิทินเดือนจริง (ต่างจากหน้า "วางแผน" เดิมที่เป็นแผนราย
   เดือน/ปีระดับ MS-Project สำหรับวางกำลังคน/โครงการ — อันนี้คือตารางปฏิบัติงานจริงรายวัน) กดวันว่างเพื่อตั้งงานใหม่ได้เลย ---------- */
function calShiftMonth(n){ state.cache.calMonthOffset=(state.cache.calMonthOffset||0)+n; renderOpsCalendar(divCfg(state.ws)); }
function calJumpToday(){ state.cache.calMonthOffset=0; renderOpsCalendar(divCfg(state.ws)); }
function calMonthWindow(){
  const now = new Date(); const offset = state.cache.calMonthOffset||0;
  const monthStart = new Date(now.getFullYear(), now.getMonth()+offset, 1);
  const monthEnd = new Date(now.getFullYear(), now.getMonth()+offset+1, 0);
  const gridStart = addDays(monthStart, -monthStart.getDay());
  const gridEnd = addDays(monthEnd, 6-monthEnd.getDay());
  return { monthStart, monthEnd, gridStart, gridEnd };
}
async function renderOpsCalendar(D){
  const body = document.getElementById('opsBody'); if(!body) return;
  const { monthStart, gridStart, gridEnd } = calMonthWindow();
  const { data: rows } = await sb.from('daily_plan').select('*').eq('division_id',state.ws).in('status',['อนุมัติ','รออนุมัติ'])
    .gte('start_date', ymd(addDays(gridStart,-60))).lte('start_date', ymd(gridEnd)).order('created_at');
  state.cache.calRows = rows||[];
  const teamOpts = '<option value="">ทุกทีม</option>'+(state.cache.teams||[]).map(t=>'<option value="'+t.id+'">'+esc(t.name)+'</option>').join('');
  const nav = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">'+
    '<button class="btn btn-ghost btn-sm" onclick="calShiftMonth(-1)">‹ เดือนก่อน</button>'+
    '<button class="btn btn-ghost btn-sm" onclick="calJumpToday()">เดือนนี้</button>'+
    '<button class="btn btn-ghost btn-sm" onclick="calShiftMonth(1)">เดือนถัดไป ›</button>'+
    '<span style="font-size:13px;font-weight:700;color:var(--ink);margin-left:6px">'+MONTH_T[monthStart.getMonth()]+' '+(monthStart.getFullYear()+543)+'</span>'+
    '<div style="flex:1"></div>'+
    '<select id="cal_teamf" onchange="renderCalGrid()" style="border:1px solid var(--line2);background:#fff;border-radius:12px;padding:7px 10px;font-size:12px">'+teamOpts+'</select>'+
    '</div>';
  body.innerHTML = nav+'<div id="calGrid"></div>';
  renderCalGrid();
}
function renderCalGrid(){
  const grid = document.getElementById('calGrid'); if(!grid) return;
  const teamF = (document.getElementById('cal_teamf')||{}).value||'';
  const today = new Date(); today.setHours(0,0,0,0);
  const { monthStart, gridStart, gridEnd } = calMonthWindow();
  const numDays = Math.round((gridEnd-gridStart)/86400000)+1;
  const canAdd = canWrite(state.ws);
  const rows = (state.cache.calRows||[]).filter(r=>!teamF || r.team_id===teamF);
  const byDate = {};
  rows.forEach(r=>{
    const s = new Date(r.start_date+'T00:00:00'); const dur = Math.max(1,+r.duration||1);
    for(let i=0;i<dur;i++){ const d=addDays(s,i); if(d<gridStart||d>gridEnd) continue; (byDate[ymd(d)]=byDate[ymd(d)]||[]).push(r); }
  });
  const teamColor = tid => { const idx=(state.cache.teams||[]).findIndex(t=>t.id===tid); return TEAM_TAG_COLORS[(idx<0?0:idx)%TEAM_TAG_COLORS.length]; };
  let cells='';
  for(let i=0;i<numDays;i++){
    const d = addDays(gridStart,i); const key = ymd(d);
    const inMonth = d.getMonth()===monthStart.getMonth(); const isToday = key===ymd(today);
    const items = byDate[key]||[];
    const chips = items.slice(0,3).map(r=>{
      const team=(state.cache.teams||[]).find(t=>t.id===r.team_id); const tc = teamColor(r.team_id); const pending = r.status==='รออนุมัติ';
      return '<div onclick="event.stopPropagation();openCalTaskDetail(\''+r.id+'\')" style="font-size:10px;padding:2px 5px;border-radius:6px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;'+
        (pending?'border:1px dashed '+tc+';color:'+tc:'background:'+tc+';color:#fff')+'">'+esc(team?team.name.replace(/^ทีม\s*/,''):'-')+' · '+esc(r.task)+'</div>';
    }).join('');
    const more = items.length>3 ? '<div style="font-size:9.5px;color:var(--muted2)">+'+(items.length-3)+' อื่นๆ</div>' : '';
    cells += '<div'+(canAdd?' onclick="calQuickAdd(\''+key+'\')"':'')+' style="min-height:88px;border:1px solid #EEF1F8;padding:5px;'+(inMonth?'background:#fff':'background:#FAFBFD')+(canAdd?';cursor:pointer':'')+'">'+
      '<div style="display:flex;justify-content:flex-end"><span style="font-size:11px;font-weight:'+(isToday?'700':'500')+';color:'+(isToday?'#fff':(inMonth?'var(--ink)':'var(--muted2)'))+';background:'+(isToday?'var(--red)':'transparent')+';width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+d.getDate()+'</span></div>'+
      chips+more+'</div>';
  }
  const wd = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
  grid.innerHTML = '<div class="card" style="padding:0;overflow:hidden">'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);background:#F3F6FC;border-bottom:1px solid var(--line2)">'+wd.map(w=>'<div style="padding:8px;text-align:center;font-size:11px;font-weight:700;color:#5B6B84">'+w+'</div>').join('')+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr)">'+cells+'</div></div>'+
    '<div style="margin-top:10px;font-size:11px;color:var(--muted)">'+(canAdd?'คลิกวันที่ว่างเพื่อตั้งงานใหม่ในวันนั้น · ':'')+'เส้นประ = รอ PM อนุมัติ, พื้นทึบสี = อนุมัติแล้ว</div>';
}

async function openApplyProgress(reportId, projectId){
  const { data: tasks } = await sb.from('project_tasks').select('*').eq('project_id', projectId).order('sort_order');
  // เฉพาะงานย่อย (leaf) เท่านั้น — summary task คำนวณ % จากลูกอัตโนมัติ ตั้งเองไปก็ถูกทับ
  const parentIds = new Set((tasks||[]).map(t=>t.parent_id).filter(Boolean));
  const leaves = (tasks||[]).filter(t=>!parentIds.has(t.id));
  const opts = leaves.map(t=>'<option value="'+t.id+'">'+esc(t.name)+' (ปัจจุบัน '+Math.round(t.pct||0)+'%)</option>').join('');
  document.getElementById('modalHost').innerHTML =
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:420px">'+
    '<div class="modal-head"><span class="t">📊 อัปเดต % ความคืบหน้างาน</span><button class="modal-x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body">'+
      (opts ? '<div class="field"><label>เลือกงานใน WBS</label><select id="ap_task">'+opts+'</select></div>'+
        '<div class="field"><label>% ความคืบหน้าใหม่</label><input id="ap_pct" type="number" value="0"></div>'
        : '<div class="empty">โครงการนี้ยังไม่มีแผนโครงการ (WBS) ให้เลือก</div>')+
    '</div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      (opts?'<button class="btn btn-primary" style="--acc:var(--teal);--acc2:#14b8a6" onclick="saveApplyProgress()">บันทึก</button>':'')+'</div></div></div>';
}
async function saveApplyProgress(){
  const taskId = (document.getElementById('ap_task')||{}).value;
  const pct = +(document.getElementById('ap_pct')||{}).value||0;
  if(!taskId){ toast('เลือกงาน','err'); return; }
  const { error } = await sb.from('project_tasks').update({pct}).eq('id',taskId);
  if(error){ toast(error.message,'err'); return; }
  closeModal(); toast('อัปเดตความคืบหน้าเรียบร้อย','ok');
}

// สร้างรหัสใบสั่งงานสั้นๆ อ่านง่าย (ไม่ชนกันในทางปฏิบัติ ไม่ต้อง query นับลำดับ)
function genWoCode(){ return 'WO-'+Math.random().toString(36).slice(2,7).toUpperCase(); }
async function setPlanApproval(id, status){
  const rec = { status };
  const { data:{ user } } = await sb.auth.getUser();
  if(status==='อนุมัติ'){
    rec.approved_by = user.id; rec.approved_at = new Date().toISOString();
    rec.wo_code = genWoCode(); rec.wo_status = 'รอเริ่ม'; // อนุมัติแผน = สร้างใบสั่งงานอัตโนมัติ (ตามสเปค FieldSync)
  }
  const { error } = await sb.from('daily_plan').update(rec).eq('id', id);
  if(error){ toast(error.message,'err'); return; }
  // ของ/รถที่แนบมากับงานนี้ (daily_plan_id ตรงกัน) อนุมัติ/ปฏิเสธไปพร้อมกันเป็นชุดเดียว — ไม่ต้องกดซ้ำทีละรายการ
  const reqRec = { status };
  if(status==='อนุมัติ'){ reqRec.approved_by = user.id; reqRec.approved_at = new Date().toISOString(); }
  await sb.from('requisitions').update(reqRec).eq('daily_plan_id', id).eq('status','รออนุมัติ');
  toast(status+'เรียบร้อย'+(rec.wo_code?' — สร้างใบสั่งงาน '+rec.wo_code:''),'ok'); renderOpsApprovals(divCfg(state.ws));
}

function addPhotoFiles(fileList){ _photoFiles.push(...Array.from(fileList)); renderPhotoPreview(); }
function removePhotoFile(i){ _photoFiles.splice(i,1); renderPhotoPreview(); }
function renderPhotoPreview(){
  const el = document.getElementById('photoPreview'); if(!el) return;
  el.innerHTML = _photoFiles.map((f,i)=>
    '<div style="position:relative;width:68px;height:68px;flex-shrink:0">'+

  ).join('') || '<div style="font-size:11.5px;color:var(--muted2)">ยังไม่มีรูปแนบ</div>';

// ลดขนาดรูปเหลือด้านยาวสุด maxDim px ก่อนอัปโหลด — ลดขนาดไฟล์ได้ 5-10 เท่าโดยแทบไม่เห็นความต่างของคุณภาพ
function resizeImage(file, maxDim){
  return new Promise(resolve=>{
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=>{
      let { width, height } = img;
      if(width>maxDim || height>maxDim){ const s=maxDim/Math.max(width,height); width=Math.round(width*s); height=Math.round(height*s); }
      const canvas = document.createElement('canvas'); canvas.width=width; canvas.height=height;
      canvas.getContext('2d').drawImage(img,0,0,width,height);
      canvas.toBlob(blob=>{ URL.revokeObjectURL(url); resolve(blob||file); }, 'image/jpeg', .82);
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); resolve(file); };
    img.src = url;
  });
}
async function uploadPhotos(pathPrefix, onProgress){
  let done = 0;
  const urls = await Promise.all(_photoFiles.map(async file=>{
    const blob = await resizeImage(file, 1600);
    const path = pathPrefix+'/'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.jpg';
    const { error } = await sb.storage.from('field-photos').upload(path, blob);
    done++; if(onProgress) onProgress(done, _photoFiles.length);
    if(error){ toast('อัปโหลดรูปไม่สำเร็จ: '+error.message,'err'); return null; }
    const { data: pub } = sb.storage.from('field-photos').getPublicUrl(path);
    return pub.publicUrl;
  }));
  return urls.filter(Boolean);
}

async function saveFieldReport(dailyPlanId, projectId, teamId){
  const g=k=>(document.getElementById(k)||{}).value;
  if(!dailyPlanId){ // opened without a specific Gantt task — read project/team from the pickers shown in the form
    const pel=document.getElementById('fr_proj'); if(pel) projectId = pel.value;
    const tel=document.getElementById('fr_team'); if(tel) teamId = tel.value;
  }
  const btn = document.getElementById('fr_save'); btn.disabled=true; btn.textContent='กำลังบันทึก...';
  try{
    const { data:{ user } } = await sb.auth.getUser();
    const photoUrls = await uploadPhotos(projectId||'misc', (done,total)=>{ if(total) btn.textContent='กำลังอัปโหลดรูป '+done+'/'+total+'...'; });
    const rec = { daily_plan_id: dailyPlanId||null, project_id: projectId||null, team_id: teamId||null, division_id: state.ws,
      report_date: new Date().toISOString().slice(0,10),
      time_start:g('fr_start'), time_end:g('fr_end'), labor_count:+g('fr_labor')||0, supervise_count:+g('fr_supervise')||0,
      total_people:+g('fr_total')||0, weather:g('fr_weather'), qty_done:+g('fr_qty')||0, unit:g('fr_unit'),
      detail:g('fr_detail'), problem:g('fr_problem'), severity:g('fr_severity')||null, help_needed:g('fr_help'),
      photos: photoUrls, submitted_by: user.id, submitted_at: new Date().toISOString() };
    const { error } = await sb.from('field_reports').insert(rec);
    if(error){ toast(error.message,'err'); return; }
    // รายงานผลผูกกับใบสั่งงาน (WO) → สะสมค่างาน + อัปเดต % อัตโนมัติ (ตามสเปค FieldSync: "ระบบอัปเดต % WO อัตโนมัติ")
    if(dailyPlanId){
      const { data: plan } = await sb.from('daily_plan').select('qty_planned,qty_done_total').eq('id',dailyPlanId).single();
      if(plan){
        const newTotal = (+plan.qty_done_total||0) + (+g('fr_qty')||0);
        const upd = { qty_done_total: newTotal };
        if(plan.qty_planned>0){
          const newPct = Math.min(100, Math.round(newTotal/plan.qty_planned*100));
          upd.pct = newPct; upd.wo_status = newPct>=100?'เสร็จแล้ว':(newPct>0?'กำลังทำ':'รอเริ่ม');

    _photoFiles = [];
    if(isMobileMode()){ renderOpsPage(); renderMobileNav(); }
    else { closeModal(); if(state.sub==='ops' && state.opsTab==='reports') renderOpsReports(divCfg(state.ws)); }
  } finally { const b=document.getElementById('fr_save'); if(b){ b.disabled=false; b.textContent='บันทึกรายงาน'; } }
}

async function importMangoSelected(){

  if(!picked.length){ toast('เลือกอย่างน้อย 1 โครงการ','err'); return; }
  const seen = new Set();
  const deduped = picked.filter(p => seen.has(p.code) ? false : (seen.add(p.code), true));
  const { error } = await sb.from('projects').insert(deduped);
  if(error){ toast(error.message,'err'); return; }

}

function projMonthlyGridHtml(months, editable){
  if(!months.length) return '<div class="card"><div class="empty">ยังไม่มีการรายงานความคืบหน้า'+(editable?' — กด "+ เพิ่มเดือน" เพื่อเริ่มต้น':'')+'</div></div>';
  const cell = (id,field,val,ph) => editable
    ? '<input type="number" class="wbs-in tnum" data-id="'+id+'" data-f="'+field+'" value="'+(val||0)+'" step="0.01" onkeydown="pmCellKey(event,this)" onblur="pmCellSave(this)">'
    : '<span class="tnum">'+fmt(val)+'</span>';
  const rows = months.map(r=>{
    const diffPlan = (+r.con_plan||0) - (+r.con_actual||0);
    const diffPlanPct = r.con_plan>0 ? (diffPlan/r.con_plan*100) : 0;
    const diffShould = (+r.con_should||0) - (+r.con_actual||0);
    const diffShouldPct = r.con_should>0 ? (diffShould/r.con_should*100) : 0;
    return '<tr>'+
      '<td style="white-space:nowrap;font-weight:600;padding:8px 10px">'+thMonth(r.month)+
        (editable?' <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:10px" onclick="openMonthlyExtra(\''+r.id+'\')" title="รายละเอียดเพิ่มเติม (วันส่งงาน/วางบิล/หมายเหตุ)">⋯</button>':'')+'</td>'+
      '<td class="num">'+cell(r.id,'con_plan',r.con_plan)+'</td>'+
      '<td class="num">'+cell(r.id,'con_should',r.con_should)+'</td>'+
      '<td class="num">'+cell(r.id,'con_actual',r.con_actual)+'</td>'+
      '<td class="num tnum" style="color:var(--muted)">'+fmt(diffPlan)+'</td>'+
      '<td class="num tnum" style="color:var(--muted)">'+diffPlanPct.toFixed(0)+'%</td>'+
      '<td class="num tnum" style="color:var(--muted)">'+fmt(diffShould)+'</td>'+
      '<td class="num tnum" style="color:var(--muted)">'+diffShouldPct.toFixed(0)+'%</td>'+
      '<td class="num">'+cell(r.id,'cost_material_plan',r.cost_material_plan)+'</td>'+
      '<td class="num">'+cell(r.id,'cost_material_should',r.cost_material_should)+'</td>'+
      '<td class="num">'+cell(r.id,'cost_material_actual',r.cost_material_actual)+'</td>'+
      '<td class="num">'+cell(r.id,'cost_labor_plan',r.cost_labor_plan)+'</td>'+
      '<td class="num">'+cell(r.id,'cost_labor_should',r.cost_labor_should)+'</td>'+
      '<td class="num">'+cell(r.id,'cost_labor_actual',r.cost_labor_actual)+'</td>'+
      '<td class="num">'+cell(r.id,'bill_plan',r.bill_plan)+'</td>'+
      '<td class="num">'+cell(r.id,'bill_actual',r.bill_actual)+'</td>'+
      (editable?'<td class="num"><button class="btn btn-ghost btn-sm" onclick="deleteMonthlyRow(\''+r.id+'\')">🗑</button></td>':'')+
    '</tr>';
  }).join('');
  return '<div class="table-wrap wbs-table" style="overflow-x:auto"><table><thead>'+
    '<tr><th rowspan="2">เดือน</th><th colspan="3">มูลค่างานก่อสร้าง</th><th colspan="2">ส่วนต่างจากแผนงาน</th><th colspan="2">ส่วนต่างจากควรก่อสร้างได้</th>'+
    '<th colspan="3">ค่าวัสดุ</th><th colspan="3">ค่าแรง (WRC)</th><th colspan="2">วางบิล</th>'+(editable?'<th rowspan="2"></th>':'')+'</tr>'+
    '<tr><th>แผนงาน</th><th>ควรได้</th><th>จริง</th><th>บาท</th><th>%</th><th>บาท</th><th>%</th>'+
    '<th>Plan</th><th>ควรใช้</th><th>ใช้จริง</th><th>Plan</th><th>ควรใช้</th><th>ใช้จริง</th><th>แผน</th><th>จริง</th></tr>'+
    '</thead><tbody id="pmGridBody">'+rows+'</tbody></table></div>';

const COST_CAT_LABEL = {labor:'ค่าแรง', subcon:'ค่าจ้างเหมา', material:'ค่าวัสดุ', machine:'เครื่องจักร', equip:'อุปกรณ์'};
const COST_STATUS_LABEL = {draft:'ร่าง', pending:'รออนุมัติ', approved:'อนุมัติแล้ว', paid:'พร้อมเบิกจ่าย'};
function costStatusPill(s){
  const map={draft:{c:'var(--muted)',bg:'var(--soft)'},pending:{c:'#D97706',bg:'var(--amber-soft)'},approved:{c:'#0D9488',bg:'var(--teal-soft)'},paid:{c:'#2F6FED',bg:'var(--blue-soft)'}};
  const m = map[s]||map.draft;
  return '<span class="pill" style="color:'+m.c+';background:'+m.bg+'">'+(COST_STATUS_LABEL[s]||s)+'</span>';

function costActionButtons(r, canApprove){
  if(r.status==='draft') return canApprove||state.profile.id===r.created_by ? '<button class="btn btn-ghost btn-sm" onclick="setCostStatus(\''+r.id+'\',\'pending\')">ส่งอนุมัติ</button>' : '';
  if(r.status==='pending' && canApprove) return '<button class="btn btn-primary btn-sm" style="--acc:var(--teal);--acc2:#14b8a6" onclick="setCostStatus(\''+r.id+'\',\'approved\')">อนุมัติ</button>';
  if(r.status==='approved' && canApprove) return '<button class="btn btn-primary btn-sm" style="--acc:var(--teal);--acc2:#14b8a6" onclick="setCostStatus(\''+r.id+'\',\'paid\')">เบิกจ่ายแล้ว</button>';
  return '';
}
async function setCostStatus(id, status){
  const rec = { status };

async function uploadAttachment(projId){
  const inp = document.getElementById('att_file');
  const file = inp && inp.files[0];
  if(!file){ toast('เลือกไฟล์ก่อน','err'); return; }
  const path = projId+'/'+Date.now()+'_'+file.name;
  const { error: upErr } = await sb.storage.from('attachments').upload(path, file);
  if(upErr){ toast(upErr.message,'err'); return; }
  const { data: pub } = sb.storage.from('attachments').getPublicUrl(path);
  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from('attachments').insert({ project_id:projId, file_url:pub.publicUrl, name:file.name, uploaded_by:user.id });
  if(error){ toast(error.message,'err'); return; }
  toast('อัปโหลดเรียบร้อย','ok'); renderProjectDetail(projId);
}
async function delAttachment(id, projId){
  if(!confirm('ลบไฟล์นี้?')) return;
  const { error } = await sb.from('attachments').delete().eq('id', id);
  if(error){ toast(error.message,'err'); return; }
  toast('ลบแล้ว','ok'); renderProjectDetail(projId);
}

async function saveUserCreate(){
  const g=k=>(document.getElementById(k)||{}).value;
  const username = g('nu_username').trim();
  const password = g('nu_password');
  const err = document.getElementById('nu_err');
  err.classList.add('hidden');
  if(!username){ err.textContent='กรอกชื่อผู้ใช้'; err.classList.remove('hidden'); return; }
  if(password.length<6){ err.textContent='รหัสผ่านต้องยาวอย่างน้อย 6 ตัว'; err.classList.remove('hidden'); return; }
  const btn = document.getElementById('nu_save'); btn.disabled=true; btn.textContent='กำลังสร้าง...';
  try{
    const { data, error } = await sb.functions.invoke('create-user', { body: {
      username, password, full_name: g('nu_fullName')||username, role: g('nu_role'), division_id: g('nu_dept')||null
    }});
    if(error || (data && data.error)){ err.textContent = (data&&data.error) || error.message; err.classList.remove('hidden'); return; }
    closeModal(); toast('สร้างผู้ใช้ '+username+' เรียบร้อย','ok'); renderUsers();
  }catch(ex){ err.textContent = 'เชื่อมต่อไม่ได้: '+ex.message; err.classList.remove('hidden'); }
  finally{ btn.disabled=false; btn.textContent='สร้างผู้ใช้'; }
}

/* ---------- boot: restore session (or skip straight in for DEMO_MODE) ---------- */
(async function boot(){
  if(DEMO_MODE){
    state.session = { access_token:'demo' };
    state.profile = MOCK_DB.profiles[0];
    state.divisions = MOCK_DB.divisions;
    // helper ทดสอบ: ?as=field|eng|pm|manager สลับ role/ฝ่ายเพื่อทดสอบ mobile mode/สิทธิ์ต่างๆ โดยไม่ต้องแก้ MOCK_DB
    const as = new URLSearchParams(location.search).get('as');
    if(as){
      const map = { field:{role:'field',div:'pjcm',name:'ทีมหน้างาน (ทดสอบ)'}, eng:{role:'eng',div:'en',name:'วิศวกรหน้างาน (ทดสอบ)'},
        pm:{role:'pm',div:'pjcm',name:'PM ทดสอบ'}, manager:{role:'manager',div:'pc',name:'ผู้จัดการหล่อบ่อ (ทดสอบ)'} };
      const m = map[as];
      if(m) state.profile = { ...state.profile, id:'demo-'+as, username:'demo-'+as, full_name:m.name, role:m.role, division_id:m.div };
    }
    enterApp();
    return;
  }
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ state.session = session; await loadProfileAndEnter(); }
})();
