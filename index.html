<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8"/>
    <link rel="icon" type="image/png" href="/mango-dashboard/wrc-logo-icon.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

    <!-- ฟอนต์: IBM Plex Sans Thai (body ไทย) + Space Grotesk (ตัวเลข) + IBM Plex Mono (code) + DM Sans/Poppins (เดิม Horizon) -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>WRC ERP</title>
    <!-- คู่กับ public/404.html — ถอดรหัส ?__redirect= กลับเป็น path จริงก่อน React Router mount -->
    <script>
      (function (l) {
        var params = new URLSearchParams(l.search);
        var redirect = params.get('__redirect');
        if (redirect) {
          window.history.replaceState(null, null, '/mango-dashboard/' + redirect);
        }
      })(window.location);
    </script>
    <script type="module" crossorigin src="/mango-dashboard/assets/index-B1MK5aVT.js"></script>
