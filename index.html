<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8"/>
    <link rel="icon" href="/mango-dashboard/favicon.ico"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta name="theme-color" content="#4338CA"/>
    <link rel="manifest" href="/mango-dashboard/manifest.json"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- ฟอนต์: IBM Plex Sans Thai (body ไทย) + Space Grotesk (ตัวเลข) + IBM Plex Mono (code) + DM Sans/Poppins (เดิม Horizon) -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>WRC ERP</title>
    <!-- คู่กับ public/404.html — แปลง query string (?p=...) กลับเป็น path จริงก่อน React Router mount -->
    <script>
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(3).split('&').map(function(s) { return s.replace(/~and~/g, '&'); });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] + (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      })(window.location);
    </script>
    <script type="module" crossorigin src="/mango-dashboard/assets/index-C8ZgB1bE.js"></script>
    <link rel="stylesheet" crossorigin href="/mango-dashboard/assets/index-Bx-qHKOg.css">
  </head>
  <body class="font-dm bg-lightPrimary">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
