<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WRC System</title>
<link rel="icon" href="assets/wrc-logo.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f1f5f9; --panel:#ffffff; --border:#e2e8f0; --soft:#f8fafc;
  --ink:#0f172a; --muted:#64748b; --muted2:#94a3b8;
  --accent:#0891b2; --accent2:#06b6d4; --accent-soft:#ecfeff;
  --green:#16a34a; --green-soft:#f0fdf4; --amber:#f59e0b; --amber-soft:#fffbeb;
  --red:#dc2626; --red-soft:#fef2f2;
  --shadow:0 12px 40px rgba(15,23,42,.10); --shadow-sm:0 1px 3px rgba(15,23,42,.06);
  --sidebar:248px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Noto Sans Thai",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
.hidden{display:none!important}

/* ---------- Login ---------- */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(1200px 500px at 50% -10%, #e0f2fe, var(--bg))}
.login-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:38px 40px;width:100%;max-width:380px;box-shadow:var(--shadow)}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:26px}
.login-logo img{width:72px;height:72px;object-fit:contain}
.login-logo .t{font-size:22px;font-weight:800;letter-spacing:-.02em}
.login-logo .s{font-size:12px;color:var(--muted)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--soft);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:#fff}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:14px;transition:transform .08s,box-shadow .15s,background .15s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(8,145,178,.3)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(8,145,178,.42)}
.btn-block{width:100%}
.btn-ghost{background:var(--soft);color:var(--ink);border:1px solid var(--border)}
.btn-ghost:hover{background:#fff;border-color:var(--muted2)}
.btn-danger{background:var(--red-soft);color:var(--red);border:1px solid #fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:8px}
.login-err{background:var(--red-soft);color:var(--red);border:1px solid #fecaca;border-radius:9px;padding:10px 12px;font-size:12.5px;margin-bottom:14px}

/* ---------- App shell ---------- */
#appView{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--panel);border-right:1px solid var(--border);position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:20}
.sb-brand{display:flex;align-items:center;gap:11px;padding:18px 20px;border-bottom:1px solid var(--border)}
.sb-brand img{width:38px;height:38px;object-fit:contain}
.sb-brand .t{font-size:16px;font-weight:800;letter-spacing:-.01em;line-height:1.1}
.sb-brand .s{font-size:10.5px;color:var(--muted)}
.sb-nav{flex:1;overflow-y:auto;padding:14px 12px}
.sb-group{margin-bottom:18px}
.sb-group-t{font-size:10.5px;font-weight:800;letter-spacing:.06em;color:var(--muted2);text-transform:uppercase;padding:0 10px 8px}
.sb-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--muted);font-weight:600;font-size:13.5px;cursor:pointer;transition:background .12s,color .12s;margin-bottom:2px}
.sb-item .ico{font-size:16px;width:20px;text-align:center}
.sb-item:hover{background:var(--soft);color:var(--ink)}
.sb-item.active{background:var(--accent-soft);color:var(--accent);font-weight:700}
.sb-user{border-top:1px solid var(--border);padding:12px}
.sb-user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
.sb-user-info{flex:1;min-width:0}
.sb-user-info .n{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-info .r{font-size:11px;color:var(--muted)}
.sb-user-menu{display:flex;gap:6px;margin-top:8px}
.sb-user-menu .btn{flex:1}

.main{flex:1;margin-left:var(--sidebar);min-width:0}
.topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.topbar .page-title{font-size:19px;font-weight:800;letter-spacing:-.01em}
.topbar .page-sub{font-size:12.5px;color:var(--muted)}
.topbar .spacer{flex:1}
.content{padding:26px 28px 60px}
.mobile-toggle{display:none;background:var(--soft);border:1px solid var(--border);border-radius:9px;width:38px;height:38px;font-size:18px}

/* ---------- Cards / layout ---------- */
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow-sm)}
.card+.card{margin-top:16px}
.card-title{font-size:15px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* KPI / dept cards */
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow-sm)}
.kpi .lb{font-size:12px;color:var(--muted);font-weight:700}
.kpi .vl{font-size:26px;font-weight:900;letter-spacing:-.02em;margin-top:6px;font-variant-numeric:tabular-nums}
.kpi .sub{font-size:11.5px;color:var(--muted2);margin-top:3px}
.dept-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-sm)}
.dept-head{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.dept-head .n{font-weight:800;font-size:15px}
.pill{font-size:11px;font-weight:800;padding:4px 11px;border-radius:999px}
.pill.ok{background:var(--green-soft);color:var(--green)}
.pill.bad{background:var(--red-soft);color:var(--red)}
.dept-body{padding:16px 20px}
.dept-hero{text-align:center;margin-bottom:14px}
.dept-hero .l{font-size:11.5px;color:var(--muted);font-weight:700}
.dept-hero .v{font-size:30px;font-weight:900;letter-spacing:-.02em;margin-top:2px;font-variant-numeric:tabular-nums}
.dept-mini{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dept-mini .m{background:var(--soft);border-radius:9px;padding:8px 11px}
.dept-mini .m .ml{font-size:10.5px;color:var(--muted);font-weight:700}
.dept-mini .m .mv{font-size:14px;font-weight:800;margin-top:1px;font-variant-numeric:tabular-nums}

/* ---------- Tables ---------- */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--soft);text-align:left;padding:11px 14px;font-weight:700;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--border)}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--soft)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--accent-soft);color:var(--accent)}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px}
.tag.admin{background:#fef3c7;color:#b45309}.tag.pm{background:#dbeafe;color:#1d4ed8}.tag.viewer{background:#e2e8f0;color:#475569}
.empty{text-align:center;color:var(--muted);padding:38px 20px;font-size:13px}

/* ---------- Forms ---------- */
.form-section{border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.form-section-t{font-size:12.5px;font-weight:800;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.row{display:grid;gap:14px}
.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}.r4{grid-template-columns:repeat(4,1fr)}
@media(max-width:720px){.r2,.r3,.r4{grid-template-columns:1fr}}
.inline-warn{font-size:11.5px;color:var(--red);margin-top:5px;font-weight:600;display:none}
.field input.warn{border-color:var(--red);background:var(--red-soft)}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--panel);border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.3);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head .t{font-size:16px;font-weight:800}
.modal-x{background:var(--soft);border:none;border-radius:8px;width:32px;height:32px;font-size:17px;color:var(--muted)}
.modal-body{padding:22px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.warn-list{list-style:none}
.warn-list li{padding:11px 14px;border-radius:10px;margin-bottom:8px;font-size:13px;font-weight:600;display:flex;gap:9px;align-items:flex-start}
.warn-list li.block{background:var(--red-soft);color:#991b1b;border:1px solid #fecaca}
.warn-list li.warn{background:var(--amber-soft);color:#92400e;border:1px solid #fde68a}

/* ---------- Toast ---------- */
#toast{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.3);display:flex;align-items:center;gap:9px;animation:slidein .25s}
.toast.ok{background:#065f46}.toast.err{background:#991b1b}
@keyframes slidein{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

@media(max-width:820px){
  .sidebar{transform:translateX(-100%);transition:transform .2s;box-shadow:var(--shadow)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .mobile-toggle{display:block}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginView">
  <form class="login-card" id="loginForm" onsubmit="doLogin(event)">
    <div class="login-logo">
      <img src="assets/wrc-logo.png" alt="WRC">
      <div class="t">WRC System</div>
      <div class="s">ระบบบริหารโครงการ · เข้าสู่ระบบ</div>
    </div>
    <div class="login-err hidden" id="loginErr"></div>
    <div class="field"><label>ชื่อผู้ใช้</label><input id="loginUser" autocomplete="username" required></div>
    <div class="field"><label>รหัสผ่าน</label><input id="loginPw" type="password" autocomplete="current-password" required></div>
    <button class="btn btn-primary btn-block" id="loginBtn" type="submit">เข้าสู่ระบบ →</button>
  </form>
</div>

<!-- ============ APP ============ -->
<div id="appView" class="hidden">
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <img src="assets/wrc-logo.png" alt="WRC">
      <div><div class="t">WRC System</div><div class="s">บริหารโครงการ</div></div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-user">
      <div class="sb-user-row">
        <div class="sb-avatar" id="sbAvatar">?</div>
        <div class="sb-user-info"><div class="n" id="sbName">-</div><div class="r" id="sbRole">-</div></div>
      </div>
      <div class="sb-user-menu">
        <button class="btn btn-ghost btn-sm" onclick="openChangePw()">🔑 รหัสผ่าน</button>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">ออกจากระบบ</button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <div><div class="page-title" id="pageTitle">Dashboard</div><div class="page-sub" id="pageSub"></div></div>
      <div class="spacer"></div>
      <div id="topActions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="modalHost"></div>
<div id="toast"></div>

<script>
/* ============================================================
 * WRC System — frontend (static, GitHub Pages)
 * คุยกับ backend (Apps Script) ผ่าน fetch POST (text/plain กัน CORS preflight)
 * ============================================================ */
const API = 'https://script.google.com/macros/s/AKfycbw44Q4muLrZ-QYff8_Q_cABcOuehhJWkTfrSWwgt-4hNkZQ9B7jeQO9EfFfWwggQ_JJ/exec';
const DEPTS = ['บริหารโครงการ','หล่อบ่อ','พลังงาน'];
const ROLE_LABEL = {admin:'ผู้ดูแลระบบ', pm:'ผู้กรอกข้อมูล', viewer:'ผู้ดูรายงาน'};

const state = {
  token: localStorage.getItem('wrc_token') || '',
  user: JSON.parse(localStorage.getItem('wrc_user') || 'null'),
  page: 'dashboard',
  cache: {}
};

/* ---------- API helper ----------
 * ใช้ GET + payload JSON ใน query param — เสถียรกว่า POST เมื่อ fetch ข้ามโดเมนไป Apps Script
 * (POST เจอ 302 redirect แล้ว browser บางทีได้ HTML กลับมา = JSON.parse พัง) */
async function api(action, payload){
  const body = Object.assign({token: state.token}, payload || {});
  const url = API + '?action=' + encodeURIComponent(action) +
              '&payload=' + encodeURIComponent(JSON.stringify(body)) +
              '&_=' + Date.now();
  const res = await fetch(url, {method:'GET', redirect:'follow'});
  const data = await res.json();
  if(data && data.error === 'เซสชันหมดอายุ กรุณาล็อกอินใหม่'){ forceLogout(); }
  return data;
}

/* ---------- Toast ---------- */
function toast(msg, type){
  const el = document.createElement('div');
  el.className = 'toast ' + (type||'');
  el.innerHTML = (type==='ok'?'✅ ':type==='err'?'⚠️ ':'') + msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3200);
}

/* ---------- Money / util ---------- */
function fmt(n){ n=parseFloat(n); if(!isFinite(n)) n=0; return Math.round(n).toLocaleString('en-US'); }
function fmtM(n){ n=parseFloat(n)||0; return (n/1e6).toFixed(2)+'M'; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function thMonth(ym){ if(!ym) return '-'; const [y,m]=ym.split('-'); const T=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; return (T[+m-1]||'')+' '+(+y+543); }

/* ============================================================
 * AUTH
 * ============================================================ */
async function doLogin(e){
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  err.classList.add('hidden');
  try{
    const res = await api('login', {username: document.getElementById('loginUser').value.trim(), password: document.getElementById('loginPw').value});
    if(!res.ok){ err.textContent = res.error || 'เข้าสู่ระบบไม่สำเร็จ'; err.classList.remove('hidden'); return; }
    state.token = res.token; state.user = res.user;
    localStorage.setItem('wrc_token', res.token);
    localStorage.setItem('wrc_user', JSON.stringify(res.user));
    enterApp();
  }catch(ex){ err.textContent = 'เชื่อมต่อไม่ได้: '+ex.message; err.classList.remove('hidden'); }
  finally{ btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ →'; }
}
function doLogout(){ if(confirm('ออกจากระบบ?')){ api('logout',{}); forceLogout(); } }
function forceLogout(){
  state.token=''; state.user=null;
  localStorage.removeItem('wrc_token'); localStorage.removeItem('wrc_user');
  document.getElementById('appView').classList.add('hidden');
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('loginPw').value='';
}

/* ============================================================
 * NAV / ROUTER
 * ============================================================ */
const NAV = [
  {group:'รายงาน', items:[
    {id:'dashboard', ico:'📊', label:'Dashboard', roles:['admin','pm','viewer']}
  ]},
  {group:'กรอกข้อมูล', items:[
    {id:'entry',    ico:'📝', label:'กรอกความคืบหน้ารายเดือน', roles:['admin','pm']},
    {id:'projects', ico:'📁', label:'ทะเบียนโครงการ', roles:['admin','pm']}
  ]},
  {group:'ผู้ดูแลระบบ', items:[
    {id:'users',   ico:'👥', label:'ผู้ใช้งาน', roles:['admin']},
    {id:'targets', ico:'🎯', label:'เป้าหมายบริษัท', roles:['admin']},
    {id:'audit',   ico:'🗒️', label:'ประวัติการใช้งาน', roles:['admin']}
  ]}
];
const PAGE_META = {
  dashboard:{title:'Dashboard', sub:'ภาพรวมผลงาน 3 ฝ่าย'},
  entry:{title:'กรอกความคืบหน้ารายเดือน', sub:'ค่างานก่อสร้าง · วางบิล · ต้นทุน'},
  projects:{title:'ทะเบียนโครงการ', sub:'ข้อมูลหลักของแต่ละโครงการ'},
  users:{title:'ผู้ใช้งาน', sub:'จัดการบัญชีและสิทธิ์การเข้าถึง'},
  targets:{title:'เป้าหมายบริษัท', sub:'เป้ารายเดือน / รายปี'},
  audit:{title:'ประวัติการใช้งาน', sub:'บันทึกว่าใครทำอะไรเมื่อไหร่'}
};

function enterApp(){
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('appView').classList.remove('hidden');
  const u = state.user;
  document.getElementById('sbName').textContent = u.fullName || u.username;
  document.getElementById('sbRole').textContent = ROLE_LABEL[u.role] || u.role;
  document.getElementById('sbAvatar').textContent = (u.fullName||u.username||'?').charAt(0).toUpperCase();
  renderNav();
  go('dashboard');
}
function renderNav(){
  const role = state.user.role;
  const host = document.getElementById('sbNav');
  host.innerHTML = NAV.map(g=>{
    const items = g.items.filter(it=>it.roles.includes(role));
    if(!items.length) return '';
    return '<div class="sb-group"><div class="sb-group-t">'+g.group+'</div>'+
      items.map(it=>'<div class="sb-item" data-page="'+it.id+'" onclick="go(\''+it.id+'\')"><span class="ico">'+it.ico+'</span>'+esc(it.label)+'</div>').join('')+'</div>';
  }).join('');
}
function go(page){
  state.page = page;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active', el.dataset.page===page));
  const meta = PAGE_META[page] || {title:page, sub:''};
  document.getElementById('pageTitle').textContent = meta.title;
  document.getElementById('pageSub').textContent = meta.sub;
  document.getElementById('topActions').innerHTML = '';
  document.getElementById('sidebar').classList.remove('open');
  const fn = {dashboard:renderDashboard, entry:renderEntry, projects:renderProjects, users:renderUsers, targets:renderTargets, audit:renderAudit}[page];
  document.getElementById('content').innerHTML = '<div class="empty">กำลังโหลด…</div>';
  if(fn) fn();
}

/* ============================================================
 * DASHBOARD
 * ============================================================ */
async function renderDashboard(){
  const res = await api('getDashboard', {});
  if(!res.ok){ content('<div class="card"><div class="empty">โหลดข้อมูลไม่ได้: '+esc(res.error)+'</div></div>'); return; }
  const rows = res.deptRows || [];
  const tot = rows.reduce((a,r)=>({rev:a.rev+r.conActual, gp:a.gp+r.gp, bill:a.bill+r.billActual, n:a.n+r.n}),{rev:0,gp:0,bill:0,n:0});
  const hasData = tot.n>0;

  let html = '';
  // KPI row
  html += '<div class="grid g4" style="margin-bottom:18px">'+
    kpi('รายได้ (ก่อสร้างจริง)', fmt(tot.rev), 'บาท · รวมทุกฝ่าย')+
    kpi('กำไรขั้นต้น (GP)', fmt(tot.gp), (tot.rev>0?(tot.gp/tot.rev*100).toFixed(1)+'% margin':'—'))+
    kpi('วางบิลจริง', fmt(tot.bill), 'บาท')+
    kpi('โครงการทั้งหมด', res.projectCount||0, 'โครงการในระบบ')+
  '</div>';

  if(!hasData){
    html += '<div class="card"><div class="empty">ยังไม่มีข้อมูลความคืบหน้า<br><br>'+
      (state.user.role!=='viewer'?'<button class="btn btn-primary" onclick="go(\'entry\')">📝 เริ่มกรอกข้อมูล</button>':'รอผู้กรอกข้อมูลบันทึกก่อน')+'</div></div>';
    content(html); return;
  }

  // dept cards
  html += '<div class="grid g3" style="margin-bottom:18px">'+ rows.map((r,i)=>{
    const ok = r.gp>=0;
    return '<div class="dept-card"><div class="dept-head"><span class="n">'+esc(r.dept)+'</span>'+
      '<span class="pill '+(ok?'ok':'bad')+'">'+(ok?'GP บวก':'GP ติดลบ')+'</span></div>'+
      '<div class="dept-body"><div class="dept-hero"><div class="l">กำไรขั้นต้น (GP)</div>'+
        '<div class="v" style="color:'+(r.gp<0?'var(--red)':'var(--green)')+'">'+fmt(r.gp)+'</div></div>'+
      '<div class="dept-mini">'+
        mini('ก่อสร้างจริง', fmt(r.conActual))+ mini('ต้นทุนจริง', fmt(r.cost))+
        mini('วางบิลจริง', fmt(r.billActual))+ mini('GP%', (r.conActual>0?(r.gp/r.conActual*100).toFixed(1):'0')+'%')+
      '</div></div></div>';
  }).join('') + '</div>';

  // chart
  html += '<div class="card"><div class="card-title">📈 รายได้ vs กำไรขั้นต้น รายฝ่าย</div><div style="height:280px;position:relative"><canvas id="deptChart"></canvas></div></div>';
  content(html);

  const ctx = document.getElementById('deptChart');
  new Chart(ctx, {type:'bar', data:{labels:rows.map(r=>r.dept),
    datasets:[
      {label:'ก่อสร้างจริง', data:rows.map(r=>r.conActual), backgroundColor:'#0891b2', borderRadius:6},
      {label:'กำไรขั้นต้น', data:rows.map(r=>r.gp), backgroundColor:'#16a34a', borderRadius:6}
    ]},
    options:{responsive:true, maintainAspectRatio:false,
      scales:{y:{ticks:{callback:v=>fmtM(v)}}, x:{grid:{display:false}}},
      plugins:{legend:{position:'bottom'}, tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.parsed.y)}}}}});
}
function kpi(lb,vl,sub){ return '<div class="kpi"><div class="lb">'+esc(lb)+'</div><div class="vl">'+vl+'</div><div class="sub">'+esc(sub)+'</div></div>'; }
function mini(lb,vl){ return '<div class="m"><div class="ml">'+esc(lb)+'</div><div class="mv">'+vl+'</div></div>'; }

      '<div class="field"><label>โครงการ</label><select id="enProject" onchange="loadEntry()">'+
        '<option value="">— เลือกโครงการ —</option>'+

function entryField(id,label,type){ type=type||'number';
  return '<div class="field"><label>'+esc(label)+'</label><input id="'+id+'" type="'+type+'" '+(type==='number'?'step="0.01" oninput="liveCheck()"':'')+'><div class="inline-warn" id="'+id+'_w"></div></div>';
}
async function loadEntry(){
  const code = document.getElementById('enProject').value;
  const month = document.getElementById('enMonth').value;
  const host = document.getElementById('entryFormHost');
  if(!code || !month){ host.innerHTML=''; return; }
  const proj = state.cache.projects.find(p=>p.code===code) || {};
  // load existing entry
  const res = await api('listEntries', {code, month});
  const ex = (res.rows||[])[0] || {};
  host.innerHTML =
    '<div class="card"><div class="card-title">กรอกข้อมูล · '+esc(proj.name||code)+' <span class="badge">'+esc(proj.dept||'')+'</span></div>'+
    '<div class="form-section"><div class="form-section-t">① ค่างานก่อสร้าง (เดือนนี้)</div><div class="row r4">'+
      entryField('f_conPlan','แผน (บาท)')+ entryField('f_conShould','ควรได้')+ entryField('f_conActual','ได้จริง')+
      '<div class="field"><label>สถานะ</label><input id="f_conStatus" type="text"></div>'+
    '</div></div>'+
    '<div class="form-section"><div class="form-section-t">② ต้นทุนก่อสร้าง</div><div class="row r4">'+
      entryField('f_budget','Budget')+ entryField('f_costShould','ควรใช้')+ entryField('f_costActual','ใช้จริง')+
      '<div class="field"><label>สถานะต้นทุน</label><input id="f_costStatus" type="text"></div>'+
    '</div></div>'+
    '<div class="form-section"><div class="form-section-t">③ วันที่ส่งงาน</div><div class="row r2">'+
      entryField('f_dueSubmit','กำหนดส่งงาน','date')+ entryField('f_actualSubmit','ส่งงานจริง','date')+
    '</div></div>'+
    '<div class="form-section"><div class="form-section-t">④ แผนวางบิล</div><div class="row r2">'+
      entryField('f_billPlan','แผนวางบิล')+ entryField('f_billActual','วางบิลจริง')+
    '</div></div>'+
    '<div class="form-section"><div class="form-section-t">⑤ วันที่วางบิล</div><div class="row r2">'+
      entryField('f_billDue','กำหนดวางบิล','date')+ entryField('f_billActualDate','วางบิลจริง (วันที่)','date')+
    '</div></div>'+
    '<div class="field"><label>หมายเหตุ</label><textarea id="f_note" rows="2"></textarea></div>'+
    '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:6px">'+
      '<button class="btn btn-primary" onclick="saveEntry()">💾 บันทึกข้อมูล</button>'+
    '</div></div>';
  // prefill
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.value=(v==null?'':v); };
  ['conPlan','conShould','conActual','conStatus','budget','costShould','costActual','costStatus',
   'dueSubmit','actualSubmit','billPlan','billActual','billDue','billActualDate','note'].forEach(k=>set('f_'+k, ex[k]));
  liveCheck();
}
function liveCheck(){
  const g=id=>parseFloat((document.getElementById(id)||{}).value)||0;
  const chk=(id,cond,msg)=>{ const el=document.getElementById(id), w=document.getElementById(id+'_w'); if(!el||!w)return;
    el.classList.toggle('warn',cond); w.style.display=cond?'block':'none'; w.textContent=msg; };
  chk('f_billActual', g('f_billPlan')>0 && g('f_billActual')>g('f_billPlan'), '⚠ วางบิลจริงเกินแผน — ต้องระบุเหตุผลก่อนบันทึก');
  chk('f_costActual', g('f_budget')>0 && g('f_costActual')>g('f_budget'), '⚠ ใช้จริงเกิน Budget');
  chk('f_conActual', g('f_conPlan')>0 && g('f_conActual')>g('f_conPlan'), '⚠ ได้จริงเกินค่างานแผน');
}
function collectEntry(){
  const g=id=>(document.getElementById(id)||{}).value;
  const proj = state.cache.projects.find(p=>p.code===document.getElementById('enProject').value)||{};
  return {code:proj.code, month:document.getElementById('enMonth').value, dept:proj.dept,
    conPlan:g('f_conPlan'), conShould:g('f_conShould'), conActual:g('f_conActual'), conStatus:g('f_conStatus'),
    budget:g('f_budget'), costShould:g('f_costShould'), costActual:g('f_costActual'), costStatus:g('f_costStatus'),
    dueSubmit:g('f_dueSubmit'), actualSubmit:g('f_actualSubmit'),
    billPlan:g('f_billPlan'), billActual:g('f_billActual'), billDue:g('f_billDue'), billActualDate:g('f_billActualDate'),
    note:g('f_note')};
}
async function saveEntry(){
  const entry = collectEntry();
  const res = await api('upsertEntry', {entry});
  if(res.ok){ toast('บันทึกเรียบร้อย', 'ok'); return; }
  if(res.needConfirm){ showConfirm(entry, res.warnings, res.reasonRequired); return; }
  toast(res.error || 'บันทึกไม่สำเร็จ', 'err');
}
function showConfirm(entry, warnings, reasonRequired){
  const host = document.getElementById('modalHost');
  host.innerHTML =
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-head"><span class="t">⚠️ ตรวจพบข้อมูลผิดปกติ</span><button class="modal-x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body"><ul class="warn-list">'+
      warnings.map(w=>'<li class="'+w.level+'"><span>'+(w.level==='block'?'🚫':'⚠️')+'</span><span>'+esc(w.msg)+'</span></li>').join('')+
    '</ul>'+
    (reasonRequired?'<div class="field" style="margin-top:8px"><label>เหตุผล (จำเป็นต้องระบุ เพราะเกินแผน)</label><textarea id="confirmReason" rows="2" placeholder="เช่น ลูกค้าขอเพิ่มงาน / VO..."></textarea></div>':'')+
    '</div>'+
    '<div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="confirmSave()">ยืนยันบันทึก</button></div>'+
    '</div></div>';
  state.cache.pendingEntry = entry;
  state.cache.reasonRequired = reasonRequired;
}
async function confirmSave(){
  const entry = state.cache.pendingEntry;
  const reason = (document.getElementById('confirmReason')||{}).value || '';
  if(state.cache.reasonRequired && !reason.trim()){ toast('กรุณาระบุเหตุผล','err'); return; }
  const res = await api('upsertEntry', {entry, override:true, reason});
  closeModal();
  if(res.ok) toast('บันทึกเรียบร้อย (มีการยืนยันเกินแผน)', 'ok');
  else toast(res.error||'บันทึกไม่สำเร็จ','err');
}
function closeModal(){ document.getElementById('modalHost').innerHTML=''; }

  const res = await api('getTargets',{});
  const rows = res.rows||[];
  content('<div class="card"><div class="card-title">🎯 เป้าหมายบริษัทประจำปี</div>'+
    '<div class="table-wrap"><table><thead><tr><th>รายการ</th><th class="num">เป้า/เดือน (ลบ.)</th><th class="num">เป้า/ปี (ลบ.)</th></tr></thead><tbody>'+
    rows.map((t,i)=>'<tr><td>'+esc(t.label)+'</td>'+
      '<td class="num"><input data-k="'+esc(t.key)+'" data-f="perMonth" type="number" step="0.01" value="'+t.perMonth+'" style="width:120px;text-align:right;padding:6px 10px;border:1px solid var(--border);border-radius:8px"></td>'+
      '<td class="num"><input data-k="'+esc(t.key)+'" data-f="perYear" type="number" step="0.01" value="'+t.perYear+'" style="width:130px;text-align:right;padding:6px 10px;border:1px solid var(--border);border-radius:8px"></td></tr>').join('')+
    '</tbody></table></div>'+
    '<div style="display:flex;justify-content:flex-end;margin-top:14px"><button class="btn btn-primary" onclick="saveTargets()">💾 บันทึกเป้าหมาย</button></div></div>');
  state.cache.targets = rows;
}
async function saveTargets(){
  const map={};
  document.querySelectorAll('#content input[data-k]').forEach(inp=>{
    const k=inp.dataset.k; map[k]=map[k]||{key:k}; map[k][inp.dataset.f]=parseFloat(inp.value)||0;
  });
  const orig={}; (state.cache.targets||[]).forEach(t=>orig[t.key]=t);
  const targets=Object.values(map).map(t=>Object.assign({}, orig[t.key], t));
  const res=await api('saveTargets',{targets});
  if(res.ok) toast('บันทึกเป้าหมายเรียบร้อย','ok'); else toast(res.error||'บันทึกไม่สำเร็จ','err');
}

/* ============================================================
 * AUDIT LOG (admin)
 * ============================================================ */
async function renderAudit(){
  const res = await api('getAuditLog',{limit:300});
  const rows = res.rows||[];
  const ACT={login:'เข้าสู่ระบบ',logout:'ออกจากระบบ',createProject:'เพิ่มโครงการ',updateProject:'แก้โครงการ',deleteProject:'ลบโครงการ',
    createEntry:'กรอกข้อมูล',updateEntry:'แก้ข้อมูล',createUser:'เพิ่มผู้ใช้',updateUser:'แก้ผู้ใช้',deleteUser:'ลบผู้ใช้',
    changePassword:'เปลี่ยนรหัส',saveTargets:'แก้เป้าหมาย'};
  if(!rows.length){ content('<div class="card"><div class="empty">ยังไม่มีประวัติ</div></div>'); return; }
  content('<div class="card"><div class="table-wrap"><table><thead><tr>'+
    '<th>เวลา</th><th>ผู้ใช้</th><th>การกระทำ</th><th>รายการ</th><th>รายละเอียด</th></tr></thead><tbody>'+
    rows.map(r=>'<tr><td>'+esc((r.timestamp||'').replace('T',' '))+'</td><td><b>'+esc(r.user)+'</b></td>'+
      '<td><span class="badge">'+esc(ACT[r.action]||r.action)+'</span></td><td>'+esc(r.key||'-')+'</td>'+
      '<td style="white-space:normal;color:var(--muted)">'+esc(r.detail||'')+'</td></tr>').join('')+
    '</tbody></table></div></div>');
}

/* ============================================================
 * Change password
 * ============================================================ */
function openChangePw(){
  document.getElementById('modalHost').innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:400px">'+
    '<div class="modal-head"><span class="t">🔑 เปลี่ยนรหัสผ่าน</span><button class="modal-x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body">'+
      '<div class="field"><label>รหัสผ่านเดิม</label><input id="cp_old" type="password"></div>'+
      '<div class="field"><label>รหัสผ่านใหม่ (อย่างน้อย 6 ตัว)</label><input id="cp_new" type="password"></div>'+
    '</div>'+
    '<div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="saveChangePw()">เปลี่ยนรหัสผ่าน</button></div>'+
    '</div></div>';
}
async function saveChangePw(){
  const oldPw=document.getElementById('cp_old').value, newPw=document.getElementById('cp_new').value;
  if(newPw.length<6){ toast('รหัสใหม่ต้องยาวอย่างน้อย 6 ตัว','err'); return; }
  const res=await api('changePassword',{oldPw,newPw});
  if(res.ok){ closeModal(); toast('เปลี่ยนรหัสผ่านเรียบร้อย','ok'); } else toast(res.error||'เปลี่ยนไม่สำเร็จ','err');
}

/* ---------- helpers ---------- */
function content(html){ document.getElementById('content').innerHTML = html; }

/* ---------- boot ---------- */
if(state.token && state.user){ enterApp(); }
