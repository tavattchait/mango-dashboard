<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WRC ERP</title>
    <!--
      GitHub Pages ไม่รู้จัก route ของ React Router (เช่น /admin/pjcm) — หาไฟล์จริงไม่เจอแล้ว fallback มาที่นี่
      เก็บ path เดิม (รวม query string ปุ่มรีเฟรช ?v=...) ไว้ใน ?__redirect= แบบ encode เต็มรูปแบบ
      แล้วเด้งกลับไป index.html ซึ่งจะถอดรหัสคืนเป็น path จริงก่อน React Router mount (ดู index.html)
    -->
    <script>
      var base = "/mango-dashboard/";
      var l = window.location;
      var rest = l.pathname.slice(base.length) + l.search + l.hash;
      l.replace(base + "?__redirect=" + encodeURIComponent(rest));
    </script>
  </head>
  <body></body>
</html>
