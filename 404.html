<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WRC ERP</title>
    <!--
      GitHub Pages ไม่รู้จัก route ของ React Router (เช่น /admin/store) เพราะมันหาไฟล์จริงไม่เจอ
      แล้ว fallback มาที่ 404.html — ตัวนี้เก็บ path เดิมไว้ใน query string แล้วเด้งกลับไป index.html
      จากนั้น index.html จะแปลงกลับเป็น path จริงก่อน React Router mount (ดู script ใน public/index.html)
      อ้างอิงเทคนิคมาตรฐาน: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var pathSegmentsToKeep = 1; // เก็บ /mango-dashboard/ ไว้เป็น base
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
